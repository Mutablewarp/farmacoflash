 + pirimetamina → malaria (terapia/profilassi). sulfametossazolo + trimetoprim → nocardiosi, toxoplasmosi. basso costo → paesi in via di sviluppo. cristalluria (metaboliti acetilati insolubili → danno epitelio renale); tossicità ematopoietica severa; ipersensibilità (somiglianza col paba) fino a necrosi epiteliale e sindrome di stevens-johnson; epatopatie, nausea, vomito, diarrea, cefalea."},{"deck":"Antibiotici-3","mod":"I","name":"Trimetoprim","o":26,"mecc":"inibisce la diidrofolato reduttasi (reazione a valle) → blocca la sintesi dell'acido tetraidrofolico.","ind":"spesso + sulfamidico (Bactrim®); cistiti (alternativa indicata dall'EMA ai fluorochinoloni).","adr":"da carenza di folati → anemia megaloblastica, leucopenia, granulocitopenia (risolvibili con acido tetraidrofolico).","_s":"trimetoprim antibiotici-3 antibiotici inibisce la diidrofolato reduttasi (reazione a valle) → blocca la sintesi dell'acido tetraidrofolico. spesso + sulfamidico (bactrim®); cistiti (alternativa indicata dall'ema ai fluorochinoloni). da carenza di folati → anemia megaloblastica, leucopenia, granulocitopenia (risolvibili con acido tetraidrofolico)."},{"deck":"Antibiotici-3","mod":"I","name":"Chinoloni e Fluorochinoloni","o":26,"mecc":"inibiscono gli enzimi che tagliano/superavvolgono il cromosoma batterico → topoisomerasi IV (Gram+) e DNA-girasi (Gram-), impedendo i superavvolgimenti necessari…","ind":"infezioni respiratorie (bronchiti, sinusiti, polmoniti), a trasmissione sessuale, prostatiti, genito-urinarie non complicate, osso (perfloxacina), tessuti molli,…","adr":"CONTROINDICATI < 12 anni (tossicità del connettivo, alterazione β1-integrine) e cautela negli anziani (artropatie, tendiniti, rottura del tendine d'Achille); GI…","_s":"chinoloni e fluorochinoloni antibiotici-3 antibiotici inibiscono gli enzimi che tagliano/superavvolgono il cromosoma batterico → topoisomerasi iv (gram+) e dna-girasi (gram-), impedendo i superavvolgimenti necessari alla duplicazione. ampio spettro. infezioni respiratorie (bronchiti, sinusiti, polmoniti), a trasmissione sessuale, prostatiti, genito-urinarie non complicate, osso (perfloxacina), tessuti molli, gi; inpatient e outpatient. controindicati < 12 anni (tossicità del connettivo, alterazione β1-integrine) e cautela negli anziani (artropatie, tendiniti, rottura del tendine d'achille); gi nel 20% (incl. colite pseudomembranosa da c. difficile); snc (sonnolenza, confusione, delirio, cefalea, abbassamento della soglia pro-convulsivante — spiazzano il gaba); allungamento qt/torsione di punta (max moxifloxacina, min ciprofloxacina); alterazione canali k atp-dipendenti e glicemia; fototossicità; ipersensibilità/idiosincrasiche (meno dei β-lattamici)."},{"deck":"Antibiotici-3","mod":"I","name":"Rifampicina (integrazione Lez 17 — profilo antitubercolare completo nel file Antibiotici-2)","o":26,"mecc":"inibisce la RNA-polimerasi DNA-dipendente → inibizione della sintesi dell'RNA. Battericida.","ind":"ampio spettro (Gram+, Gram-, meningococco, meningiti da Haemophilus influenzae); TBC in associazione con isoniazide.","adr":"nausea, vomito, eruzione cutanea, epatopatie.","_s":"rifampicina (integrazione lez 17 — profilo antitubercolare completo nel file antibiotici-2) antibiotici-3 antibiotici inibisce la rna-polimerasi dna-dipendente → inibizione della sintesi dell'rna. battericida. ampio spettro (gram+, gram-, meningococco, meningiti da haemophilus influenzae); tbc in associazione con isoniazide. nausea, vomito, eruzione cutanea, epatopatie."},{"deck":"Antibiotici-3","mod":"I","name":"Macrolidi (classe — eritromicina, claritromicina, roxitromicina, azitromicina)","o":26,"mecc":"si legano alla subunità ribosomiale 50S → impediscono il legame dell'aminoacido al sito accettore → ostacolano l'allungamento della catena polipeptidica.","ind":"vedi singole molecole.","adr":"vedi singole; ipersensibilità rara.","_s":"macrolidi (classe — eritromicina, claritromicina, roxitromicina, azitromicina) antibiotici-3 antibiotici si le cità gi rispetto agli altri (ma effetti motilino-simili: turbe gi, pesantezza epigastrica, nausea, vomito, diarrea); non dà gli effetti su k⁺/cyp dell'eritromicina."},{"deck":"Antibiotici-3","mod":"I","name":"Claritromicina (nota)","o":26,"mecc":"macrolide semisintetico (50S).","ind":"","adr":"","_s":"claritromicina (nota) antibiotici-3 antibiotici macrolide semisintetico (50s).  "},{"deck":"Antibiotici-3","mod":"I","name":"Lincosamidi (Clindamicina)","o":26,"mecc":"si lega alla subunità 50S; derivato semisintetico della lincomicina.","ind":"spettro intermedio (Gram+, Gram-), attiva sugli anaerobi (clostridi); NON attiva su Gram- aerobi (non attraversa la membrana esterna); osteomieliti (es. da…","adr":"NON attiva su C. difficile, anzi ne può causare la colite pseudomembranosa (selezione nel 10%); nausea, vomito; blocco della placca neuromuscolare (attenzione in…","_s":"lincosamidi (clindamicina) antibiotici-3 antibiotici si lega alla subunità 50s; derivato semisintetico della lincomicina. spettro intermedio (gram+, gram-), attiva sugli anaerobi (clostridi); non attiva su gram- aerobi (non attraversa la membrana esterna); osteomieliti (es. da streptococchi). non attiva su c. difficile, anzi ne può causare la colite pseudomembranosa (selezione nel 10%); nausea, vomito; blocco della placca neuromuscolare (attenzione in miastenia gravis)."},{"deck":"Antibiotici-3","mod":"I","name":"Cloramfenicolo (CAF)","o":26,"mecc":"interferisce con la subunità 50S → impedisce il legame del tRNA al sito accettore → blocca l'allungamento.","ind":"spettro ampio (Gram+, Gram-, rickettsie, micoplasmi, clamidie; battericida su Haemophilus, Neisseriae, S. pneumoniae); febbre tifoide, meningiti batteriche,…","adr":"tossicità mitocondriale; tossicità ematopoietica (anemia ipocromica, aplasia midollare); sindrome del bambino grigio (neonati, ridotta glicuronazione → accumulo;…","_s":"cloramfenicolo (caf) antibiotici-3 antibiotici interferisce con la subunità 50s → impedisce il legame del trna al sito accettore → blocca l'allungamento. spettro ampio (gram+, gram-, rickettsie, micoplasmi, clamidie; battericida su haemophilus, neisseriae, s. pneumoniae); febbre tifoide, meningiti batteriche, ascessi cerebrali, anaerobi, brucellosi, rickettsiosi, linfogranuloma venereo. riservato a germi difficili / quando alternative più sicure (tetracicline, fq, β-lattamici) non sono utilizzabili. tossicità mitocondriale; tossicità ematopoietica (anemia ipocromica, aplasia midollare); sindrome del bambino grigio (neonati, ridotta glicuronazione → accumulo; mortalità 40%); nausea, vomito, diarrea, ipersensibilità, edema angioneurotico, nevriti periferiche, neurite ottica, disturbi psichici."},{"deck":"Antibiotici-3","mod":"I","name":"Aminoglicosidi (classe — meccanismo, cinetica e tossicità)","o":26,"mecc":"si legano alla subunità 30S con duplice azione → inibiscono l'inizio della sintesi proteica E favoriscono proteine aberranti (misfolded/incomplete) che si…","ind":"prevalentemente Gram- (Pseudomonas aeruginosa, Klebsiella, Enterobacteriaceae, Proteus, E. coli); stafilococchi produttori di β-lattamasi sensibili; streptococchi…","adr":"basso indice terapeutico. OTOTOSSICITÀ (accumulo in endolinfa/perilinfa → VIII paio: tossicità vestibolare precoce — vertigini, nausea, vomito, nistagmo; cocleare…","_s":"aminoglicosidi (classe — meccanismo, cinetica e tossicità) antibiotici-3 antibiotici si legano alla subunità 30s con duplice azione → inibiscono l'inizio della sintesi proteica e favoriscono proteine aberranti (misfolded/incomplete) che si inseriscono in membrana/parete → alterano la permeabilità → lisi. battericidi. prevalentemente gram- (pseudomonas aeruginosa, klebsiella, enterobacteriaceae, proteus, e. coli); stafilococchi produttori di β-lattamasi sensibili; streptococchi resistenti. (singoli farmaci → card dedicata.) basso indice terapeutico. ototossicità (accumulo in endolinfa/perilinfa → viii paio: tossicità vestibolare precoce — vertigini, nausea, vomito, nistagmo fort gi; selezione flora → colite pseudomembranosa; ↓ vitamina k → disordini coagulazione (con warfarin)."},{"deck":"Beta-lattamici","mod":"I","name":"Penicilline resistenti alle β-lattamasi (meticillina; isossazolil-penicilline: oxacillina, cloxacillina, dicloxacillina; nafcillina)","o":27,"mecc":"β-lattamico; gruppo laterale ingombrante → minore sensibilità alle β-lattamasi.","ind":"meticillina → in origine S. aureus (\"antistafilococciche\") e streptococchi; isossazolil-penicilline → Gram+ produttori di β-lattamasi (tratto respiratorio, pelle,…","adr":"meticillina → nefrotossicità; isossazolil-penicilline → minore nefrotossicità rispetto alla meticillina.","_s":"penicilline resistenti alle β-lattamasi (meticillina; isossazolil-penicilline: oxacillina, cloxacillina, dicloxacillina; nafcillina) beta-lattamici antibiotici β-lattamici β-lattamico; gruppo laterale ingombrante → minore sensibilità alle β-lattamasi. meticillina → in origine s. aureus (\"antistafilococciche\") e streptococchi; isossazolil-penicilline → gram+ produttori di β-lattamasi (tratto respiratorio, pelle, tessuti molli, genito-urinario). meticillina → nefrotossicità; isossazolil-penicilline → minore nefrotossicità rispetto alla meticillina."},{"deck":"Beta-lattamici","mod":"I","name":"Aminopenicilline (amoxicillina, ampicillina)","o":27,"mecc":"β-lattamico; aggiunta del gruppo aminico.","ind":"infezioni vie aeree, genito-urinarie, dermatologiche, tessuti molli (germi non produttori di β-lattamasi); E. coli, Proteus, Shigella; Neisserie.","adr":"ipersensibilità; discomfort GI (quota orale residua nel tratto GI → effetto topico → selezione flora → colite pseudomembranosa); ↓ vitamina K → coagulazione…","_s":"aminopenicilline (amoxicillina, ampicillina) beta-lattamici antibiotici β-lattamici β-lattamico; aggiunta del gruppo aminico. infezioni vie aeree, genito-urinarie, dermatologiche, tessuti molli (germi non produttori di β-lattamasi); e. coli, proteus, shigella; neisserie. ipersensibilità; discomfort gi (quota orale residua nel tratto gi → effetto topico → selezione flora → colite pseudomembranosa); ↓ vitamina k → coagulazione (warfarin)."},{"deck":"Beta-lattamici","mod":"I","name":"Carbossipenicilline (carbenicillina, ticarcillina)","o":27,"mecc":"β-lattamico; sostituzione \"carbossi\" → ampliamento spettro.","ind":"Gram+ (streptococchi) e Gram- (Proteus, E. coli sensibili); infezioni vie aeree, urogenitale, dermatologiche, tessuti molli.","adr":"comuni alle penicilline (ipersensibilità, discomfort GI); specifiche di classe N/D nei documenti forniti.","_s":"carbossipenicilline (carbenicillina, ticarcillina) beta-lattamici antibiotici β-lattamici β-lattamico; sostituzione \"carbossi\" → ampliamento spettro. gram+ (streptococchi) e gram- (proteus, e. coli sensibili); infezioni vie aeree, urogenitale, dermatologiche, tessuti molli. comuni alle penicilline (ipersensibilità, discomfort gi); specifiche di classe n/d nei documenti forniti."},{"deck":"Beta-lattamici","mod":"I","name":"Ureidopenicilline (piperacillina, mezlocillina, azlocillina)","o":27,"mecc":"β-lattamico; gruppo ureidico → ↑ idrofilia → selettività verso Gram-.","ind":"Gram- difficili/nosocomiali — Haemophilus influenzae, Klebsiella, Pseudomonas aeruginosa; polmoniti, infezioni intra-addominali, cute, tessuti molli, piede…","adr":"ipersensibilità (struttura simile a dipeptide; IgE → anafilassi; reazioni ritardate/rash, simil-malattia da siero, cutanee gravi 0-5%); discomfort GI; ↓ vitamina K…","_s":"ureidopenicilline (piperacillina, mezlocillina, azlocillina) beta-lattamici antibiotici β-lattamici β-lattamico; gruppo ureidico → ↑ idrofilia → selettività verso gram-. gram- difficili/nosocomiali — haemophilus influenzae, klebsiella, pseudomonas aeruginosa; polmoniti, infezioni intra-addominali, cute, tessuti molli, piede diabetico. ipersensibilità (struttura simile a dipeptide; ige → anafilassi; reazioni ritardate/rash, simil-malattia da siero, cutanee gravi 0-5%); discomfort gi; ↓ vitamina k → coagulazione."},{"deck":"Beta-lattamici","mod":"I","name":"Cefalosporine (classe — quadro generale)","o":27,"mecc":"identico alle penicilline (stesso anello β-lattamico → inibizione transpeptidazione); molecola un po' più resistente alle β-lattamasi. Struttura: derivati…","ind":"per generazione → vedi card.","adr":"ipersensibilità crociata con le penicilline (apteni simili → allergico alle penicilline ≈ allergico alle cefalosporine); alterazione ematocrito con emolisi;…","_s":"cefalosporine (classe — quadro generale) beta-lattamici antibiotici β-lattamici identico alle penicilline (stesso anello β-lattamico → inibizione transpeptidazione); molecola un po' più resistente alle β-lattamasi. struttura: derivati dell'acido 7-aminocefalosporanico, anello β-lattamico fuso ad anello a 6 con zolfo (un atomo in più rispetto alle penicilline). per generazione → vedi card. ipersensibilità crociata con le penicilline (apteni simili → allergico alle penicilline ≈ allergico alle cefalosporine); alterazione ematocrito con emolisi; nefrotossicità da necrosi tubulare; reazione disulfiram-simile (gruppo \"sulfa\" → inibizione aldeide deidrogenasi → accumulo acetaldeide con alcol → nausea, vomito, incoordinazione); discomfort gi; interazione con anticoagulanti orali."},{"deck":"Beta-lattamici","mod":"I","name":"Cefalosporine di I generazione (cefazolina, cefalexina)","o":27,"mecc":"come classe (PBP).","ind":"infezioni vie aeree, otorinolaringoiatriche, tessuti molli (germi sensibili).","adr":"vedi classe (ipersensibilità crociata, disulfiram-simile, ecc.).","_s":"cefalosporine di i generazione (cefazolina, cefalexina) beta-lattamici antibiotici β-lattamici come classe (pbp). infezioni vie aeree, otorinolaringoiatriche, tessuti molli (germi sensibili). vedi classe (ipersensibilità crociata, disulfiram-simile, ecc.)."},{"deck":"Beta-lattamici","mod":"I","name":"Cefalosporine di II generazione (cefoxitina, cefamandolo, cefuroxime, cefaclor, cefprozil)","o":27,"mecc":"come classe (PBP).","ind" re resistenza alle β-lattamasi.","ind":"infezioni tratto genito-urinario, osseo, respiratorio, cute e tessuti molli; ambito ospedaliero.","adr":"discomfort GI (nausea, vomito, diarrea); ipersensibilità; convulsioni in predisposti; interazioni importanti con antiepilettici.","_s":"carbapenemici (imipenem, ertapenem, doripenem, meropenem) beta-lattamici antibiotici β-lattamici β-lattamico (stesso meccanismo); -cooh nell'eterociclo a 5 (più semplice, senza eteroatomi nell'anello fuso) → ulteriore resistenza alle β-lattamasi. infezioni tratto genito-urinario, osseo, respiratorio, cute e tessuti molli; ambito ospedaliero. discomfort gi (nausea, vomito, diarrea); ipersensibilità; convulsioni in predisposti; interazioni importanti con antiepilettici."},{"deck":"Beta-lattamici","mod":"I","name":"Monobattamici (Aztreonam)","o":27,"mecc":"β-lattamico con persistenza esclusiva dell'anello β-lattamico (massima semplificazione, nessun anello fuso); meccanismo identico agli altri β-lattamici.","ind":"infezioni tratto genito-urinario, respiratorio, setticemie; fibrosi cistica (inalatorio, per Pseudomonas/Gram- difficili).","adr":"NON dà ipersensibilità crociata con altri β-lattamici (manca l'eterociclo fuso responsabile); può dare ipersensibilità per componenti diversi; raramente…","_s":"monobattamici (aztreonam) beta-lattamici antibiotici β-lattamici β-lattamico con persistenza esclusiva dell'anello β-lattamico (massima semplificazione, nessun anello fuso); meccanismo identico agli altri β-lattamici. infezioni tratto genito-urinario, respiratorio, setticemie; fibrosi cistica (inalatorio, per pseudomonas/gram- difficili). non dà ipersensibilità crociata con altri β-lattamici (manca l'eterociclo fuso responsabile); può dare ipersensibilità per componenti diversi; raramente pancitopenia, disordini coagulazione, alterazioni cutanee, convulsioni; (da slide) nausea, vomito, diarrea."},{"deck":"Beta-lattamici","mod":"I","name":"β-lattamasi — classificazione di Ambler (enzimi di resistenza)","o":27,"mecc":"","ind":"","adr":"","_s":"β-lattamasi — classificazione di ambler (enzimi di resistenza) beta-lattamici antibiotici β-lattamici   "},{"deck":"Beta-lattamici","mod":"I","name":"Inibitori delle β-lattamasi — I generazione (acido clavulanico, sulbactam, tazobactam)","o":27,"mecc":"analoghi strutturali delle β-lattamine; legano il sito attivo delle β-lattamasi e, una volta idrolizzati, lo bloccano IRREVERSIBILMENTE (\"si immolano\" al posto…","ind":"","adr":"N/D nei documenti forniti.","_s":"inibitori delle β-lattamasi — i generazione (acido clavulanico, sulbactam, tazobactam) beta-lattamici antibiotici β-lattamici analoghi strutturali delle β-lattamine; legano il sito attivo delle β-lattamasi e, una volta idrolizzati, lo bloccano irreversibilmente (\"si immolano\" al posto dell'antibiotico); nessuna attività antibiotica propria (non agiscono sulle transpeptidasi) → solo in associazione.  n/d nei documenti forniti."},{"deck":"Beta-lattamici","mod":"I","name":"Inibitori delle β-lattamasi — II generazione e nuovi (avibactam, vaborbactam, relebactam; non-β-lattamici: zidebactam, nacubactam)","o":27,"mecc":"componenti molecolari diverse (NON analoghi delle β-lattamine); non idrolizzati dalle β-lattamasi → inibizione senza inattivazione → \"riciclabili\", azione più…","ind":"in associazione con cefalosporine III gen o meropenem (contesti difficili/nosocomiali; anche cefalosporine II gen). Meropenem + vaborbactam → infezioni complicate…","adr":"N/D nei documenti forniti.","_s":"inibitori delle β-lattamasi — ii generazione e nuovi (avibactam, vaborbactam, relebactam; non-β-lattamici: zidebactam, nacubactam) beta-lattamici antibiotici β-lattamici componenti molecolari diverse (non analoghi delle β-lattamine); non idrolizzati dalle β-lattamasi → inibizione senza inattivazione → \"riciclabili\", azione più duratura. in associazione con cefalosporine iii gen o meropenem (contesti difficili/nosocomiali; anche cefalosporine ii gen). meropenem + vaborbactam → infezioni complicate vie urinarie (incl. pielonefrite), intra-addominali, polmoniti nosocomiali associate a ventilazione. imipenem + relebactam (vantaggio cinetico). n/d nei documenti forniti."}];
const DECKS = [{"id":"A4","code":"A4","title":"GLUCOCORTICOIDI","color":"#ff6b6b","module":"I"},{"id":"A5","code":"A5","title":"FANS + PARACETAMOLO","color":"#4ea8de","module":"I"},{"id":"A6","code":"A6","title":"ANTISTAMINICI","color":"#5bc873","module":"I"},{"id":"A7","code":"A7","title":"ANTIEMICRANICI + ANTIEMETICI","color":"#ffce3a","module":"I"},{"id":"A8","code":"A8","title":"ANTIASMATICI / BPCO","color":"#b07cd6","module":"I"},{"id":"A9","code":"A9","title":"FARMACI BIOLOGICI / BIOSIMILARI / ANTI-TNF-α","color":"#ff9f5a","module":"I"},{"id":"A10","code":"A10","title":"DIABETE / INSULINA","color":"#ff8fb1","module":"I"},{"id":"A11","code":"A11","title":"FARMACI GASTROINTESTINALI","color":"#ff6b6b","module":"I"},{"id":"A12","code":"A12","title":"OSSO / OSTEOPOROSI","color":"#4ea8de","module":"I"},{"id":"B1","code":"B1","title":"SEDATIVO-IPNOTICI E ANSIOLITICI","color":"#5bc873","module":"II"},{"id":"B2","code":"B2","title":"ANESTETICI GENERALI E LOCALI","color":"#ffce3a","module":"II"},{"id":"B3","code":"B3","title":"ANTIDEPRESSIVI","color":"#b07cd6","module":"II"},{"id":"B4","code":"B4","title":"DISTURBO BIPOLARE / STABILIZZANTI DELL'UMORE","color":"#ff9f5a","module":"II"},{"id":"B5","code":"B5","title":"ANTIPSICOTICI","color":"#ff8fb1","module":"II"},{"id":"B6","code":"B6","title":"ANTIPARKINSON","color":"#ff6b6b","module":"II"},{"id":"B7","code":"B7","title":"ALZHEIMER E SCLEROSI MULTIPLA","color":"#4ea8de","module":"II"},{"id":"B8","code":"B8","title":"OPPIOIDI / TERAPIA DEL DOLORE","color":"#5bc873","module":"II"},{"id":"B9","code":"B9","title":"ANTIEPILETTICI + STATINE/IPOLIPEMIZZANTI","color":"#ffce3a","module":"II"},{"id":"B10","code":"B10","title":"ANTIIPERTENSIVI: SIMPATICOLITICI, α- e β-BLOCCANTI","color":"#b07cd6","module":"II"},{"id":"B11","code":"B11","title":"RAAS","color":"#ff9f5a","module":"II"},{"id":"B11b","code":"B11b","title":"SCOMPENSO/DIGITALE, XANTINE E DIURETICI","color":"#ff8fb1","module":"II"},{"id":"B12","code":"B12","title":"ANTITROMBOTICI","color":"#ff6b6b","module":"II"},{"id":"B12b","code":"B12b","title":"VASODILATATORI","color":"#4ea8de","module":"II"},{"id":"B13","code":"B13","title":"ANTIARITMICI","color":"#5bc873","module":"II"},{"id":"B14","code":"B14","title":"ANTITUMORALI / ONCOLOGIA DI PRECISIONE","color":"#ffce3a","module":"II"},{"id":"Antibiotici-2","code":"Antib.2","title":"ANTIBIOTICI","color":"#b07cd6","module":"I"},{"id":"Antibiotici-3","code":"Antib.3","title":"ANTIBIOTICI","color":"#ff9f5a","module":"I"},{"id":"Beta-lattamici","code":"β-latt.","title":"ANTIBIOTICI β-LATTAMICI","color":"#ff8fb1","module":"I"}];
const $ = s=>document.querySelector(s);
let state = { q:'', mod:null, deck:null, sort:{k:'o',dir:1} };

function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function hi(s){ const q=state.q.trim(); if(!q) return esc(s); try{const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');return esc(s).replace(re,'<mark>$1</mark>');}catch(e){return esc(s);} }
function norm(s){return (s||'').toLowerCase();}

function deckColor(id){const d=DECKS.find(x=>x.id===id);return d&&d.color?d.color:'#ece1cb';}
function deckTitle(id){const d=DECKS.find(x=>x.id===id);return d?d.title:id;}

function filtered(){
  const q=norm(state.q);
  let r=DATA.filter(x=>{
    if(state.mod && x.mod!==state.mod) return false;
    if(state.deck && x.deck!==state.deck) return false;
    if(q && !x._s.includes(q)) return false;
    return true;
  });
  const {k,dir}=state.sort;
  r=r.slice().sort((a,b)=>{
    let va=a[k], vb=b[k];
    if(k==='o'){ if(va!==vb) return (va-vb); return a.name.localeCompare(b.name,'it'); }
    return String(va).localeCompare(String(vb),'it')*dir;
  });
  return r;
}

function render(){
  const rows=filtered();
  $('#count').textContent = rows.length+' / '+DATA.length+' farmaci';
  if(!rows.length){ $('#tb').innerHTML='<tr><td colspan="5" class="empty">Nessun farmaco trovato 🐢</td></tr>'; return; }
  $('#tb').innerHTML = rows.map(x=>{
    const code = (DECKS.find(d=>d.id===x.deck)||{}).code || x.deck;
    return '<tr>'+
      '<td class="c-cls"><span class="dchip" style="background:'+deckColor(x.deck)+'44">'+esc(code)+'</span><span class="mod-pill mod-'+x.mod+'">Mod '+x.mod+'</span><small>'+esc(deckTitle(x.deck))+'</small></td>'+
      '<td class="c-name">'+hi(x.name)+'</td>'+
      '<td class="c-mecc col-d">'+hi(x.mecc)+'</td>'+
      '<td class="c-ind col-d">'+hi(x.ind)+'</td>'+
      '<td class="c-adr col-d">'+hi(x.adr)+'</td>'+
    '</tr>';
  }).join('');
}

function buildChips(){
  // modulo
  const mr=$('#modRow');
  [['Tutti',null],['Modulo I',  'I'],['Modulo II','II']].forEach(([t,v])=>{
    const b=document.createElement('button'); b.className='chip'+((state.mod===v)?' on':''); b.textContent=t;
    b.onclick=()=>{ state.mod=v; refreshChips(); render(); }; b.dataset.mod=String(v); mr.appendChild(b);
  });
  // classi
  const dr=$('#deckRow');
  DECKS.forEach(d=>{
    const b=document.createElement('button'); b.className='chip dk'; b.dataset.deck=d.id;
    b.style.background=d.color?d.color+'33':''; b.textContent=(d.code||d.id);
    b.title=d.title;
    b.onclick=()=>{ state.deck = (state.deck===d.id)?null:d.id; refreshChips(); render(); };
    dr.appendChild(b);
  });
}
function refreshChips(){
  document.querySelectorAll('#modRow .chip').forEach(b=>b.classList.toggle('on', b.dataset.mod===String(state.mod)));
  document.querySelectorAll('#deckRow .chip').forEach(b=>b.classList.toggle('on', b.dataset.deck===state.deck));
}

$('#q').addEventListener('input', e=>{ state.q=e.target.value; render(); });
$('#compBtn').addEventListener('click', ()=>{ document.body.classList.toggle('compatta'); $('#compBtn').classList.toggle('on'); });
$('#clrBtn').addEventListener('click', ()=>{ state.q=''; state.mod=null; state.deck=null; $('#q').value=''; refreshChips(); render(); });
document.querySelectorAll('thead th').forEach(th=>{
  th.addEventListener('click', ()=>{
    const k=th.dataset.k;
    if(state.sort.k===k) state.sort.dir*=-1; else state.sort={k,dir:1};
    document.querySelectorAll('thead th').forEach(t=>t.classList.remove('s'));
    th.classList.add('s');
    render();
  });
});

buildChips();
$('#foot').textContent = DATA.length+' farmaci · '+DECKS.length+' classi · Moduli I–II · dati dalle tue carte FarmacoFlash';
render();
</script>
