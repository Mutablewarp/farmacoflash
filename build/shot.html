<!doctype html><html lang="it"><head><meta charset="utf-8">
<title>shot frame</title>
<style>
  html,body{margin:0;height:100%}
  body{
    display:flex;align-items:center;justify-content:center;min-height:100vh;
    background-color:#fff8ec;
    background-image:
      linear-gradient(rgba(140,110,60,.09) 1px,transparent 1px),
      linear-gradient(90deg,rgba(140,110,60,.09) 1px,transparent 1px),
      radial-gradient(700px 400px at 88% -10%, rgba(255,206,58,.18), transparent 60%),
      radial-gradient(600px 420px at 6% 110%, rgba(78,168,222,.13), transparent 55%);
    background-size:26px 26px,26px 26px,100% 100%,100% 100%;
  }
  .frame{
    transform:rotate(-2.2deg);
    border:3px solid #3a322b;border-radius:28px;overflow:hidden;background:#fff8ec;
    box-shadow:11px 14px 0 rgba(58,50,43,.18);
  }
  iframe{display:block;border:0;background:#fff8ec}
  /* scarabocchi d'angolo */
  .dd{position:fixed;opacity:.6}
  .dd svg{width:100%;height:100%}
</style></head><body>
<svg class="dd" style="top:26px;left:30px;width:46px;transform:rotate(-12deg)" viewBox="0 0 40 40" fill="none"><path d="M20 2l4 12 13 1-10 8 4 13-11-8-11 8 4-13-10-8 13-1z" stroke="#ffce3a" stroke-width="2.6" stroke-linejoin="round"/></svg>
<svg class="dd" style="bottom:34px;right:34px;width:44px;transform:rotate(9deg)" viewBox="0 0 40 40" fill="none"><path d="M20 6c6 0 9 8 0 16-9-8-6-16 0-16z" stroke="#ff8fb1" stroke-width="2.6" stroke-linejoin="round"/></svg>
<svg class="dd" style="bottom:60px;left:36px;width:52px;transform:rotate(6deg)" viewBox="0 0 50 30" fill="none"><path d="M2 16 Q 12 2 22 16 T 48 14" stroke="#4ea8de" stroke-width="2.8" fill="none" stroke-linecap="round"/></svg>
<div class="frame"><iframe id="f"></iframe></div>
<script>
  const p=new URLSearchParams(location.search);
  const s=p.get('s')||'dash', w=+(p.get('w')||420), h=+(p.get('h')||820);
  const f=document.getElementById('f');
  f.style.width=w+'px'; f.style.height=h+'px';
  f.src='/Flashcard-Farmacologia.html#'+s;
</script></body></html>
