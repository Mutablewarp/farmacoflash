<!doctype html>
<html lang="it" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Farmacologia · UniPa — Studio integrato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f7; --panel:#ffffff; --line:#e6e6ec; --line2:#d3d3da;
  --ink:#1d1d1f; --ink-dim:#48484c; --ink-faint:#86868b;
  --gold:#835c14; --gold-bright:#a9772b; --gold-line:#e7d4ac; --gold-soft:#fbf3e3;
  --bar-h:56px;
  --sys:-apple-system,BlinkMacSystemFont,'SF Pro Text','Archivo',system-ui,sans-serif;
}
:root[data-theme="dark"]{
  --bg:#0a0b11; --panel:#14161f; --line:#242634; --line2:#333648;
  --ink:#edeef6; --ink-dim:#a9acc0; --ink-faint:#74778e;
  --gold:#e9b873; --gold-bright:#f3cf9b; --gold-line:#5a4a23; --gold-soft:#241a0c;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:var(--sys);color:var(--ink);background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased}
/* ---- top bar ---- */
.bar{
  position:fixed;inset:0 0 auto 0;height:var(--bar-h);z-index:10;
  display:flex;align-items:center;gap:14px;padding:0 14px;
  padding-top:env(safe-area-inset-top);
  background:color-mix(in srgb,var(--bg) 78%,transparent);
  backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:8px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;user-select:none}
.brand .mk{font-size:18px}
.brand .nm{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:16px}
.brand .sub{color:var(--ink-faint);font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.02em}
/* ---- segmented tabs ---- */
.tabs{display:flex;gap:3px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:3px;box-shadow:0 1px 2px rgba(20,24,40,.05)}
.seg{appearance:none;border:0;background:transparent;color:var(--ink-dim);font-family:inherit;font-size:13.5px;font-weight:600;letter-spacing:-.01em;padding:7px 15px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .18s,color .18s}
.seg .ic{font-size:15px}
.seg:hover{color:var(--ink)}
.seg.active{background:var(--gold-soft);color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold-line)}
.seg:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.seg .lbl-sm{display:none}
/* ---- right controls ---- */
.ctl{display:flex;gap:7px;margin-left:auto}
.cbtn{font-family:'JetBrains Mono',monospace;font-size:12px;min-width:34px;height:34px;padding:0 10px;border:1px solid var(--line2);border-radius:10px;background:var(--panel);color:var(--ink-dim);cursor:pointer;transition:.16s}
.cbtn:hover{border-color:var(--gold);color:var(--ink)}
.cbtn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
/* ---- stage ---- */
.stage{position:fixed;inset:calc(var(--bar-h) + env(safe-area-inset-top)) 0 0 0}
iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg)}
iframe[hidden]{display:none}
@media (max-width:680px){
  .brand .sub{display:none}
  .seg{padding:7px 11px}
  .seg .lbl{display:none}
  .seg .lbl-sm{display:inline}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <header class="bar">
    <div class="brand"><span class="mk">🧬</span><span class="nm">Farmacologia</span><span class="sub">· UniPa</span></div>
    <div class="tabs" role="tablist" aria-label="Strumenti">
      <button class="seg active" id="tab-canali" data-app="canali" role="tab" aria-selected="true">
        <span class="ic">🧬</span><span class="lbl" data-it="Bersagli &amp; Farmaci 3D" data-en="Targets &amp; Drugs 3D">Bersagli &amp; Farmaci 3D</span><span class="lbl-sm">3D</span>
      </button>
      <button class="seg" id="tab-flashcard" data-app="flashcard" role="tab" aria-selected="false">
        <span class="ic">📇</span><span class="lbl">FarmacoFlash</span><span class="lbl-sm">Flash</span>
      </button>
    </div>
    <div class="ctl">
      <button class="cbtn" id="theme" type="button" title="Tema chiaro / scuro">☾</button>
      <button class="cbtn" id="lang" type="button" title="Italiano / English">EN</button>
    </div>
  </header>
  <div class="stage">
    <iframe id="if-canali"    title="Bersagli & Farmaci in 3D" src="Canali-e-Recettori-3D.html?embed=1"></iframe>
    <iframe id="if-flashcard" title="FarmacoFlash"             src="Flashcard-Farmacologia.html?embed=1" hidden></iframe>
  </div>
<script>
  const root=document.documentElement;
  const frames={ canali:document.getElementById('if-canali'), flashcard:document.getElementById('if-flashcard') };
  const tabs ={ canali:document.getElementById('tab-canali'), flashcard:document.getElementById('tab-flashcard') };
  let theme='light', lang='it', current='canali', pendingCard=null;
  const ready={canali:false, flashcard:false};

  // ---- persisted state (theme key shared with both apps) ----
  try{ theme=localStorage.getItem('cr-theme')||'light'; }catch(e){}
  try{ lang =localStorage.getItem('cr-lang') ||'it'; }catch(e){}

  function tell(app,msg){ const f=frames[app]; if(f&&f.contentWindow){ try{ f.contentWindow.postMessage(msg,'*'); }catch(e){} } }
  function broadcast(msg){ tell('canali',msg); tell('flashcard',msg); }

  function applyChrome(){
    root.dataset.theme=theme; root.lang=lang;
    document.getElementById('theme').textContent=(theme==='light'?'☀':'☾');
    document.getElementById('lang').textContent =(lang==='it'?'EN':'IT');
    document.querySelectorAll('[data-it]').forEach(el=>{ const v=el.getAttribute(lang==='en'?'data-en':'data-it'); if(v!=null) el.innerHTML=v; });
  }
  applyChrome();

  function showApp(name){
    if(!frames[name]) return;
    current=name;
    for(const k in frames){
      frames[k].hidden = (k!==name);
      tabs[k].classList.toggle('active', k===name);
      tabs[k].setAttribute('aria-selected', k===name?'true':'false');
    }
  }
  tabs.canali.onclick    = ()=>showApp('canali');
  tabs.flashcard.onclick = ()=>showApp('flashcard');

  document.getElementById('theme').onclick=()=>{
    theme=(theme==='light'?'dark':'light');
    try{localStorage.setItem('cr-theme',theme);}catch(e){}
    applyChrome(); broadcast({__fusion:'theme', value:theme});
  };
  document.getElementById('lang').onclick=()=>{
    lang=(lang==='it'?'en':'it');
    try{localStorage.setItem('cr-lang',lang);}catch(e){}
    applyChrome(); broadcast({__fusion:'lang', value:lang});
  };

  // sync a freshly-loaded app with current theme/lang
  function syncApp(app){ tell(app,{__fusion:'theme', value:theme}); tell(app,{__fusion:'lang', value:lang}); }
  frames.canali.addEventListener('load', ()=>syncApp('canali'));
  frames.flashcard.addEventListener('load', ()=>syncApp('flashcard'));

  // ---- messages from the embedded apps ----
  window.addEventListener('message', (e)=>{
    const d=e.data||{}; if(!d.__fusion) return;
    if(d.__fusion==='ready'){
      ready[d.app]=true; syncApp(d.app);
      if(d.app==='flashcard' && pendingCard){ tell('flashcard',{__fusion:'open-card', card:pendingCard}); pendingCard=null; }
    }
    else if(d.__fusion==='open-flashcard'){
      showApp('flashcard');
      if(d.card){ if(ready.flashcard){ tell('flashcard',{__fusion:'open-card', card:d.card}); } else { pendingCard=d.card; } }
    }
    else if(d.__fusion==='open-canali'){ showApp('canali'); }
  });
</script>
</body>
</html>
