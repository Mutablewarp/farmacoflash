o se + inibitori del cyp3a4 (es. statine); sordità transitoria (alte dosi/uso prolungato/anziani/ir/ie)."},{"id":"Antibiotici-3__azitromicina","deck":"Antibiotici-3","mod":"I","name":"Azitromicina","drugs":["azitromicina"],"o":26,"mecc":"macrolide (50S); 15 atomi di C, struttura dibasica.","ind":"spettro più ampio dell'eritromicina; S. aureus, S. pyogenes, S. pneumoniae, Moraxella catarrhalis, micoplasma, intracellulari; più efficace vs Haemophilus…","adr":"minore tossicità GI rispetto agli altri (ma effetti motilino-simili: turbe GI, pesantezza epigastrica, nausea, vomito, diarrea); NON dà gli effetti su K⁺/CYP…","_s":"azitromicina antibiotici-3 antibiotici azitromicina macrolide (50s); 15 atomi di c, struttura dibasica. spettro più ampio dell'eritromicina; s. aureus, s. pyogenes, s. pneumoniae, moraxella catarrhalis, micoplasma, intracellulari; più efficace vs haemophilus influenzae, neisseriae, clamidia → infezioni genito-urinarie e ist. effetti sub-mic immunomodulatori (pan-bronchioliti, asma, infezioni respiratorie, otiti, fibrosi cistica; usata in covid-19 per la tempesta citochinica — caratteristica unica). posologia: 500 mg/die × 3 gg o 1 g monosomministrazione (ist). minore tossicità gi rispetto agli altri (ma effetti motilino-simili: turbe gi, pesantezza epigastrica, nausea, vomito, diarrea); non dà gli effetti su k⁺/cyp dell'eritromicina."},{"id":"Antibiotici-3__claritromicina-nota","deck":"Antibiotici-3","mod":"I","name":"Claritromicina (nota)","drugs":["claritromicina"],"o":26,"mecc":"macrolide semisintetico (50S).","ind":"","adr":"","_s":"claritromicina (nota) antibiotici-3 antibiotici claritromicina macrolide semisintetico (50s).  "},{"id":"Antibiotici-3__lincosamidi-clindamicina","deck":"Antibiotici-3","mod":"I","name":"Lincosamidi (Clindamicina)","drugs":["clindamicina"],"o":26,"mecc":"si lega alla subunità 50S; derivato semisintetico della lincomicina.","ind":"spettro intermedio (Gram+, Gram-), attiva sugli anaerobi (clostridi); NON attiva su Gram- aerobi (non attraversa la membrana esterna); osteomieliti (es. da…","adr":"NON attiva su C. difficile, anzi ne può causare la colite pseudomembranosa (selezione nel 10%); nausea, vomito; blocco della placca neuromuscolare (attenzione in…","_s":"lincosamidi (clindamicina) antibiotici-3 antibiotici clindamicina si lega alla subunità 50s; derivato semisintetico della lincomicina. spettro intermedio (gram+, gram-), attiva sugli anaerobi (clostridi); non attiva su gram- aerobi (non attraversa la membrana esterna); osteomieliti (es. da streptococchi). non attiva su c. difficile, anzi ne può causare la colite pseudomembranosa (selezione nel 10%); nausea, vomito; blocco della placca neuromuscolare (attenzione in miastenia gravis)."},{"id":"Antibiotici-3__cloramfenicolo-caf","deck":"Antibiotici-3","mod":"I","name":"Cloramfenicolo (CAF)","drugs":["cloramfenicolo"],"o":26,"mecc":"interferisce con la subunità 50S → impedisce il legame del tRNA al sito accettore → blocca l'allungamento.","ind":"spettro ampio (Gram+, Gram-, rickettsie, micoplasmi, clamidie; battericida su Haemophilus, Neisseriae, S. pneumoniae); febbre tifoide, meningiti batteriche,…","adr":"tossicità mitocondriale; tossicità ematopoietica (anemia ipocromica, aplasia midollare); sindrome del bambino grigio (neonati, ridotta glicuronazione → accumulo;…","_s":"cloramfenicolo (caf) antibiotici-3 antibiotici cloramfenicolo interferisce con la subunità 50s → impedisce il legame del trna al sito accettore → blocca l'allungamento. spettro ampio (gram+, gram-, rickettsie, micoplasmi, clamidie; battericida su haemophilus, neisseriae, s. pneumoniae); febbre tifoide, meningiti batteriche, ascessi cerebrali, anaerobi, brucellosi, rickettsiosi, linfogranuloma venereo. riservato a germi difficili / quando alternative più sicure (tetracicline, fq, β-lattamici) non sono utilizzabili. tossicità mitocondriale; tossicità ematopoietica (anemia ipocromica, aplasia midollare); sindrome del bambino grigio (neonati, ridotta glicuronazione → accumulo; mortalità 40%); nausea, vomito, diarrea, ipersensibilità, edema angioneurotico, nevriti periferiche, neurite ottica, disturbi psichici."},{"id":"Antibiotici-3__aminoglicosidi-classe-meccanismo-cinetic","deck":"Antibiotici-3","mod":"I","name":"Aminoglicosidi (classe — meccanismo, cinetica e tossicità)","drugs":[],"o":26,"mecc":"si legano alla subunità 30S con duplice azione → inibiscono l'inizio della sintesi proteica E favoriscono proteine aberranti (misfolded/incomplete) che si…","ind":"prevalentemente Gram- (Pseudomonas aeruginosa, Klebsiella, Enterobacteriaceae, Proteus, E. coli); stafilococchi produttori di β-lattamasi sensibili; streptococchi…","adr":"basso indice terapeutico. OTOTOSSICITÀ (accumulo in endolinfa/perilinfa → VIII paio: tossicità vestibolare precoce — vertigini, nausea, vomito, nistagmo; cocleare…","_s":"aminoglicosidi (classe — meccanismo, cinetica e tossicità) antibiotici-3 antibiotici  si legano alla subunità 30s con duplice azione → inibiscono l'inizio della sintesi proteica e favoriscono proteine aberranti (misfolded/incomplete) che si inseriscono in membrana/parete → alterano la permeabilità → lisi. battericidi. prevalentemente gram- (pseudomonas aeruginosa, klebsiella, enterobacteriaceae, proteus, e. coli); stafilococchi produttori di β-lattamasi sensibili; streptococchi resistenti. (singoli farmaci → card dedicata.) basso indice terapeutico. ototossicità (accumulo in endolinfa/perilinfa → viii paio: tossicità vestibolare precoce — vertigini, nausea, vomito, nistagmo; cocleare subdola — prima alte poi basse frequenze → sordità bilaterale irreversibile; tinnito = segno precoce). nefrotossicità (accumulo corticale → danno tubulare/ira; 10% delle ira da farmaci; neomicina la peggiore; reversibile). blocco placca neuromuscolare (↓ rilascio acetilcolina → attenzione in miastenia gravis). ipersensibilità."},{"id":"Antibiotici-3__aminoglicosidi-singoli-farmaci","deck":"Antibiotici-3","mod":"I","name":"Aminoglicosidi — singoli farmaci","drugs":[],"o":26,"mecc":"","ind":"","adr":"","_s":"aminoglicosidi — singoli farmaci antibiotici-3 antibiotici    "},{"id":"Antibiotici-3__tetracicline","deck":"Antibiotici-3","mod":"I","name":"Tetracicline","drugs":[],"o":26,"mecc":"si inseriscono nella subunità 30S → impediscono il legame del tRNA al sito accettore. Struttura a 4 anelli con motivo chelante cationi bivalenti.","ind":"ampio spettro (Gram+, Gram-, aerobi, anaerobi, protozoi, spirochete, rickettsie, ureaplasmi, micoplasmi, clamidie); rickettsiosi, intracellulari,…","adr":"CONTROINDICATE < 8 anni e in gravidanza/allattamento (discromie/ipoplasia dentale irreversibili, ↓ resistenza ossea; nei neonati ↑ pressione endocranica);…","_s":"tetracicline antibiotici-3 antibiotici  si inseriscono nella subunità 30s → impediscono il legame del trna al sito accettore. struttura a 4 anelli con motivo chelante cationi bivalenti. ampio spettro (gram+, gram-, aerobi, anaerobi, protozoi, spirochete, rickettsie, ureaplasmi, micoplasmi, clamidie); rickettsiosi, intracellulari, brucellosi/colera, cocchi, genito-urinario, acne (propionibacterium acnes), h. pylori (in associazione). controindicate < 8 anni e in gravidanza/allattamento (discromie/ipoplasia dentale irreversibili, ↓ resistenza ossea; nei neonati ↑ pressione endocranica); tossicità gi diretta (esofagiti, erosioni/ulcere, pancreatiti, epatiti, colite pseudomembranosa); tossicità renale (nefrite interstiziale, ira — minore degli aminoglicosidi; ⚠️ tetracicline scadute = nefrotossiche); ipersensibilità rara (rash, angioedema); tromboflebiti, fotosensibilità; minociclina → disturbi vestibolari transitori."},{"id":"Beta-lattamici__lattamici-classe-quadro-generale","deck":"Beta-lattamici","mod":"I","name":"β-lattamici (classe — quadro generale)","drugs":[],"o":27,"mecc":"analoghi rigidi del dimero D-alanina–D-alanina; ingannano le transpeptidasi sostituendosi al substrato e bloccano in modo irreversibile la formazione dei legami…","ind":"variabili per molecola →  → disordini coagulazione (con warfarin)."},{"id":"Beta-lattamici__penicilline-resistenti-alle-lattamasi-me","deck":"Beta-lattamici","mod":"I","name":"Penicilline resistenti alle β-lattamasi (meticillina; isossazolil-penicilline: oxacillina, cloxacillina, dicloxacillina; nafcillina)","drugs":["meticillina","oxacillina","cloxacillina","dicloxacillina","nafcillina"],"o":27,"mecc":"β-lattamico; gruppo laterale ingombrante → minore sensibilità alle β-lattamasi.","ind":"meticillina → in origine S. aureus (\"antistafilococciche\") e streptococchi; isossazolil-penicilline → Gram+ produttori di β-lattamasi (tratto respiratorio, pelle,…","adr":"meticillina → nefrotossicità; isossazolil-penicilline → minore nefrotossicità rispetto alla meticillina.","_s":"penicilline resistenti alle β-lattamasi (meticillina; isossazolil-penicilline: oxacillina, cloxacillina, dicloxacillina; nafcillina) beta-lattamici antibiotici β-lattamici meticillina oxacillina cloxacillina dicloxacillina nafcillina β-lattamico; gruppo laterale ingombrante → minore sensibilità alle β-lattamasi. meticillina → in origine s. aureus (\"antistafilococciche\") e streptococchi; isossazolil-penicilline → gram+ produttori di β-lattamasi (tratto respiratorio, pelle, tessuti molli, genito-urinario). meticillina → nefrotossicità; isossazolil-penicilline → minore nefrotossicità rispetto alla meticillina."},{"id":"Beta-lattamici__aminopenicilline-amoxicillina-ampicillin","deck":"Beta-lattamici","mod":"I","name":"Aminopenicilline (amoxicillina, ampicillina)","drugs":["amoxicillina","ampicillina"],"o":27,"mecc":"β-lattamico; aggiunta del gruppo aminico.","ind":"infezioni vie aeree, genito-urinarie, dermatologiche, tessuti molli (germi non produttori di β-lattamasi); E. coli, Proteus, Shigella; Neisserie.","adr":"ipersensibilità; discomfort GI (quota orale residua nel tratto GI → effetto topico → selezione flora → colite pseudomembranosa); ↓ vitamina K → coagulazione…","_s":"aminopenicilline (amoxicillina, ampicillina) beta const $ = s=>document.querySelector(s);
let state = { q:'', mod:null, deck:null, sort:{k:'o',dir:1} };

function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function hi(s){ const q=state.q.trim(); if(!q) return esc(s); try{const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');return esc(s).replace(re,'<mark>$1</mark>');}catch(e){return esc(s);} }
function norm(s){return (s||'').toLowerCase();}
function dnHi(name, drugs){ let h=esc(name);
  (drugs||[]).slice().sort((a,b)=>b.length-a.length).forEach(d=>{ const e=esc(d).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); if(!e) return; h=h.replace(new RegExp(e,'gi'),'\x01$&\x02'); });
  return h.replace(/\x01/g,'<span class="dn">').replace(/\x02/g,'</span>'); }

function deckColor(id){const d=DECKS.find(x=>x.id===id);return d&&d.color?d.color:'#ece1cb';}
function deckTitle(id){const d=DECKS.find(x=>x.id===id);return d?d.title:id;}

function filtered(){
  const q=norm(state.q);
  let r=DATA.filter(x=>{
    if(state.mod && x.mod!==state.mod) return false;
    if(state.deck && x.deck!==state.deck) return false;
    if(q && !x._s.includes(q)) return false;
    return true;
  });
  const {k,dir}=state.sort;
  r=r.slice().sort((a,b)=>{
    let va=a[k], vb=b[k];
    if(k==='o'){ if(va!==vb) return (va-vb); return a.name.localeCompare(b.name,'it'); }
    return String(va).localeCompare(String(vb),'it')*dir;
  });
  return r;
}

function render(){
  const rows=filtered();
  $('#count').textContent = rows.length+' / '+DATA.length+' farmaci';
  if(!rows.length){ $('#tb').innerHTML='<tr><td colspan="5" class="empty">Nessun farmaco trovato 🐢</td></tr>'; return; }
  $('#tb').innerHTML = rows.map(x=>{
    const code = (DECKS.find(d=>d.id===x.deck)||{}).code || x.deck;
    const cls='<span class="dchip" style="background:'+deckColor(x.deck)+'44">'+esc(code)+'</span><span class="mod-pill mod-'+x.mod+'">Mod '+x.mod+'</span><small>'+esc(deckTitle(x.deck))+'</small>';
    const href='Flashcard-Farmacologia.html#front='+esc(x.id||'');
    return '<tr class="dr" data-id="'+esc(x.id||'')+'">'+
      '<td class="c-cls">'+cls+'</td>'+
      '<td class="c-name hN"><a class="namelink" href="'+href+'">'+dnHi(x.name,x.drugs)+'</a></td>'+
      '<td class="c-mecc col-d">'+hi(x.mecc||'—')+'</td>'+
      '<td class="c-ind col-d">'+hi(x.ind||'—')+'</td>'+
      '<td class="c-adr col-d">'+hi(x.adr||'—')+'</td>'+
    '</tr>'+
    '<tr class="exp"><td colspan="5"><div class="exp-in">'+
      '<div class="nm"><span class="exp-lab">Farmaco</span><a class="namelink" href="'+href+'">'+hi(x.name)+'</a></div>'+
      '<div class="eff">'+
        '<div><span class="exp-lab">Meccanismo</span>'+hi(x.mecc||'—')+'</div>'+
        '<div><span class="exp-lab">Indicazioni</span>'+hi(x.ind||'—')+'</div>'+
        '<div><span class="exp-lab">Reazioni avverse</span>'+hi(x.adr||'—')+'</div>'+
      '</div>'+
      '<a class="studia" href="'+href+'">↗ Studia in FarmacoFlash</a>'+
    '</div></td></tr>';
  }).join('');
}

function buildChips(){
  // modulo
  const mr=$('#modRow');
  [['Tutti',null],['Modulo I',  'I'],['Modulo II','II']].forEach(([t,v])=>{
    const b=document.createElement('button'); b.className='chip'+((state.mod===v)?' on':''); b.textContent=t;
    b.onclick=()=>{ state.mod=v; refreshChips(); render(); }; b.dataset.mod=String(v); mr.appendChild(b);
  });
  // classi
  const dr=$('#deckRow');
  DECKS.forEach(d=>{
    const b=document.createElement('button'); b.className='chip dk'; b.dataset.deck=d.id;
    b.style.background=d.color?d.color+'33':''; b.textContent=(d.code||d.id);
    b.title=d.title;
    b.onclick=()=>{ state.deck = (state.deck===d.id)?null:d.id; refreshChips(); render(); };
    dr.appendChild(b);
  });
}
function refreshChips(){
  document.querySelectorAll('#modRow .chip').forEach(b=>b.classList.toggle('on', b.dataset.mod===String(state.mod)));
  document.querySelectorAll('#deckRow .chip').forEach(b=>b.classList.toggle('on', b.dataset.deck===state.deck));
}

$('#q').addEventListener('input', e=>{ state.q=e.target.value; render(); });
let mode='all';
function setMode(m){
  mode=m;
  document.body.classList.remove('m-all','m-nomi','m-effetti');
  document.body.classList.add('m-'+m);
  document.querySelectorAll('.chip.mode').forEach(b=>b.classList.toggle('on', b.dataset.mode===m));
  document.querySelectorAll('tr.open').forEach(t=>t.classList.remove('open'));
  $('#hint').textContent = m==='nomi' ? '👆 Tocca un farmaco per vedere a cosa serve'
    : m==='effetti' ? '👆 Leggi gli effetti e prova a indovinare: tocca per scoprire il farmaco'
    : '👆 Tocca una riga per aprirla nello studio di FarmacoFlash';
}
document.querySelectorAll('.chip.mode').forEach(b=> b.addEventListener('click', ()=>setMode(b.dataset.mode)) );
$('#tb').addEventListener('click', e=>{
  const dr=e.target.closest('tr.dr');
  if(!dr) return;                 // click nel pannello (i link navigano di default)
  if(mode==='all'){ location.href='Flashcard-Farmacologia.html#front='+dr.dataset.id; return; }
  e.preventDefault();             // modalità studio: rivela, non navigare
  const exp=dr.nextElementSibling, open=dr.classList.toggle('open');
  if(exp && exp.classList.contains('exp')) exp.classList.toggle('open', open);
});
$('#clrBtn').addEventListener('click', ()=>{ state.q=''; state.mod=null; state.deck=null; $('#q').value=''; refreshChips(); render(); });
document.querySelectorAll('thead th').forEach(th=>{
  th.addEventListener('click', ()=>{
    const k=th.dataset.k;
    if(state.sort.k===k) state.sort.dir*=-1; else state.sort={k,dir:1};
    document.querySelectorAll('thead th').forEach(t=>t.classList.remove('s'));
    th.classList.add('s');
    render();
  });
});

const ALLDRUGS=[]; DATA.forEach(x=>(x.drugs||[]).forEach(dn=>ALLDRUGS.push({drug:dn,deck:x.deck,mod:x.mod,cls:deckTitle(x.deck),use:x.ind||x.mecc||''})));
const ALLCLS=[...new Set(ALLDRUGS.map(d=>d.cls))];
let quiz=null;
function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
function sample(arr,n,not){const o=[];for(const v of shuf(arr)){if(o.length>=n)break;if(not&&v===not)continue;if(o.indexOf(v)<0)o.push(v);}return o;}
function qPool(){const p=ALLDRUGS.filter(d=>(!state.mod||d.mod===state.mod)&&(!state.deck||d.deck===state.deck));return p.length?p:ALLDRUGS;}
function quizStart(kind){ if(ALLDRUGS.length<4)return; quiz={kind:kind||'mc',score:0,total:0,streak:0,best:0,wrong:[],pool:qPool(),answered:false}; $('#quiz').hidden=false; document.body.style.overflow='hidden'; quizNext(); }
function quizExit(){ $('#quiz').hidden=true; document.body.style.overflow=''; }
function quizNext(){
  quiz.answered=false;
  if(quiz.kind==='write') return quizWrite();
  const it=quiz.pool[Math.floor(Math.random()*quiz.pool.length)];
  const type=Math.random()<0.5?'cls':'drug'; let kicker,prompt,sub='',answer,options;
  if(type==='cls'){ kicker='A che classe appartiene?'; prompt='<span class="dn">'+esc(it.drug)+'</span>'; answer=it.cls; options=shuf([answer,...sample(ALLCLS,3,answer)]); }
  else{ kicker='Quale farmaco è di questa classe?'; prompt=esc(it.cls); sub=it.use?esc(it.use).slice(0,110):''; answer=it.drug; options=shuf([answer,...sample(ALLDRUGS.filter(d=>d.cls!==it.cls).map(d=>d.drug),3,answer)]); }
  quiz.cur={answer,options,it};
  $('#qScore').textContent='✔ '+quiz.score+'/'+quiz.total; $('#qStreak').textContent='🔥 '+quiz.streak;
  $('#qCard').innerHTML='<div class="q-kicker">'+kicker+'</div><div class="q-prompt">'+prompt+'</div>'+(sub?'<div class="q-sub">'+sub+'</div>':'')+'<div class="q-opts">'+options.map((o,i)=>'<button class="q-opt" onclick="quizAnswer('+i+')">'+esc(o)+'</button>').join('')+'</div><div class="q-next" id="qNext"></div>';
}
function quizAnswer(i){
  if(quiz.answered)return; quiz.answered=true;
  const ok=quiz.cur.options[i]===quiz.cur.answer; quiz.total++;
  if(ok){quiz.score++;quiz.streak++;quiz.best=Math.max(quiz.best,quiz.streak);}else{quiz.streak=0;quiz.wrong.push(quiz.cur.it);}
  document.querySelectorAll('.q-opt').forEach((b,bi)=>{b.disabled=true;if(quiz.cur.options[bi]===quiz.cur.answer)b.classList.add('ok');else if(bi===i)b.classList.add('no');});
  $('#qScore').textContent='✔ '+quiz.score+'/'+quiz.total; $('#qStreak').textContent='🔥 '+quiz.streak;
  $('#qNext').textContent= ok?'Giusto! 🎉':'Risposta: '+quiz.cur.answer;
  setTimeout(quizNext, ok?700:1450);
}
function nrm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();}
function lev(a,b){const m=a.length,n=b.length,d=[];for(let i=0;i<=m;i++)d[i]=[i];for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}
function quizWrite(){
  const it=quiz.pool[Math.floor(Math.random()*quiz.pool.length)];
  const members=[...new Set(ALLDRUGS.filter(d=>d.cls===it.cls).map(d=>d.drug))];
  const wtype=(Math.random()<0.5)?'target':'member'; let kicker,hint='';
  if(wtype==='target'){ const t=it.drug, ini=((t.match(/[A-Za-zÀ-ÿ]/)||[''])[0]).toUpperCase(), nl=t.replace(/\s/g,'').length;
    quiz.cur={wtype,cls:it.cls,members,use:it.use,target:t};
    kicker='✍️ Scrivi il farmaco preciso'; hint='<div class="q-hint">inizia per <b>'+ini+'</b> · '+nl+' lettere</div>'; }
  else{ quiz.cur={wtype,cls:it.cls,members,use:it.use}; kicker='✍️ Scrivi un farmaco di questa classe'; }
  $('#qScore').textContent='✔ '+quiz.score+'/'+quiz.total; $('#qStreak').textContent='🔥 '+quiz.streak;
  $('#qCard').innerHTML='<div class="q-kicker">'+kicker+'</div><div class="q-prompt">'+esc(it.cls)+'</div>'+(it.use?'<div class="q-sub">'+esc(it.use).slice(0,110)+'</div>':'')+hint+'<input class="q-in" id="qIn" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="scrivi qui il nome…" onkeydown="if(event.key===&quot;Enter&quot;)quizEnter()"><button class="q-go" id="qGo" onclick="quizSubmit()">Verifica</button><div class="q-next" id="qNext"></div>';
  const el=$('#qIn'); if(el) el.focus();
}
function quizSubmit(){
  if(quiz.answered)return; const el=$('#qIn'); const v=el?el.value:''; if(!nrm(v))return; quiz.answered=true;
  const members=quiz.cur.members, nv=nrm(v); quiz.total++; if(el) el.disabled=true;
  const near1=a=>{const na=nrm(a);return Math.abs(na.length-nv.length)<=2 && lev(na,nv)<=1;};
  let good=false,msg='';
  if(quiz.cur.wtype==='target'){
    const t=quiz.cur.target;
    if(nrm(t)===nv){good=true;msg='✓ Giusto: <b>'+esc(t)+'</b>';}
    else if(near1(t)){good=true;msg='Quasi! Si scrive: <b>'+esc(t)+'</b>';}
    else if(members.some(m=>nrm(m)===nv)){good=true;msg='Giusto, ma cercavo: <b>'+esc(t)+'</b>';}
    else{msg='✗ Era: <b>'+esc(t)+'</b>';}
  }else{
    const exact=members.find(m=>nrm(m)===nv), near=exact?null:members.find(near1);
    if(exact){good=true;msg='✓ Giusto: <b>'+esc(exact)+'</b>';}
    else if(near){good=true;msg='Quasi! Si scrive: <b>'+esc(near)+'</b>';}
    else{msg='✗ Si scrive, per es.: <b>'+esc(members[0])+'</b>';}
  }
  if(good){quiz.score++;quiz.streak++;quiz.best=Math.max(quiz.best,quiz.streak);if(el)el.classList.add('ok');}
  else{quiz.streak=0;quiz.wrong.push(quiz.cur);if(el)el.classList.add('no');}
  $('#qScore').textContent='✔ '+quiz.score+'/'+quiz.total; $('#qStreak').textContent='🔥 '+quiz.streak;
  $('#qNext').innerHTML=msg+'<div class="q-members">Tutti i nomi: <b>'+members.map(esc).join('</b> · <b>')+'</b></div>';
  const go=$('#qGo'); if(go){go.textContent='Avanti →';go.onclick=quizNext;}
}
function quizEnter(){ if(!quiz.answered) quizSubmit(); else quizNext(); }

buildChips();
setMode('all');
$('#foot').textContent = DATA.length+' farmaci · '+DECKS.length+' classi · Moduli I–II · dati dalle tue carte FarmacoFlash';
render();
</script>
