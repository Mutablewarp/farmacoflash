  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:26px 26px;
  -webkit-text-size-adjust:100%;padding-bottom:40px}
header{position:sticky;top:0;z-index:30;background:rgba(255,248,236,.97);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:2.5px dashed var(--ink);padding:14px max(16px,env(safe-area-inset-left)) 12px}
.hwrap{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.backapp{font-family:var(--font-display);font-weight:800;font-size:.9rem;background:var(--green);color:var(--ink);border:2.5px solid var(--ink);border-radius:13px 9px 12px 9px/9px 12px 9px 13px;padding:8px 14px;text-decoration:none;box-shadow:2px 2px 0 rgba(58,50,43,.2);white-space:nowrap;transition:transform .14s var(--spring)}
.backapp:hover{transform:translate(-1px,-2px);background:#6fd488}
.brand{display:flex;align-items:center;gap:12px}
.mk{width:40px;height:40px;flex:0 0 auto}
h1{font-family:var(--font-display);font-weight:800;font-size:1.5rem;margin:0;line-height:1}
.sub{font-family:var(--font-body);font-weight:800;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px}
main{max-width:1180px;margin:0 auto;padding:18px max(16px,env(safe-area-inset-left)) 0}
.search{width:100%;background:var(--paper-2);border:2.5px solid var(--ink);border-radius:16px 11px 15px 11px/11px 15px 11px 16px;padding:13px 16px;color:var(--ink);font-size:1.02rem;font-family:var(--font-body);font-weight:700;box-shadow:var(--shadow)}
.search::placeholder{color:var(--faint,#c2b39a)}
.row{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin:14px 0 6px}
.lab{font-family:var(--font-display);font-weight:700;font-size:.82rem;color:var(--ink-soft);margin-right:2px}
.chip{background:var(--paper-2);border:2.5px solid var(--ink);color:var(--ink);padding:5px 12px;border-radius:12px;font-size:.82rem;font-weight:800;cursor:pointer;transition:transform .15s var(--spring);box-shadow:2px 2px 0 rgba(58,50,43,.14);white-space:nowrap}
.chip:hover{transform:translateY(-1px)}
.chip.on{background:var(--yellow)}
.chip.dk{font-size:.78rem;padding:4px 10px}
.deckchips{max-height:104px;overflow:auto;padding:2px;gap:6px}
.count{font-family:var(--font-display);font-weight:700;color:var(--ink-soft);margin-left:auto;font-size:.9rem}
.tbl-wrap{margin-top:12px;border:2.5px solid var(--ink);border-radius:18px;overflow:auto;background:var(--paper-2);box-shadow:var(--shadow);max-height:calc(100vh - 250px)}
table{border-collapse:collapse;width:100%;min-width:880px}
thead th{position:sticky;top:0;z-index:2;background:#f3e7cd;border-bottom:2.5px solid var(--ink);text-align:left;font-family:var(--font-display);font-weight:800;font-size:.84rem;padding:11px 13px;color:var(--ink);cursor:pointer;user-select:none;white-space:nowrap}
thead th .ar{opacity:.4;font-size:.75rem}
thead th.s .ar{opacity:1;color:var(--red)}
tbody td{border-bottom:1.5px dotted #d9c9aa;padding:10px 13px;font-size:.9rem;vertical-align:top;line-height:1.32}
tbody tr:hover{background:#fffaf0}
.c-cls{white-space:nowrap}
.dchip{display:inline-block;font-family:var(--font-display);font-weight:800;font-size:.72rem;padding:2px 8px;border-radius:9px;border:2px solid var(--ink);color:var(--ink);margin-right:6px}
.c-cls small{color:var(--ink-soft);font-weight:800;font-size:.86rem;display:block;margin-top:5px;max-width:200px;white-space:normal;line-height:1.22}
.c-name{font-family:var(--font-display);font-weight:700;font-size:.98rem;color:var(--ink);min-width:180px;max-width:250px}
.drugtags{display:flex;flex-wrap:wrap;gap:5px 6px;margin-top:8px}
body.m-nomi .drugtags{gap:7px 8px;margin-top:10px}
.dtag{font-weight:700;font-size:.8rem;background:var(--yellow);color:var(--ink);border:1.6px solid rgba(58,50,43,.3);border-radius:9px 6px 8px 7px/7px 8px 6px 9px;padding:2px 9px;line-height:1.35;white-space:nowrap;box-shadow:1px 1px 0 rgba(58,50,43,.12);text-decoration:none;cursor:pointer;transition:transform .12s var(--spring),background .12s}
.dtag:hover{background:#ffd23f;border-color:var(--ink);transform:translate(-1px,-1px);box-shadow:2px 2px 0 rgba(58,50,43,.2)}
body.m-nomi .dtag{font-size:.92rem;padding:3px 11px}
.dtag mark{background:#ffcf2e;padding:0;border-radius:0}
/* ---- vista rubrica A→Z ---- */
#rubrica{display:none}
body.m-rubrica .tbl-wrap{max-height:none;overflow:visible;border:none;box-shadow:none;background:transparent;margin-top:6px}
body.m-rubrica .tbl-wrap table{display:none}
body.m-rubrica #rubrica{display:block;column-width:330px;column-gap:34px;padding:6px 2px 24px}
.rb-group{break-inside:avoid;margin:0 0 12px}
.rb-letter{font-family:var(--font-display);font-weight:800;font-size:1.2rem;color:var(--red);margin:4px 0 5px;border-bottom:2px dotted #d9c9aa;break-after:avoid}
.rb-row{padding:6px 3px;border-bottom:1.5px dotted #e3d6ba;break-inside:avoid}
.rb-name{display:inline-block;font-family:var(--font-display);font-weight:700;font-size:.96rem;color:var(--ink);background:var(--yellow);border-radius:6px 4px 6px 5px/5px 6px 4px 6px;padding:1px 7px}
.rb-name mark{background:#ffcf2e;padding:0}
.rb-cls-wrap{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.rb-cls{font-family:var(--font-display);font-weight:700;font-size:.72rem;padding:2px 8px;border-radius:7px;border:2px solid var(--ink);color:var(--ink);text-decoration:none;white-space:nowrap;transition:transform .12s;line-height:1.3}
.rb-cls b{font-weight:800;margin-right:2px}
.rb-cls:hover{transform:translateY(-1px);background:#fff3d6}
.c-mecc,.c-ind,.c-adr{color:var(--ink-soft);font-weight:600;max-width:235px}
.mod-pill{display:inline-block;font-size:.66rem;font-weight:800;padding:1px 6px;border-radius:7px;border:1.5px solid var(--ink);margin-left:6px;color:var(--ink)}
.mod-I{background:#e7f0ff}.mod-II{background:#ffe9f1}
.empty{padding:40px;text-align:center;color:var(--muted);font-family:var(--font-display);font-weight:700;font-size:1.05rem}
mark{background:var(--yellow);color:var(--ink);border-radius:3px;padding:0 1px}
/* ---- modalità di vista (studio) ---- */
body.m-nomi .col-d{display:none}            /* Solo nomi: nascondi gli effetti */
body.m-nomi table{min-width:0}
body.m-nomi .c-name{max-width:none}
body.m-effetti .hN{display:none}            /* Solo effetti: nascondi il nome */
/* righe rivelabili al click */
body:not(.m-all) tbody tr.dr{cursor:pointer}
body:not(.m-all) tbody tr.dr:hover{background:#fff3d6}
tr.dr.open{background:#fffaf0}
tr.exp{display:none}
tr.exp.open{display:table-row}
tr.exp td{background:#fffdf5;border-bottom:2px solid var(--ink)}
.exp-in{padding:2px 4px 8px;animation:exp .22s ease both}
@keyframes exp{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.exp-lab{font-family:var(--font-display);font-weight:800;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-right:7px}
.exp-in .eff>div{margin:5px 0;color:var(--ink-soft);font-weight:600;font-size:.92rem;line-height:1.4}
.exp-in .nm{font-family:var(--font-display);font-weight:700;font-size:1.15rem;color:var(--ink)}
.exp .eff,.exp .nm{display:none}
body.m-nomi tr.exp.open .eff{display:block}
body.m-effetti tr.exp.open .nm{display:block}
.hint{max-width:1180px;margin:1px auto 0;padding:0 16px;color:var(--blue);font-weight:800;font-size:.84rem;min-height:1.1em}
/* collegamento alla scheda di studio in FarmacoFlash */
.namelink{color:inherit;text-decoration:none}
body.m-all .c-name .namelink:hover,.exp .namelink:hover{color:var(--blue);text-decoration:underline}
body.m-all tbody tr.dr{cursor:pointer}
body.m-all tbody tr.dr:hover{background:#fff3d6}
.studia{display:inline-block;margin-top:11px;font-family:var(--font-display);font-weight:800;font-size:.86rem;color:var(--ink);background:var(--green);border:2.5px solid var(--ink);border-radius:12px 8px 11px 8px/8px 11px 8px 12px;padding:7px 15px;text-decoration:none;box-shadow:2px 2px 0 rgba(58,50,43,.2);transition:transform .14s var(--spring)}
.studia:hover{transform:translate(-1px,-2px);background:#6fd488}
.foot{max-width:1180px;margin:14px auto 0;padding:0 16px;color:var(--muted);font-weight:700;font-size:.78rem;text-align:center}
/* nomi farmaco evidenziati */
.dn{font-weight:800;background:linear-gradient(transparent 58%, #ffe08a 58%);border-radius:2px;padding:0 1px}
/* quiz nomi */
.quizbtn{background:var(--green);border-color:var(--ink)}
.quiz[hidden]{display:none}
.quiz{position:fixed;inset:0;z-index:60;background:var(--paper);display:flex;flex-direction:column;padding:14px max(16px,env(safe-area-inset-left)) calc(20px + env(safe-area-inset-bottom));overflow:auto}
.quiz-top{display:flex;align-items:center;gap:12px;max-width:680px;margin:0 auto;width:100%}
.quiz-score{font-family:var(--font-display);font-weight:800;color:#3da85a}
.quiz-streak{font-family:var(--font-display);font-weight:800;color:var(--orange);margin-left:auto}
.quiz-card{max-width:680px;margin:22px auto 0;width:100%;border:3px solid var(--ink);border-radius:22px 16px 24px 16px/16px 24px 16px 22px;background:var(--paper-2);box-shadow:var(--shadow);padding:24px 22px}
.q-kicker{font-family:var(--font-display);font-weight:800;font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.q-prompt{font-family:var(--font-display);font-weight:700;font-size:1.55rem;line-height:1.2;margin:6px 0 2px;color:var(--ink)}
.q-sub{color:#6f6253;font-weight:700;font-size:.92rem;margin-top:4px}
.q-opts{display:grid;gap:11px;margin-top:18px}
.q-opt{text-align:left;background:var(--paper);border:2.5px solid var(--ink);border-radius:14px 9px 13px 9px/9px 13px 9px 14px;padding:13px 16px;font-family:var(--font-body);font-weight:800;font-size:1.04rem;color:var(--ink);cursor:pointer;box-shadow:2px 2px 0 rgba(58,50,43,.16);transition:transform .12s var(--spring)}
.q-opt:hover{transform:translate(-1px,-2px)}
.q-opt.ok{background:#cdeecd;border-color:#3da85a}
.q-opt.no{background:#ffd9d9;border-color:var(--red)}
.q-next{margin-top:15px;text-align:center;color:#6f6253;font-weight:800;font-size:.9rem;min-height:1.1em}
.q-in{width:100%;box-sizing:border-box;margin-top:18px;background:#fff;border:2.5px solid var(--ink);border-radius:13px;padding:14px 16px;font-family:var(--font-body);font-weight:800;font-size:1.15rem;color:var(--ink);box-shadow:inset 1px 1px 0 rgba(58,50,43,.08)}
.q-in:focus{outline:none;border-color:var(--blue)}
.q-in.ok{border-color:#3da85a;background:#eafaea}
.q-in.no{border-color:var(--red);background:#fff1f1}
.q-go{margin-top:14px;font-family:var(--font-display);font-weight:800;font-size:1rem;color:var(--ink);background:var(--green);border:2.5px solid var(--ink);border-radius:13px 9px 12px 9px/9px 12px 9px 13px;padding:11px 22px;cursor:pointer;box-shadow:2px 2px 0 rgba(58,50,43,.2)}
.q-go:hover{transform:translate(-1px,-2px)}
.q-members{margin-top:12px;font-weight:700;color:#6f6253;font-size:.9rem;line-height:1.6}
.q-members b{color:var(--ink);background:linear-gradient(transparent 60%, #ffe08a 60%);padding:0 2px;border-radius:2px}
.q-study{display:block;width:fit-content;margin:16px auto 0;font-family:var(--font-display);font-weight:800;font-size:.95rem;color:var(--ink);background:var(--green);border:2.5px solid var(--ink);border-radius:13px 9px 12px 9px/9px 12px 9px 13px;padding:10px 18px;text-decoration:none;box-shadow:2px 2px 0 rgba(58,50,43,.2);transition:transform .14s var(--spring)}
.q-study:hover{transform:translate(-1px,-2px);background:#6fd488}
.q-hint{margin-top:7px;font-family:var(--font-display);font-weight:800;color:var(--blue);font-size:1rem}
.q-hint b{font-size:1.15rem}
.q-nav{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.q-back,.q-fwd{font-family:var(--font-display);font-weight:800;font-size:.95rem;border:2.5px solid var(--ink);border-radius:12px 8px 11px 8px/8px 11px 8px 12px;padding:9px 16px;cursor:pointer;box-shadow:2px 2px 0 rgba(58,50,43,.18)}
.q-back{background:var(--paper-2);color:var(--ink)}
.q-fwd{background:var(--green);color:var(--ink)}
.q-back[disabled]{opacity:.4;cursor:default;box-shadow:none}
.q-back:hover:not([disabled]),.q-fwd:hover{transform:translate(-1px,-2px)}
.q-warn{color:var(--orange);font-weight:800}
.q-errlist{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;max-height:46vh;overflow:auto}
.q-err{background:#ffe7e7;border:2px solid var(--ink);border-radius:10px;padding:4px 10px;font-weight:800;font-size:.9rem}
.q-err b{color:#e85555}
@media(max-width:560px){
  h1{font-size:1.25rem} .tbl-wrap{max-height:calc(100vh - 290px)}
  thead th,tbody td{padding:9px 10px}
}
</style>

const $ = s=>document.querySelector(s);
let state = { q:'', mod:null, deck:null, sort:{k:'o',dir:1} };

function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function hi(s){ const toks=state.q.trim().split(/\s+/).filter(Boolean); if(!toks.length) return esc(s); let h=esc(s); try{const re=new RegExp('('+toks.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')','ig'); h=h.replace(re,'<mark>$1</mark>'); }catch(e){} return h; }
function norm(s){const GK={'α':'alfa','β':'beta','γ':'gamma','δ':'delta','ε':'epsilon','κ':'kappa','λ':'lambda','μ':'mu','π':'pi','σ':'sigma','τ':'tau','φ':'phi','ω':'omega'};return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[αβγδεκλμπστφω]/g,m=>' '+(GK[m]||'')+' ').replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim();}
function dnHi(name, drugs){ let h=esc(name);
  (drugs||[]).slice().sort((a,b)=>b.length-a.length).forEach(d=>{ const e=esc(d).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); if(!e) return; h=h.replace(new RegExp(e,'gi'),'\x01$&\x02'); });
  return h.replace(/\x01/g,'<span class="dn">').replace(/\x02/g,'</span>'); }

function deckColor(id){const d=DECKS.find(x=>x.id===id);return d&&d.color?d.color:'#ece1cb';}
function deckTitle(id){const d=DECKS.find(x=>x.id===id);return d?d.title:id;}

function filtered(){
  const toks=norm(state.q).split(' ').filter(Boolean);
  let r=DATA.filter(x=>{
    if(state.mod && x.mod!==state.mod) return false;
    if(state.deck && x.deck!==state.deck) return false;
    if(toks.length && !toks.every(t=>x._s.includes(t))) return false;
    return true;
  });
  const {k,dir}=state.sort;
  r=r.slice().sort((a,b)=>{
    let va=a[k], vb=b[k];
    if(k==='o'){ if(va!==vb) return (va-vb); return a.name.localeCompare(b.name,'it'); }
    return String(va).localeCompare(String(vb),'it')*dir;
  });
  return r;
}

function render(){
  if(document.body.classList.contains('m-rubrica')) return renderRubrica();
  const rows=filtered();
  const nd=new Set(); rows.forEach(x=>(x.drugs||[]).forEach(d=>nd.add(d)));
  $('#count').textContent = nd.size+' farmaci · '+rows.length+'/'+DATA.length+' schede';
  if(!rows.length){ $('#tb').innerHTML='<tr><td colspan="5" class="empty">Nessun farmaco trovato 🐢</td></tr>'; return; }
  $('#tb').innerHTML = rows.map(x=>{
    const code = (DECKS.find(d=>d.id===x.deck)||{}).code || x.deck;
    const cls='<span class="dchip" style="background:'+deckColor(x.deck)+'44">'+esc(code)+'</span><span class="mod-pill mod-'+x.mod+'">Mod '+x.mod+'</span><small>'+esc(deckTitle(x.deck))+'</small>';
    const href='Flashcard-Farmacologia.html#front='+esc(x.id||'');
    return '<tr class="dr" data-id="'+esc(x.id||'')+'">'+
      '<td class="c-cls">'+cls+'</td>'+
      '<td class="c-name hN"><a class="namelink" href="'+href+'">'+dnHi(x.name,x.drugs)+'</a>'+(x.drugs&&x.drugs.length?'<div class="drugtags">'+x.drugs.map(dn=>'<a class="dtag" href="'+href+'">'+hi(dn)+'</a>').join('')+'</div>':'')+'</td>'+
      '<td class="c-mecc col-d">'+hi(x.mecc||'—')+'</td>'+
      '<td class="c-ind col-d">'+hi(x.ind||'—')+'</td>'+
      '<td class="c-adr col-d">'+hi(x.adr||'—')+'</td>'+
    '</tr>'+
    '<tr class="exp"><td colspan="5"><div class="exp-in">'+
      '<div class="nm"><span class="exp-lab">Farmaco</span><a class="namelink" href="'+href+'">'+hi(x.name)+'</a></div>'+
      '<div class="eff">'+
        '<div><span class="exp-lab">Meccanismo</span>'+hi(x.mecc||'—')+'</div>'+
        '<div><span class="exp-lab">Indicazioni</span>'+hi(x.ind||'—')+'</div>'+
        '<div><span class="exp-lab">Reazioni avverse</span>'+hi(x.adr||'—')+'</div>'+
      '</div>'+
      '<a class="studia" href="'+href+'">↗ Studia in FarmacoFlash</a>'+
    '</div></td></tr>';
  }).join('');
}

let _DIDX=null;
function drugIndex(){
  if(_DIDX) return _DIDX;
  const m=new Map();
  DATA.forEach(x=>(x.drugs||[]).forEach(dn=>{
    if(!m.has(dn)) m.set(dn,[]);
    m.get(dn).push({id:x.id,deck:x.deck,code:(DECKS.find(d=>d.id===x.deck)||{}).code||x.deck,title:deckTitle(x.deck),mod:x.mod});
  }));
  _DIDX=m; return m;
}
function renderRubrica(){
  const toks=norm(state.q).split(' ').filter(Boolean), m=drugIndex();
  const sel=dn=>{ let r=m.get(dn); if(state.mod) r=r.filter(o=>o.mod===state.mod); if(state.deck) r=r.filter(o=>o.deck===state.deck); return r; };
  let names=[...m.keys()].filter(dn=>{
    const refs=sel(dn); if(!refs.length) return false;
    if(toks.length){ const hay=norm(dn+' '+refs.map(r=>r.code+' '+r.title).join(' ')); if(!toks.every(t=>hay.includes(t))) return false; }
    return true;
  });
  names.sort((a,b)=>a.localeCompare(b,'it'));
  $('#count').textContent = names.length+' farmaci (A→Z)';
  if(!names.length){ $('#rubrica').innerHTML='<div class="empty">Nessun farmaco trovato 🐢</div>'; return; }
  const groups={}, order=[];
  names.forEach(dn=>{ let i=(dn[0]||'#').toUpperCase(); if(!/[A-Z]/.test(i)) i='#'; if(!groups[i]){groups[i]=[];order.push(i);} groups[i].push(dn); });
  $('#rubrica').innerHTML = order.map(letter=>{
    const rows=groups[letter].map(dn=>{
      const seen={}, chips=sel(dn).filter(r=>seen[r.code]?false:(seen[r.code]=1))
        .map(r=>{const nm=r.title.length>26?r.title.slice(0,25)+'…':r.title; return '<a class="rb-cls" href="Flashcard-Farmacologia.html#front='+esc(r.id)+'" style="background:'+deckColor(r.deck)+'33" title="'+esc(r.title)+'"><b>'+esc(r.code)+'</b> '+esc(nm)+'</a>';}).join('');
      return '<div class="rb-row"><span class="rb-name">'+hi(dn)+'</span><span class="rb-cls-wrap">'+chips+'</span></div>';
    }).join('');
    return '<div class="rb-group"><div class="rb-letter">'+esc(letter)+'</div>'+rows+'</div>';
  }).join('');
}

function buildChips(){
  // modulo
  const mr=$('#modRow');
  [['Tutti',null],['Modulo I',  'I'],['Modulo II','II']].forEach(([t,v])=>{
    const b=document.createElement('button'); b.className='chip'+((state.mod===v)?' on':''); b.textContent=t;
    b.onclick=()=>{ state.mod=v; refreshChips(); render(); }; b.dataset.mod=String(v); mr.appendChild(b);
  });
  // classi
  const dr=$('#deckRow');
  DECKS.forEach(d=>{
    const b=document.createElement('button'); b.className='chip dk'; b.dataset.deck=d.id;
    b.style.background=d.color?d.color+'33':''; b.textContent=(d.code||d.id);
    b.title=d.title;
    b.onclick=()=>{ state.deck = (state.deck===d.id)?null:d.id; refreshChips(); render(); };
    dr.appendChild(b);
  });
}
function refreshChips(){
  document.querySelectorAll('#modRow .chip').forEach(b=>b.classList.toggle('on', b.dataset.mod===String(state.mod)));
  document.querySelectorAll('#deckRow .chip').forEach(b=>b.classList.toggle('on', b.dataset.deck===state.deck));
}

$('#q').addEventListener('input', e=>{ state.q=e.target.value; render(); });
let mode='all';
function setMode(m){
  mode=m;
  document.body.classList.remove('m-all','m-nomi','m-effetti','m-rubrica');
  document.body.classList.add('m-'+m);
  document.querySelectorAll('.chip.mode').forEach(b=>b.classList.toggle('on', b.dataset.mode===m));
  document.querySelectorAll('tr.open').forEach(t=>t.classList.remove('open'));
  $('#hint').textContent = m==='nomi' ? '👆 Tocca un farmaco per vedere a cosa serve'
    : m==='effetti' ? '👆 Leggi gli effetti e prova a indovinare: tocca per scoprire il farmaco'
    : m==='rubrica' ? '🔤 Tutti i farmaci in ordine alfabetico — tocca un codice classe per studiarlo'
    : '👆 Tocca una riga per aprirla nello studio di FarmacoFlash';
  render();
}
document.querySelectorAll('.chip.mode').forEach(b=> b.addEventListener('click', ()=>setMode(b.dataset.mode)) );
$('#tb').addEventListener('click', e=>{
  const dr=e.target.closest('tr.dr');
  if(!dr) return;                 // click nel pannello (i link navigano di default)
  if(mode==='all'){ location.href='Flashcard-Farmacologia.html#front='+dr.dataset.id; return; }
  e.preventDefault();             // modalità studio: rivela, non navigare
  const exp=dr.nextElementSibling, open=dr.classList.toggle('open');
  if(exp && exp.classList.contains('exp')) exp.classList.toggle('open', open);
});
$('#clrBtn').addEventListener('click', ()=>{ state.q=''; state.mod=null; state.deck=null; $('#q').value=''; refreshChips(); render(); });
document.querySelectorAll('thead th').forEach(th=>{
  th.addEventListener('click', ()=>{
    const k=th.dataset.k;
    if(state.sort.k===k) state.sort.dir*=-1; else state.sort={k,dir:1};
    document.querySelectorAll('thead th').forEach(t=>t.classList.remove('s'));
    th.classList.add('s');
    render();
  });
});

const ALLDRUGS=[]; DATA.forEach(x=>(x.drugs||[]).forEach(dn=>ALLDRUGS.push({drug:dn,id:x.id,deck:x.deck,mod:x.mod,cls:deckTitle(x.deck),use:x.ind||x.mecc||''})));
const ALLCLS=[...new Set(ALLDRUGS.map(d=>d.cls))];
const QKEY='farmaco-quiz-v1';
let qstore=(()=>{try{return JSON.parse(localStorage.getItem(QKEY))||{};}catch(e){return {};}})();
qstore.wrong=qstore.wrong||{}; qstore.answered=qstore.answered||0; qstore.correct=qstore.correct||0;
function qsave(){try{localStorage.setItem(QKEY,JSON.stringify(qstore));}catch(e){}}
let quiz=null;
function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;}
function sample(arr,n,not){const o=[];for(const v of shuf(arr)){if(o.length>=n)break;if(not&&v===not)continue;if(o.indexOf(v)<0)o.push(v);}return o;}
function nrm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();}
function lev(a,b){const m=a.length,n=b.length,d=[];for(let i=0;i<=m;i++)d[i]=[i];for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}
function qPool(){const p=ALLDRUGS.filter(d=>(!state.mod||d.mod===state.mod)&&(!state.deck||d.deck===state.deck));return p.length?p:ALLDRUGS;}
function quizStart(kind, errorsOnly){
  if(ALLDRUGS.length<4)return;
  let pool=qPool();
  if(errorsOnly){ const ew=Object.keys(qstore.wrong).filter(k=>qstore.wrong[k]>0); const p=ALLDRUGS.filter(d=>ew.indexOf(d.drug)>=0); if(p.length) pool=p; }
  quiz={kind:kind||'mc',errorsOnly:!!errorsOnly,score:0,total:0,streak:0,best:0,pool:pool,used:new Set(),hist:[],hidx:-1};
  $('#quiz').hidden=false; document.body.style.overflow='hidden'; quizNext();
}
function quizExit(){ $('#quiz').hidden=true; document.body.style.overflow=''; }
function topBar(){ $('#qScore').textContent='✔ '+quiz.score+'/'+quiz.total; $('#qStreak').textContent='🔥 '+quiz.streak; }
function buildQ(){
  let avail=quiz.pool.filter(d=>!quiz.used.has(d.drug)); if(!avail.length){ quiz.used.clear(); avail=quiz.pool; }
  const it=avail[Math.floor(Math.random()*avail.length)];
  const members=[...new Set(ALLDRUGS.filter(d=>d.cls===it.cls).map(d=>d.drug))];
  if(quiz.kind==='write'){
    const wtype=(members.length>1 && Math.random()<0.5)?'target':'member';
    const q={mode:'write',wtype:wtype,members:members,target:it.drug,focus:it.drug,cardId:it.id,prompt:esc(it.cls),sub:it.use?esc(it.use).slice(0,110):'',hint:'',done:false};
    if(wtype==='target'){ const t=it.drug, ini=((t.match(/[A-Za-zÀ-ÿ]/)||[''])[0]).toUpperCase(), nl=t.replace(/\s/g,'').length;
      q.kicker='✍️ Scrivi il farmaco preciso'; q.hint='<div class="q-hint">inizia per <b>'+ini+'</b> · '+nl+' lettere</div>'; }
    else q.kicker='✍️ Scrivi un farmaco di questa classe (nuovo)';
    return q;
  }
  const type=Math.random()<0.5?'cls':'drug';
  if(type==='cls') return {mode:'mc',type:type,answer:it.cls,focus:it.drug,cardId:it.id,kicker:'A che classe appartiene?',prompt:'<span class="dn">'+esc(it.drug)+'</span>',sub:'',options:shuf([it.cls,...sample(ALLCLS,3,it.cls)]),done:false};
  return {mode:'mc',type:type,answer:it.drug,focus:it.drug,cardId:it.id,kicker:'Quale farmaco è di questa classe?',prompt:esc(it.cls),sub:it.use?esc(it.use).slice(0,110):'',options:shuf([it.drug,...sample(ALLDRUGS.filter(d=>d.cls!==it.cls).map(d=>d.drug),3,it.drug)]),done:false};
}
function qNav(){
  const cur=quiz.hist[quiz.hidx];
  const fwd=(cur&&cur.done)?'<button class="q-fwd" onclick="quizNext()">'+(quiz.hidx<quiz.hist.length-1?'Avanti →':'Nuova →')+'</button>':'';
  return '<div class="q-nav"><button class="q-back"'+(quiz.hidx>0?'':' disabled')+' onclick="quizBack()">← Indietro</button>'+fwd+'</div>';
}
function renderQ(q){
  topBar();
  let b='<div class="q-kicker">'+q.kicker+'</div><div class="q-prompt">'+q.prompt+'</div>'+(q.sub?'<div class="q-sub">'+q.sub+'</div>':'')+(q.hint||'');
  if(q.mode==='mc'){
    b+='<div class="q-opts">'+q.options.map((o,i)=>{let c='q-opt';if(q.done){if(o===q.answer)c+=' ok';else if(o===q.chosen)c+=' no';}return '<button class="'+c+'"'+(q.done?' disabled':'')+' onclick="quizAnswer('+i+')">'+esc(o)+'</button>';}).join('')+'</div>';
    b+='<div class="q-next" id="qNext">'+(q.done?(q.feedback||''):'')+'</div>';
  }else{
    b+='<input class="q-in'+(q.done?(q.wasCorrect?' ok':' no'):'')+'" id="qIn" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="scrivi qui il nome…"'+(q.done?' value="'+esc(q.chosen||'')+'" disabled':'')+' onkeydown="if(event.key===&quot;Enter&quot;)quizEnter()">'+(q.done?'':'<button class="q-go" id="qGo" onclick="quizSubmit()">Verifica</button>')+'<div class="q-next" id="qNext">'+(q.done?(q.feedback||''):'')+'</div>';
  }
  if(q.done && q.cardId) b+='<a class="q-study" href="Flashcard-Farmacologia.html#front='+esc(q.cardId)+'">📖 Studia questa scheda</a>';
  b+=qNav();
  $('#qCard').innerHTML=b;
  if(!q.done && q.mode==='write'){ const el=$('#qIn'); if(el) el.focus(); }
}
function quizNext(){
  if(quiz.hidx<quiz.hist.length-1){ quiz.hidx++; renderQ(quiz.hist[quiz.hidx]); return; }
  const q=buildQ(); quiz.hist.push(q); quiz.hidx=quiz.hist.length-1; renderQ(q);
}
function quizBack(){ if(quiz.hidx>0){ quiz.hidx--; renderQ(quiz.hist[quiz.hidx]); } }
function scoreQ(q,canon){
  quiz.total++; qstore.answered++;
  if(q.wasCorrect){ quiz.score++; quiz.streak++; quiz.best=Math.max(quiz.best,quiz.streak); qstore.correct++; quiz.used.add(canon||q.focus); }
  else { quiz.streak=0; qstore.wrong[q.focus]=(qstore.wrong[q.focus]||0)+1; }
  qsave();
}
function quizAnswer(i){
  const q=quiz.hist[quiz.hidx]; if(!q||q.done||q.mode!=='mc')return;
  q.done=true; q.chosen=q.options[i]; q.wasCorrect=(q.chosen===q.answer);
  scoreQ(q); q.feedback=q.wasCorrect?'Giusto! 🎉':'Risposta: <b>'+esc(q.answer)+'</b>';
  renderQ(q);
}
function quizSubmit(){
  const q=quiz.hist[quiz.hidx]; if(!q||q.done||q.mode!=='write')return;
  const el=$('#qIn'); const v=el?el.value:''; if(!nrm(v))return;
  const members=q.members, nv=nrm(v), near1=a=>{const na=nrm(a);return Math.abs(na.length-nv.length)<=2 && lev(na,nv)<=1;};
  if(q.wtype==='member'){ const hit=members.find(m=>nrm(m)===nv); if(hit&&quiz.used.has(hit)){ $('#qNext').innerHTML='<span class="q-warn">⚠️ <b>'+esc(hit)+'</b> già usato — scrivine uno <b>nuovo</b>!</span>'; el.value=''; el.focus(); return; } }
  q.done=true; q.chosen=v; let good=false,msg='',canon='';
  if(q.wtype==='target'){ const t=q.target;
    if(nrm(t)===nv){good=true;canon=t;msg='✓ Giusto: <b>'+esc(t)+'</b>';}
    else if(near1(t)){good=true;canon=t;msg='Quasi! Si scrive: <b>'+esc(t)+'</b>';}
    else if(members.some(m=>nrm(m)===nv)){good=true;canon=members.find(m=>nrm(m)===nv);msg='Giusto, ma cercavo: <b>'+esc(t)+'</b>';}
    else msg='✗ Era: <b>'+esc(t)+'</b>';
  }else{ const exact=members.find(m=>nrm(m)===nv), near=exact?null:members.find(near1);
    if(exact){good=true;canon=exact;msg='✓ Giusto: <b>'+esc(exact)+'</b>';}
    else if(near){good=true;canon=near;msg='Quasi! Si scrive: <b>'+esc(near)+'</b>';}
    else msg='✗ Si scrive, per es.: <b>'+esc(members[0])+'</b>';
  }
  q.wasCorrect=good; scoreQ(q,canon);
  q.feedback=msg+'<div class="q-members">Tutti i nomi: <b>'+members.map(esc).join('</b> · <b>')+'</b></div>';
  renderQ(q);
}
function quizEnter(){ const q=quiz.hist[quiz.hidx]; if(q&&!q.done) quizSubmit(); else quizNext(); }
function quizErrors(){
  $('#quiz').hidden=false; document.body.style.overflow='hidden';
  const ent=Object.keys(qstore.wrong).filter(k=>qstore.wrong[k]>0).map(k=>[k,qstore.wrong[k]]).sort((a,b)=>b[1]-a[1]);
  $('#qScore').textContent='Risposte: '+qstore.answered; $('#qStreak').textContent='✔ '+qstore.correct;
  let b='<div class="q-kicker">📊 I tuoi errori (nel tempo)</div>';
  if(!ent.length){ b+='<div class="q-prompt" style="font-size:1.2rem">Nessun errore registrato 🎉</div><div class="q-nav"><button class="q-back" onclick="quizExit()">Chiudi</button></div>'; }
  else{ b+='<div class="q-sub">'+ent.length+' nomi da rivedere (i più sbagliati in alto).</div><div class="q-errlist">'+ent.slice(0,80).map(e=>'<span class="q-err"><b>'+esc(e[0])+'</b> ×'+e[1]+'</span>').join('')+'</div>';
    b+='<div class="q-nav"><button class="q-fwd" onclick="quizStart(&quot;write&quot;,true)">✍️ Riscrivi gli errori</button><button class="q-fwd" onclick="quizStart(&quot;mc&quot;,true)">🎯 Ripassa (scelta)</button></div>';
    b+='<div class="q-nav"><button class="q-back" onclick="qClearErr()">🗑 Azzera</button><button class="q-back" onclick="quizExit()">Chiudi</button></div>'; }
  $('#qCard').innerHTML=b;
}
function qClearErr(){ if(confirm('Azzerare lo storico degli errori del quiz?')){ qstore.wrong={}; qsave(); quizErrors(); } }

function applyUrlState(){
  try{
    const p=new URLSearchParams(location.search||''); const h=new URLSearchParams((location.hash||'').replace(/^#/,''));
    const get=k=>p.get(k)||h.get(k);
    const q=get('q'); if(q){ state.q=q; const el=$('#q'); if(el) el.value=q; }
    const dk=get('deck'); if(dk && DECKS.some(d=>d.id===dk)) state.deck=dk;
    const md=get('mod'); if(md==='I'||md==='II') state.mod=md;
    refreshChips();
    const v=get('vista')||get('view'); if(v && ['nomi','effetti','rubrica'].indexOf(v)>=0) return v;
  }catch(e){}
  return null;
}
buildChips();
const _initView=applyUrlState();
$('#foot').textContent = DATA.length+' farmaci · '+DECKS.length+' classi · Moduli I–II · dati dalle tue carte FarmacoFlash';
setMode(_initView||'all');
</script>
