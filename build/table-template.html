<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tabella Farmaci · FarmacoFlash</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fff8ec; --paper-2:#fffdf7; --grid:rgba(140,110,60,.09);
  --ink:#3a322b; --ink-soft:#6f6253; --muted:#a3937e;
  --red:#ff6b6b; --yellow:#ffce3a; --blue:#4ea8de; --green:#5bc873; --purple:#b07cd6; --orange:#ff9f5a; --pink:#ff8fb1;
  --font-display:'Shantell Sans','Comic Sans MS',cursive; --font-body:'Nunito',system-ui,-apple-system,sans-serif;
  --shadow:3px 3px 0 rgba(58,50,43,.16); --spring:cubic-bezier(.34,1.52,.64,1);
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--font-body);font-weight:700;color:var(--ink);
  background:var(--paper);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:26px 26px;
  -webkit-text-size-adjust:100%;padding-bottom:40px}
header{position:sticky;top:0;z-index:30;background:rgba(255,248,236,.97);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:2.5px dashed var(--ink);padding:14px max(16px,env(safe-area-inset-left)) 12px}
.hwrap{max-width:1180px;margin:0 auto}
.brand{display:flex;align-items:center;gap:12px}
.mk{width:40px;height:40px;flex:0 0 auto}
h1{font-family:var(--font-display);font-weight:800;font-size:1.5rem;margin:0;line-height:1}
.sub{font-family:var(--font-body);font-weight:800;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px}
main{max-width:1180px;margin:0 auto;padding:18px max(16px,env(safe-area-inset-left)) 0}
.search{width:100%;background:var(--paper-2);border:2.5px solid var(--ink);border-radius:16px 11px 15px 11px/11px 15px 11px 16px;padding:13px 16px;color:var(--ink);font-size:1.02rem;font-family:var(--font-body);font-weight:700;box-shadow:var(--shadow)}
.search::placeholder{color:var(--faint,#c2b39a)}
.row{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin:14px 0 6px}
.lab{font-family:var(--font-display);font-weight:700;font-size:.82rem;color:var(--ink-soft);margin-right:2px}
.chip{background:var(--paper-2);border:2.5px solid var(--ink);color:var(--ink);padding:5px 12px;border-radius:12px;font-size:.82rem;font-weight:800;cursor:pointer;transition:transform .15s var(--spring);box-shadow:2px 2px 0 rgba(58,50,43,.14);white-space:nowrap}
.chip:hover{transform:translateY(-1px)}
.chip.on{background:var(--yellow)}
.chip.dk{font-size:.78rem;padding:4px 10px}
.deckchips{max-height:104px;overflow:auto;padding:2px;gap:6px}
.count{font-family:var(--font-display);font-weight:700;color:var(--ink-soft);margin-left:auto;font-size:.9rem}
.tbl-wrap{margin-top:12px;border:2.5px solid var(--ink);border-radius:18px;overflow:auto;background:var(--paper-2);box-shadow:var(--shadow);max-height:calc(100vh - 250px)}
table{border-collapse:collapse;width:100%;min-width:880px}
thead th{position:sticky;top:0;z-index:2;background:#f3e7cd;border-bottom:2.5px solid var(--ink);text-align:left;font-family:var(--font-display);font-weight:800;font-size:.84rem;padding:11px 13px;color:var(--ink);cursor:pointer;user-select:none;white-space:nowrap}
thead th .ar{opacity:.4;font-size:.75rem}
thead th.s .ar{opacity:1;color:var(--red)}
tbody td{border-bottom:1.5px dotted #d9c9aa;padding:10px 13px;font-size:.9rem;vertical-align:top;line-height:1.32}
tbody tr:hover{background:#fffaf0}
.c-cls{white-space:nowrap}
.dchip{display:inline-block;font-family:var(--font-display);font-weight:800;font-size:.72rem;padding:2px 8px;border-radius:9px;border:2px solid var(--ink);color:var(--ink);margin-right:6px}
.c-cls small{color:var(--muted);font-weight:800;font-size:.74rem;display:block;margin-top:3px;max-width:160px;white-space:normal}
.c-name{font-family:var(--font-display);font-weight:700;font-size:.98rem;color:var(--ink);min-width:180px;max-width:250px}
.c-mecc,.c-ind,.c-adr{color:var(--ink-soft);font-weight:600;max-width:235px}
.mod-pill{display:inline-block;font-size:.66rem;font-weight:800;padding:1px 6px;border-radius:7px;border:1.5px solid var(--ink);margin-left:6px;color:var(--ink)}
.mod-I{background:#e7f0ff}.mod-II{background:#ffe9f1}
.empty{padding:40px;text-align:center;color:var(--muted);font-family:var(--font-display);font-weight:700;font-size:1.05rem}
mark{background:var(--yellow);color:var(--ink);border-radius:3px;padding:0 1px}
/* ---- modalità di vista (studio) ---- */
body.m-nomi .col-d{display:none}            /* Solo nomi: nascondi gli effetti */
body.m-nomi table{min-width:0}
body.m-nomi .c-name{max-width:none}
body.m-effetti .hN{display:none}            /* Solo effetti: nascondi il nome */
/* righe rivelabili al click */
body:not(.m-all) tbody tr.dr{cursor:pointer}
body:not(.m-all) tbody tr.dr:hover{background:#fff3d6}
tr.dr.open{background:#fffaf0}
tr.exp{display:none}
tr.exp.open{display:table-row}
tr.exp td{background:#fffdf5;border-bottom:2px solid var(--ink)}
.exp-in{padding:2px 4px 8px;animation:exp .22s ease both}
@keyframes exp{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.exp-lab{font-family:var(--font-display);font-weight:800;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-right:7px}
.exp-in .eff>div{margin:5px 0;color:var(--ink-soft);font-weight:600;font-size:.92rem;line-height:1.4}
.exp-in .nm{font-family:var(--font-display);font-weight:700;font-size:1.15rem;color:var(--ink)}
.exp .eff,.exp .nm{display:none}
body.m-nomi tr.exp.open .eff{display:block}
body.m-effetti tr.exp.open .nm{display:block}
.hint{max-width:1180px;margin:1px auto 0;padding:0 16px;color:var(--blue);font-weight:800;font-size:.84rem;min-height:1.1em}
/* collegamento alla scheda di studio in FarmacoFlash */
.namelink{color:inherit;text-decoration:none}
body.m-all .c-name .namelink:hover,.exp .namelink:hover{color:var(--blue);text-decoration:underline}
body.m-all tbody tr.dr{cursor:pointer}
body.m-all tbody tr.dr:hover{background:#fff3d6}
.studia{display:inline-block;margin-top:11px;font-family:var(--font-display);font-weight:800;font-size:.86rem;color:var(--ink);background:var(--green);border:2.5px solid var(--ink);border-radius:12px 8px 11px 8px/8px 11px 8px 12px;padding:7px 15px;text-decoration:none;box-shadow:2px 2px 0 rgba(58,50,43,.2);transition:transform .14s var(--spring)}
.studia:hover{transform:translate(-1px,-2px);background:#6fd488}
.foot{max-width:1180px;margin:14px auto 0;padding:0 16px;color:var(--muted);font-weight:700;font-size:.78rem;text-align:center}
@media(max-width:560px){
  h1{font-size:1.25rem} .tbl-wrap{max-height:calc(100vh - 290px)}
  thead th,tbody td{padding:9px 10px}
}
</style>
</head>
<body>
<header><div class="hwrap">
  <div class="brand">
    <svg class="mk" viewBox="0 0 44 44" fill="none"><rect x="7" y="16" width="30" height="14" rx="7" transform="rotate(-30 22 22)" fill="#ff6b6b" stroke="#3a322b" stroke-width="2.6"/><line x1="15" y1="26" x2="29" y2="18" stroke="#3a322b" stroke-width="2.6"/></svg>
    <div><h1>Tabella Farmaci</h1><div class="sub">FarmacoFlash · da imparare a memoria</div></div>
  </div>
</div></header>
<main>
  <input class="search" id="q" type="search" autocomplete="off" placeholder="🔎 cerca un farmaco, una classe, un meccanismo…">
  <div class="row" id="modRow"><span class="lab">Modulo:</span></div>
  <div class="row"><span class="lab">Vista:</span>
    <button class="chip mode on" data-mode="all">📖 Tutto</button>
    <button class="chip mode" data-mode="nomi">🧠 Solo nomi</button>
    <button class="chip mode" data-mode="effetti">💊 Solo effetti</button>
    <button class="chip" id="clrBtn">↺ Azzera filtri</button>
    <span class="count" id="count"></span>
  </div>
  <div class="hint" id="hint"></div>
  <div class="row deckchips" id="deckRow"><span class="lab">Classe:</span></div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th data-k="o" id="thCls">Classe <span class="ar">▾</span></th>
        <th class="hN" data-k="name">Farmaco <span class="ar">▾</span></th>
        <th class="col-d" data-k="mecc">Meccanismo <span class="ar">▾</span></th>
        <th class="col-d" data-k="ind">Indicazioni <span class="ar">▾</span></th>
        <th class="col-d" data-k="adr">Reazioni avverse <span class="ar">▾</span></th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
  <div class="foot" id="foot"></div>
</main>
<script>
const DATA = __DATA__;
const DECKS = __DECKS__;
const $ = s=>document.querySelector(s);
let state = { q:'', mod:null, deck:null, sort:{k:'o',dir:1} };

function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function hi(s){ const q=state.q.trim(); if(!q) return esc(s); try{const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');return esc(s).replace(re,'<mark>$1</mark>');}catch(e){return esc(s);} }
function norm(s){return (s||'').toLowerCase();}

function deckColor(id){const d=DECKS.find(x=>x.id===id);return d&&d.color?d.color:'#ece1cb';}
function deckTitle(id){const d=DECKS.find(x=>x.id===id);return d?d.title:id;}

function filtered(){
  const q=norm(state.q);
  let r=DATA.filter(x=>{
    if(state.mod && x.mod!==state.mod) return false;
    if(state.deck && x.deck!==state.deck) return false;
    if(q && !x._s.includes(q)) return false;
    return true;
  });
  const {k,dir}=state.sort;
  r=r.slice().sort((a,b)=>{
    let va=a[k], vb=b[k];
    if(k==='o'){ if(va!==vb) return (va-vb); return a.name.localeCompare(b.name,'it'); }
    return String(va).localeCompare(String(vb),'it')*dir;
  });
  return r;
}

function render(){
  const rows=filtered();
  $('#count').textContent = rows.length+' / '+DATA.length+' farmaci';
  if(!rows.length){ $('#tb').innerHTML='<tr><td colspan="5" class="empty">Nessun farmaco trovato 🐢</td></tr>'; return; }
  $('#tb').innerHTML = rows.map(x=>{
    const code = (DECKS.find(d=>d.id===x.deck)||{}).code || x.deck;
    const cls='<span class="dchip" style="background:'+deckColor(x.deck)+'44">'+esc(code)+'</span><span class="mod-pill mod-'+x.mod+'">Mod '+x.mod+'</span><small>'+esc(deckTitle(x.deck))+'</small>';
    const href='Flashcard-Farmacologia.html#front='+esc(x.id||'');
    return '<tr class="dr" data-id="'+esc(x.id||'')+'">'+
      '<td class="c-cls">'+cls+'</td>'+
      '<td class="c-name hN"><a class="namelink" href="'+href+'">'+hi(x.name)+'</a></td>'+
      '<td class="c-mecc col-d">'+hi(x.mecc||'—')+'</td>'+
      '<td class="c-ind col-d">'+hi(x.ind||'—')+'</td>'+
      '<td class="c-adr col-d">'+hi(x.adr||'—')+'</td>'+
    '</tr>'+
    '<tr class="exp"><td colspan="5"><div class="exp-in">'+
      '<div class="nm"><span class="exp-lab">Farmaco</span><a class="namelink" href="'+href+'">'+hi(x.name)+'</a></div>'+
      '<div class="eff">'+
        '<div><span class="exp-lab">Meccanismo</span>'+hi(x.mecc||'—')+'</div>'+
        '<div><span class="exp-lab">Indicazioni</span>'+hi(x.ind||'—')+'</div>'+
        '<div><span class="exp-lab">Reazioni avverse</span>'+hi(x.adr||'—')+'</div>'+
      '</div>'+
      '<a class="studia" href="'+href+'">↗ Studia in FarmacoFlash</a>'+
    '</div></td></tr>';
  }).join('');
}

function buildChips(){
  // modulo
  const mr=$('#modRow');
  [['Tutti',null],['Modulo I',  'I'],['Modulo II','II']].forEach(([t,v])=>{
    const b=document.createElement('button'); b.className='chip'+((state.mod===v)?' on':''); b.textContent=t;
    b.onclick=()=>{ state.mod=v; refreshChips(); render(); }; b.dataset.mod=String(v); mr.appendChild(b);
  });
  // classi
  const dr=$('#deckRow');
  DECKS.forEach(d=>{
    const b=document.createElement('button'); b.className='chip dk'; b.dataset.deck=d.id;
    b.style.background=d.color?d.color+'33':''; b.textContent=(d.code||d.id);
    b.title=d.title;
    b.onclick=()=>{ state.deck = (state.deck===d.id)?null:d.id; refreshChips(); render(); };
    dr.appendChild(b);
  });
}
function refreshChips(){
  document.querySelectorAll('#modRow .chip').forEach(b=>b.classList.toggle('on', b.dataset.mod===String(state.mod)));
  document.querySelectorAll('#deckRow .chip').forEach(b=>b.classList.toggle('on', b.dataset.deck===state.deck));
}

$('#q').addEventListener('input', e=>{ state.q=e.target.value; render(); });
let mode='all';
function setMode(m){
  mode=m;
  document.body.classList.remove('m-all','m-nomi','m-effetti');
  document.body.classList.add('m-'+m);
  document.querySelectorAll('.chip.mode').forEach(b=>b.classList.toggle('on', b.dataset.mode===m));
  document.querySelectorAll('tr.open').forEach(t=>t.classList.remove('open'));
  $('#hint').textContent = m==='nomi' ? '👆 Tocca un farmaco per vedere a cosa serve'
    : m==='effetti' ? '👆 Leggi gli effetti e prova a indovinare: tocca per scoprire il farmaco'
    : '👆 Tocca una riga per aprirla nello studio di FarmacoFlash';
}
document.querySelectorAll('.chip.mode').forEach(b=> b.addEventListener('click', ()=>setMode(b.dataset.mode)) );
$('#tb').addEventListener('click', e=>{
  const dr=e.target.closest('tr.dr');
  if(!dr) return;                 // click nel pannello (i link navigano di default)
  if(mode==='all'){ location.href='Flashcard-Farmacologia.html#front='+dr.dataset.id; return; }
  e.preventDefault();             // modalità studio: rivela, non navigare
  const exp=dr.nextElementSibling, open=dr.classList.toggle('open');
  if(exp && exp.classList.contains('exp')) exp.classList.toggle('open', open);
});
$('#clrBtn').addEventListener('click', ()=>{ state.q=''; state.mod=null; state.deck=null; $('#q').value=''; refreshChips(); render(); });
document.querySelectorAll('thead th').forEach(th=>{
  th.addEventListener('click', ()=>{
    const k=th.dataset.k;
    if(state.sort.k===k) state.sort.dir*=-1; else state.sort={k,dir:1};
    document.querySelectorAll('thead th').forEach(t=>t.classList.remove('s'));
    th.classList.add('s');
    render();
  });
});

buildChips();
setMode('all');
$('#foot').textContent = DATA.length+' farmaci · '+DECKS.length+' classi · Moduli I–II · dati dalle tue carte FarmacoFlash';
render();
</script>
</body>
</html>
