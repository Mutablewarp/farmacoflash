  h1{font-size:1.25rem} .tbl-wrap{max-height:calc(100vh - 290px)}

}

<script>
const DATA = [{"id":"A4__glucocorticoidi-classe-meccanismo-effett","deck":"A4","mod":"I","name":"Glucocorticoidi (classe — meccanismo, effetti sistemici, ADR, interazioni)","drugs":[],"o":0,"mecc":"lipofili (struttura sterolica, come il colesterolo). Legano recettori intracellulari: GR (glucocorticoid receptor, attivato ad alte concentrazioni) e MR…","ind":"terapia sostitutiva (insufficienza surrenalica → idrocortisone); risposta immunitaria anormale (immunosoppressione nel trapianto; autoimmuni: asma, artrite…","adr":"riflettono gli effetti sistemici fisiologici. Metabolismo: iperglicemia (↑ gluconeogenesi/glucosio-6-fosfatasi; insulino-resistenza), catabolismo proteico →…","_s":"glucocorticoidi (classe — meccanismo, effetti sistemici, adr, interazioni) a4 glucocorticoidi  lipofili (struttura sterolica, come il colesterolo). legano recettori intracellulari: gr (glucocorticoid receptor, attivato ad alte concentrazioni) e mr (mineralcorticoide, alta affinità, attivato a basse conc). recettore complessato a hsp nel citosol → al legame si libera, dimerizza, va nel nucleo, lega i gre (glucocorticoid responsive element) → modula la trascrizione genica. azione antinfiammatoria: inibizione del nf-κb (↑ inibitori, ↓ espressione; meccanismo genomico e non-genomico) → ↓ cox-2, inos, citochine; ↑ annessina-1 → inibizione fosfolipasi a2 → ↓ acido arachidonico → ↓ prostaglandine e leucotrieni. terapia sostitutiva (insufficienza surrenalica → idrocortisone); risposta immunitaria anormale (immunosoppressione nel trapianto; autoimmuni: asma, artrite reumatoide, lupus, bpco; ipersensibilità/allergie); oncologia (leucemie, linfomi — azione selettiva sui linfociti t, + chemioterapici); edema (cerebrale, traumi). effetti su elementi figurati: ↓ eosinofili/linfociti t/macrofagi/dendritiche/mastociti; ↑ pmn in circolo (demarginazione + blocco migrazione tissutale); scarsi su linfociti b (immunità cellulare > umorale). riflettono gli effetti sistemici fisiologici. metabolismo: iperglicemia (↑ gluconeogenesi/glucosio-6-fosfatasi; insulino-resistenza), catabolismo proteico → miopatia steroidea, ridistribuzione adipe → facies lunare/cushingoide. idro-salino (mr): ipertensione, edema; ↑ escrezione ca → osteoporosi. cv: ↑ sensibilità alle catecolamine (↑ β1/α1) + sraa. gastrico: ↓ prostaglandine → ulcera peptica. snc: disturbi del comportamento/umore, alterazione ritmo sonno-veglia. alterazioni endocrine; ↓ gh nei bambini; cataratta/disturbi vista; immunosoppressione → infezioni. ⚠️ da sospensione brusca → insufficienza surrenalica acuta (asse soppresso) → sospensione graduale a scalare (preferire breve emivita e/o giorni alterni)."},{"id":"A4__idrocortisone-cortisolo-cortisone","deck":"A4","mod":"I","name":"Idrocortisone (= cortisolo) / Cortisone","drugs":["idrocortisone","cortisolo","cortisone"],"o":0,"mecc":"glucocorticoide di riferimento (endogeno); attività glucocorticoide : mineralcorticoide = 1:1.","ind":"terapia sostitutiva dell'insufficienza surrenalica (acuta e cronica) — d'elezione perché mantiene entrambe le attività (GC + MC); emergenze (shock, anafilassi) per…","adr":"come classe.","_s":"idrocortisone (= cortisolo) / cortisone a4 glucocorticoidi idrocortisone cortisolo cortisone glucocorticoide di riferimento (endogeno); attività glucocorticoide : mineralcorticoide = 1:1. terapia sostitutiva dell'insufficienza surrenalica (acuta e cronica) — d'elezione perché mantiene entrambe le attività (gc + mc); emergenze (shock, anafilassi) per via ev (estere succinico). come classe."},{"id":"A4__prednisone-prednisolone","deck":"A4","mod":"I","name":"Prednisone / Prednisolone","drugs":["prednisone","prednisolone"],"o":0,"mecc":"analoghi del cortisolo con doppio legame in 1-2 → ↑ attività glucocorticoide antinfiammatoria, ↓ mineralcorticoide (MC ~0.3-0.5).","ind":"patologie infiammatorie croniche e autoimmuni, terapia antirigetto, ipersensibilità/allergie; reumatologia (II scelta dopo i FANS); uso locoregionale…","adr":"come classe.","_s":"prednisone / prednisolone a4 glucocorticoidi prednisone prednisolone analoghi del cortisolo con doppio legame in 1-2 → ↑ attività glucocorticoide antinfiammatoria, ↓ mineralcorticoide (mc ~0.3-0.5). patologie infiammatorie croniche e autoimmuni, terapia antirigetto, ipersensibilità/allergie; reumatologia (ii scelta dopo i fans); uso locoregionale intrarticolare (solo molecole non bioattivate dal fegato). come classe."},{"id":"A4__metilprednisolone","deck":"A4","mod":"I","name":"Metilprednisolone","drugs":["metilprednisolone"],"o":0,"mecc":"derivato con doppio legame ed estere metilico → ↑ attività glucocorticoide vs mineralcorticoide.","ind":"patologie allergiche (febbre/reazioni da siero, orticarie); attacco d'asma severo (uso puntiforme/risolutivo, + broncodilatatori — mai cronico per via sistemica);…","adr":"come classe.","_s":"metilprednisolone a4 glucocorticoidi metilprednisolone derivato con doppio legame ed estere metilico → ↑ attività glucocorticoide vs mineralcorticoide. patologie allergiche (febbre/reazioni da siero, orticarie); attacco d'asma severo (uso puntiforme/risolutivo, + broncodilatatori — mai cronico per via sistemica); profilassi del distress respiratorio nel parto pretermine. come classe."},{"id":"A4__triamcinolone","deck":"A4","mod":"I","name":"Triamcinolone","drugs":["triamcinolone"],"o":0,"mecc":"↑ lipofilia → ↑ attività glucocorticoide, attività mineralcorticoide azzerata (~0).","ind":"patologie allergiche e infiammatorie.","adr":"come classe.","_s":"triamcinolone a4 glucocorticoidi triamcinolone ↑ lipofilia → ↑ attività glucocorticoide, attività mineralcorticoide azzerata (~0). patologie allergiche e infiammatorie. come classe."},{"id":"A4__betametasone-e-desametasone-fluorurati","deck":"A4","mod":"I","name":"Betametasone e Desametasone (fluorurati)","drugs":["betametasone","desametasone"],"o":0,"mecc":"introduzione del fluoro → glucocorticoidi più potenti e lipofili, attività antinfiammatoria molto elevata, mineralcorticoide trascurabile.","ind":"Betametasone (derivato metilico del triamcinolone): condizioni critiche/severe per brevi periodi; os (fosfato effervescente), EV/IM (fosfato idrofilo), esteri…","adr":"profilo di effetti indesiderati proporzionale alla potenza (come classe).","_s":"betametasone e desametasone (fluorurati) a4 glucocorticoidi betametasone desametasone introduzione del fluoro → glucocorticoidi più potenti e lipofili, attività antinfiammatoria molto elevata, mineralcorticoide trascurabile. betametasone (derivato metilico del triamcinolone): condizioni critiche/severe per brevi periodi; os (fosfato effervescente), ev/im (fosfato idrofilo), esteri idrofobi (valerati/benzoati) per uso dermatologico; utile anche per dolore associato a edemi post-operatori e in somministrazioni intrarticolari. desametasone (fosfato sodico, idrofilo, parenterale): edemi cerebrali. profilo di effetti indesiderati proporzionale alla potenza (come classe)."},{"id":"A4__fludrocortisone","deck":"A4","mod":"I","name":"Fludrocortisone","drugs":["fludrocortisone"],"o":0,"mecc":"variazioni strutturali con effetto opposto: perde l'attività glucocorticoide e acquista quella mineralcorticoide.","ind":"NON usato come antinfiammatorio → indicazione mineralcorticoide (diversa).","adr":"N/D specifici nei documenti.","_s":"fludrocortisone a4 glucocorticoidi fludrocortisone variazioni strutturali con effetto opposto: perde l'attività glucocorticoide e acquista quella mineralcorticoide. non usato come antinfiammatorio → indicazione mineralcorticoide (diversa). n/d specifici nei documenti."},{"id":"A4__glucocorticoidi-topici-e-inalatori-beclo","deck":"A4","mod":"I","name":"Glucocorticoidi topici e inalatori (beclometasone, ciclesonide, budesonide, fluticasone; cutanei)","drugs":["beclometasone","ciclesonide","budesonide","fluticasone"],"o":0,"mecc":"","ind":"","adr":"cutanei → atrofia cutanea, follicoliti, ipertricosi (azione androgeno-simile), ipersensibilità (rara, non crociata; spesso da eccipienti/conservanti), tolleranza…","_s":"glucocorticoidi topici e inalatori (beclometasone, ciclesonide, budesonide, fluticasone; cutanei) a4 glucocorticoidi beclometasone ciclesonide budesonide fluticasone   cutanei → atrofia cutanea, follicoliti, ipertricosi (azione androgeno-simile), ipersensibilità (rara, non crociata; spesso da eccipienti/conservanti), tolleranza rapida. nei bambini ↑ assorbimento sistemico (rapporto superficie/peso) → effetti sistemici (iperglicemia, ↓ gh, soppressione dell'asse)."},{"id":"A5__fans-classe-meccanismo-azioni-effetti-co","deck":"A5","mod":"I","name":"FANS (classe — meccanismo, azioni, effetti collaterali)","drugs":[],"o":1,"mecc":"acidi deboli; inibiscono la ciclossigenasi (COX). COX-1 (costitutiva) → trombossano A2 (aggregazione piastrinica), citoprotezione gastrica (↑ muco/bicarbonato,…","ind":"3 azioni — antinfiammatoria (↓ PG da COX-2), analgesica (↓ sensibilizzazione nocicettori: le PG ↑ conduzione via PKA → ingresso Ca/Na; ruolo dei canali TRPV1),…","adr":"GI/gastrolesività (ulcera, emorragia; favorita dall'ion trapping — acido non dissociato attraversa e si accumula nella cellula gastrica); piastrine (↓ aggregazione…","_s":"fans (classe — meccanismo, azioni, effetti collaterali) a5 fans + paracetamolo  acidi deboli; inibiscono la ciclossigenasi (cox). cox-1 (costitutiva) → trombossano a2 (aggregazione piastrinica), citoprotezione gastrica (↑ muco/bicarbonato, inibizione pompa protonica via pge₂/recettore ep3), perfusione renale. cox-2 (inducibile) → mediatori dell'infiammazione. fans classici non selettivi: ingombro sterico nel sito catalitico → bloccano l'ingresso dell'acido arachidonico in entrambe. coxib: legano una tasca sulfonamidica accessoria solo della cox-2. 3 azioni — antinfiammatoria (↓ pg da cox-2), analgesica (↓ sensibilizzazione nocicettori: le pg ↑ conduzione via pka → ingresso ca/na; ruolo dei canali trpv1), antipiretica (↓ setpoint ipotalamico). gi/gastrolesività (ulcera, emorragia; favorita dall'ion trapping — acido non dissociato attraversa e si accumula nella cellula gastrica); piastrine (↓ aggregazione → rischio emorragico); renale (↓ prostacicline → ipoperfusione/ira — rischio in ipertesi/cv/irc/diuretici); cardiovascolare (vedi coxib); snc (emicrania, vertigini, iperventilazione — salicilati); utero (indicati nella dismenorrea primaria, controindicati in gravidanza → prolungamento gestazione, chiusura del dotto arterioso); ipersensibilità (rinite vasomotoria, edema angioneurotico, asma — leucotrieni liberi, orticaria, shock)."},{"id":"A5__acido-acetilsalicilico-asa-aspirina","deck":"A5","mod":"I","name":"Acido acetilsalicilico (ASA / Aspirina)","drugs":["acido acetilsalicilico","ASA","Aspirina"],"o":1,"mecc":"inibitore IRREVERSIBILE per acetilazione (Ser della COX-1 e COX-2) → previene il legame dell'acido arachidonico.","ind":"infiammazione, febbre, malattia reumatica; ANTIAGGREGANTE a basse dosi (75-325 mg) → prevenzione secondaria dell'infarto (Patrono). *Razionale cinetico:* a basse…","adr":"gastrolesività (accentuata dall'irreversibilità); ipersensibilità; IRA (anziani, IRC, bambini); sindrome di Reye nei bambini (encefalopatia + tossicità epatica →…","_s":"acido acetilsalicilico (asa / aspirina) a5 fans + paracetamolo acido acetilsalicilico asa aspirina inibitore irreversibile per acetilazione (ser della cox-1 e cox-2) → previene il legame dell'acido arachidonico. infiammazione, febbre, malattia reumatica; antiaggregante a basse dosi (75-325 mg) → prevenzione secondaria dell'infarto (patrono). *razionale cinetico:* a basse dosi agisce sulle piastrine nel circolo portale (alta concentrazione) prima della diluizione sistemica → blocco cumulativo delle piastrine (prive di nucleo → non risintetizzano l'enzima) senza esposizione sistemica. gastrolesività (accentuata dall'irreversibilità); ipersensibilità; ira (anziani, irc, bambini); sindrome di reye nei bambini (encefalopatia + tossicità epatica → controindicato < 12 anni); asma da aspirina (leucotrieni); intossicazione da salicilati (iperventilazione, alcalosi respiratoria, soppressione del centro del respiro)."},{"id":"A5__derivati-dell-acido-propionico-ibuprofen","deck":"A5","mod":"I","name":"Derivati dell'acido propionico (ibuprofene, ketoprofene, naprossene, flurbiprofene, fenoprofene)","drugs":["ibuprofene","ketoprofene","naprossene","flurbiprofene","fenoprofene"],"o":1,"mecc":"inibitori REVERSIBILI della COX; generalmente non selettivi (alcuni più COX-1: flurbiprofene, ketoprofene).","ind":"infiammazioni comuni; trattamento cronico di artrite reumatoide e osteoartrite.","adr":"migliore tollerabilità GI (vs altri FANS).","_s":"derivati dell'acido propionico (ibuprofene, ketoprofene, naprossene, flurbiprofene, fenoprofene) a5 fans + paracetamolo ibuprofene ketoprofene naprossene flurbiprofene fenoprofene inibitori reversibili della cox; generalmente non selettivi (alcuni più cox-1: flurbiprofene, ketoprofene). infiammazioni comuni; trattamento cronico di artrite reumatoide e osteoartrite. migliore tollerabilità gi (vs altri fans)."},{"id":"A5__diclofenac-derivato-dell-acido-acetico","deck":"A5","mod":"I","name":"Diclofenac (derivato dell'acido acetico)","drugs":["diclofenac"],"o":1,"mecc":"selettività superiore per la COX-2 → maggiore attività antinfiammatoria, minori effetti collaterali (risparmia la COX-1).","ind":"AR, osteoartrosi, dolore, dismenorrea primaria (100-200 mg).","adr":"ridotte (selettività COX-2).","_s":"diclofenac (derivato dell'acido acetico) a5 fans + paracetamolo diclofenac selettività superiore per la cox-2 → maggiore attività antinfiammatoria, minori effetti collaterali (risparmia la cox-1). ar, osteoartrosi, dolore, dismenorrea primaria (100-200 mg). ridotte (selettività cox-2)."},{"id":"A5__indometacina-derivato-dell-acido-acetico","deck":"A5","mod":"I","name":"Indometacina (derivato dell'acido acetico)","drugs":["indometacina"],"o":1,"mecc":"FANS non selettivo abbastanza potente.","ind":"patologie croniche (osteoartrosi, artrite reumatoide).","adr":"nefrotossicità importante → non di uso comune (opzione quando i FANS più tollerati non rispondono); il ricircolo enteroepatico prolunga gli effetti indesiderati.","_s":"indometacina (derivato dell'acido acetico) a5 fans + paracetamolo indometacina fans non selettivo abbastanza potente. patologie croniche (osteoartrosi, artrite reumatoide). nefrotossicità importante → non di uso comune (opzione quando i fans più tollerati non rispondono); il ricircolo enteroepatico prolunga gli effetti indesiderati."},{"id":"A5__ketorolac-toradol-derivato-dell-acido-ac","deck":"A5","mod":"I","name":"Ketorolac (Toradol — derivato dell'acido acetico)","drugs":["ketorolac","Toradol"],"o":1,"mecc":"FANS con forte potenziale analgesico; più selettivo per la COX-1.","ind":"potere analgesico equiparabile agli oppiacei → dolore post-operatorio moderato-severo, alternativa agli oppiacei deboli; solo a breve termine (max 5 giorni).","adr":"forte gastrolesività (proporzionale al potere analgesico).","_s":"ketorolac (toradol — derivato dell'acido acetico) a5 fans + paracetamolo ketorolac toradol fans con forte potenziale analgesico; più selettivo per la cox-1. potere analgesico equiparabile agli oppiacei → dolore post-operatorio moderato-severo, alternativa agli oppiacei deboli; solo a breve termine (max 5 giorni). forte gastrolesività (proporzionale al potere analgesico)."},{"id":"A5__nimesulide-aulin","deck":"A5","mod":"I","name":"Nimesulide (Aulin)","drugs":["nimesulide","Aulin"],"o":1,"mecc":"FANS (emivita media).","ind":"ristrette da AIFA a dolore acuto e dismenorrea primaria (NON dolori cronici); II linea, massimo 15 giorni.","adr":"epatotossicità (segnalazioni EMA/AIFA) → oggi poco prescritto.","_s":"nimesulide (aulin) a5 fans + paracetamolo nimesulide aulin fans (emivita media). ristrette da aifa a dolore acuto e dismenorrea primaria (non dolori cronici); ii linea, massimo 15 giorni. epatotossicità (segnalazioni ema/aifa) → oggi poco prescritto."},{"id":"A5__oxicam-piroxicam-meloxicam","deck":"A5","mod":"I","name":"Oxicam (piroxicam, meloxicam)","drugs":["piroxicam","meloxicam"],"o":1,"mecc":"FANS derivati degli acidi enolici; non selettivi della COX-2 ma \"orientati\".","ind":"condizioni croniche (artriti, osteoartriti, artrite reumatoide).","adr":"come classe.","_s":"oxicam (piroxicam, meloxicam) a5 fans + paracetamolo piroxicam meloxicam fans derivati degli acidi enolici; non selettivi della cox-2 ma \"orientati\". condizioni croniche (artriti, osteoartriti, artrite reumatoide). come classe."},{"id":"A5__coxib-celecoxib-valdecoxib-rofecoxib","deck":"A5","mod":"I","name":"Coxib (celecoxib, valdecoxib, rofecoxib)","drugs":["celecoxib","valdecoxib","rofecoxib"],"o":1,"mecc":"COX-2 selettivi (tasca sulfonamidica accessoria).","ind":"analgesico, antinfiammatorio, antipiretico con basso potenziale di gastrolesività e di alterazione piastrinica (TXA2 non intaccato). Celecoxib → dolori addominali.","adr":"⚠️ rischio cardiovascolare aumentato (↓ prostacicline vasodilatatrici a fronte di COX-1/TXA2 attivo → squilibrio protrombotico); primi coxib ritirati dal mercato…","_s":"coxib (celecoxib, valdecoxib, rofecoxib) a5 fans + paracetamolo celecoxib valdecoxib rofecoxib cox-2 selettivi (tasca sulfonamidica accessoria). analgesico, antinfiammatorio, antipiretico con basso potenziale di gastrolesività e di alterazione piastrinica (txa2 non intaccato). celecoxib → dolori addominali. ⚠️ rischio cardiovascolare aumentato (↓ prostacicline vasodilatatrici a fronte di cox-1/txa2 attivo → squilibrio protrombotico); primi coxib ritirati dal mercato per eventi cv gravi."},{"id":"A5__paracetamolo-fans-atipico","deck":"A5","mod":"I","name":"Paracetamolo (FANS atipico)","drugs":["paracetamolo"],"o":1,"mecc":"struttura chimica diversa; scarso inibitore di COX-1/COX-2. Attività su una \"COX-3 centrale\" (effetto antipiretico). Analgesia non del tutto chiarita → azione…","ind":"dolore lieve-moderato e febbre; uno dei pochi farmaci usabili in pediatria (i FANS hanno rischio renale nei bambini); risparmio di dose sugli oppiacei (↓…","adr":"⚠️ DANNO EPATICO — il metabolita N-acetil-benzochinon-immina (via CYP2E1) è normalmente detossificato dal glutatione; se il glutatione si esaurisce (dosi eccessive…","_s":"paracetamolo (fans atipico) a5 fans + paracetamolo paracetamolo struttura chimica diversa; scarso inibitore di cox-1/cox-2. attività su una \"cox-3 centrale\" (effetto antipiretico). analgesia non del tutto chiarita → azione centrale (↓ pg centrali), vie inibitorie discendenti (serotoninergiche/noradrenergiche), peptidi oppioidi endogeni, sistema endocannabinoide (metabolita coniugato con acido arachidonico → am404, simil-anandamide → cb1 + trpv desensitizzati). solo analgesico e antipiretico, non antinfiammatorio. dolore lieve-moderato e febbre; uno dei pochi farmaci usabili in pediatria (i fans hanno rischio renale nei bambini); risparmio di dose sugli oppiacei (↓ tolleranza). dose: 1000 mg/die inibisce ~50% cox-1/2. ⚠️ danno epatico — il metabolita n-acetil-benzochinon-immina (via cyp2e1) è normalmente detossificato dal glutatione; se il glutatione si esaurisce (dosi eccessive / frequenza errata) → epatotossicità. (<4 g basso rischio; >10 g insulto grave.)"},{"id":"A6__istamina-recettori-e-strategie-farmacolo","deck":"A6","mod":"I","name":"Istamina — recettori e strategie farmacologiche","drugs":[],"o":2,"mecc":"","ind":"","adr":"","_s":"istamina — recettori e strategie farmacologiche a6 antistaminici    "},{"id":"A6__anti-h1-di-i-generazione-clorfeniramina-","deck":"A6","mod":"I","name":"Anti-H1 di I generazione (clorfeniramina, difenidramina, idrossizina, prometazina)","drugs":["clorfeniramina","difenidramina","idrossizina","prometazina"],"o":2,"mecc":"agonisti inversi del recettore H1 (non agiscono su H2); elevata lipofilia → attraversano la barriera ematoencefalica.","ind":"trattamento sintomatico delle reazioni allergiche (riniti, orticarie, dermatiti); antiemetici (cinetosi/origine vestibolare); sedativi-ipnotici (prometazina);…","adr":"SNC (sedazione, ↓ vigilanza, ↓ attività psicomotoria, ↑ appetito/peso — H1 ipotalamico + antagonismo serotoninergico); antimuscarinici (secchezza fauci, ritenzione…","_s":"anti-h1 di i generazione (clorfeniramina, difenidramina, idrossizina, prometazina) a6 antistaminici clorfeniramina difenidramina idrossizina prometazina agonisti inversi del recettore h1 (non agiscono su h2); elevata lipofilia → attraversano la barriera ematoencefalica. trattamento sintomatico delle reazioni allergiche (riniti, orticarie, dermatiti); antiemetici (cinetosi/origine vestibolare); sedativi-ipnotici (prometazina); parkinson (attività anticolinergica per controbilanciare il deficit dopaminergico). poco usati come antiallergici per la sedazione. snc (sedazione, ↓ vigilanza, ↓ attività psicomotoria, ↑ appetito/peso — h1 ipotalamico + antagonismo serotoninergico); antimuscarinici (secchezza fauci, ritenzione urinaria, tachicardia sinusale da antagonismo m2); anti-α-adrenergici (ipotensione ortostatica, vertigini, tachicardia riflessa); teratogeni (sospendere in gravidanza). sovradosaggio: allucinazioni, eccitazione, coma, atassia, convulsioni."},{"id":"A6__anti-h1-di-ii-generazione-loratadina-cet","deck":"A6","mod":"I","name":"Anti-H1 di II generazione (loratadina, cetirizina) — *ritirati: terfenadina, astemizolo*","drugs":["loratadina","cetirizina","terfenadina","astemizolo"],"o":2,"mecc":"bloccano l'H1 con minore attraversamento della BEE → effetti solo periferici; migliore selettività (no antimuscarinici/anti-α).","ind":"solo reazioni allergiche (no sedazione, no effetti vestibolari/sull'appetito).","adr":"⚠️ Terfenadina/Astemizolo (ritirati) → torsione di punta, allungamento QT (interazione con i canali del K⁺) + inibizione dei citocromi. Loratadina/cetirizina →…","_s":"anti-h1 di ii generazione (loratadina, cetirizina) — *ritirati: terfenadina, astemizolo* a6 antistaminici loratadina cetirizina terfenadina astemizolo bloccano l'h1 con minore attraversamento della bee → effetti solo periferici; migliore selettività (no antimuscarinici/anti-α). solo reazioni allergiche (no sedazione, no effetti vestibolari/sull'appetito). ⚠️ terfenadina/astemizolo (ritirati) → torsione di punta, allungamento qt (interazione con i canali del k⁺) + inibizione dei citocromi. loratadina/cetirizina → criticità cardiaca in uso prolungato (monitorare)."},{"id":"A6__anti-h1-di-iii-generazione-desloratadina","deck":"A6","mod":"I","name":"Anti-H1 di III generazione (desloratadina, levocetirizina, fexofenadina; topici: azelastina, levocabastina, ketotifene)","drugs":["desloratadina","levocetirizina","fexofenadina","azelastina","levocabastina","ketotifene"],"o":2,"mecc":"stereoisomeri/metaboliti attivi purificati della II generazione (levocetirizina = levogiro della cetirizina; desloratadina = metabolita attivo della loratadina) →…","ind":"reazioni allergiche in sicurezza (anche durante l'attività lavorativa). Topici (azelastina, levocabastina, ketotifene): preparati dermatologici/orticaria,…","adr":"privi di cardiotossicità (dosi ridotte).","_s":"anti-h1 di iii generazione (desloratadina, levocetirizina, fexofenadina; topici: azelastina, levocabastina, ketotifene) a6 antistaminici desloratadina levocetirizina fexofenadina azelastina levocabastina ketotifene stereoisomeri/metaboliti attivi purificati della ii generazione (levocetirizina = levogiro della cetirizina; desloratadina = metabolita attivo della loratadina) → dosi inferiori, ↓ effetti collaterali. fexofenadina = metabolita attivo della terfenadina (è la terfenadina a essere il profarmaco). reazioni allergiche in sicurezza (anche durante l'attività lavorativa). topici (azelastina, levocabastina, ketotifene): preparati dermatologici/orticaria, profilassi dell'attacco d'asma. ketotifene: stabilizzazione della membrana mastocitaria (simile ai cromoni). privi di cardiotossicità (dosi ridotte)."},{"id":"A6__anti-h2-cimetidina-ranitidina-famotidina","deck":"A6","mod":"I","name":"Anti-H2 (cimetidina, ranitidina, famotidina, nizatidina, roxatidina)","drugs":["cimetidina","ranitidina","famotidina","nizatidina","roxatidina"],"o":2,"mecc":"antagonisti competitivi selettivi del recettore H2 sulla cellula parietale → ↓ stimolazione PKA-mediata della pompa protonica → ↓ secrezione acida (basale,…","ind":"sindrome di Zollinger-Ellison, ulcera gastrica/duodenale, ulcera da *H. pylori* (terapia multipla), reflusso gastroesofageo, ulcera da stress.","adr":"scarsa attività antimuscarinica/antidopaminergica/antiserotoninergica/anti-α/antiallergica. Aspecifici: cefalea, vertigini, nausea, eritemi, prurito, effetti…","_s":"anti-h2 (cimetidina, ranitidina, famotidina, nizatidina, roxatidina) a6 antistaminici cimetidina ranitidina famotidina nizatidina roxatidina antagonisti competitivi selettivi del recettore h2 sulla cellula parietale → ↓ stimolazione pka-mediata della pompa protonica → ↓ secrezione acida (basale, notturna, stimolata dal cibo; in minor misura quella indotta da gastrina e ach). è una modulazione, non un blocco definitivo → non compromette l'assorbimento di vitamina b12. sindrome di zollinger-ellison, ulcera gastrica/duodenale, ulcera da *h. pylori* (terapia multipla), reflusso gastroesofageo, ulcera da stress. scarsa attività antimuscarinica/antidopaminergica/antiserotoninergica/anti-α/antiallergica. aspecifici: cefalea, vertigini, nausea, eritemi, prurito, effetti ematologici (↓ attività midollare). ⚠️ cimetidina: lega il recettore degli androgeni, interferisce con estradiolo/prolattina → perdita di libido, impotenza, ginecomastia (uomo), alterazioni del ciclo mestruale."},{"id":"A7__emicrania-terapia-dell-attacco-acuto-fan","deck":"A7","mod":"I","name":"Emicrania — terapia dell'attacco acuto (FANS / paracetamolo; principi)","drugs":[],"o":3,"mecc":"FANS → ↓ infiammazione, ↓ sensibilizzazione centrale e dei terminali nocicettivi (↓ prostaglandine). (Dettagli FANS/paracetamolo → file A5.)","ind":"livello A (max efficacia): analgesici e alcuni FANS (paracetamolo, ASA, diclofenac, ibuprofene, naprossene), triptani (os/spray nasale/sc), derivati dell'ergot…","adr":"FANS → gastrolesività e nefrotossicità; oppioidi/barbiturici → tolleranza/dipendenza.","_s":"emicrania — terapia dell'attacco acuto (fans / paracetamolo; principi) a7 antiemicranici + antiemetici  fans → ↓ infiammazione, ↓ sensibilizzazione centrale e dei terminali nocicettivi (↓ prostaglandine). (dettagli fans/paracetamolo → file a5.) livello a (max efficacia): analgesici e alcuni fans (paracetamolo, asa, diclofenac, ibuprofene, naprossene), triptani (os/spray nasale/sc), derivati dell'ergot (diidroergotamina). ketorolac → evidenza non massima. indometacina (potente, nefrotossica), ketorolac (nefrotossico/gastrolesivo). in scheda tecnica per emicrania: solo naprossene e ibuprofene; paracetamolo/asa → \"cefalea\" (altri = off-label). asa mantiene efficacia negli attacchi ripetuti (no tolleranza). fans → gastrolesività e nefrotossicità; oppioidi/barbiturici → tolleranza/dipendenza."},{"id":"A7__derivati-dell-ergot-ergotamina-diidroerg","deck":"A7","mod":"I","name":"Derivati dell'ergot (ergotamina, diidroergotamina)","drugs":["ergotamina","diidroergotamina"],"o":3,"mecc":"agonista di recettori serotoninergici, noradrenergici/adrenergici e dopaminergici → vasocostrizione (↓ calibro vascolare), ↓ componente infiammatoria.","ind":"crisi acute di emicrania (dal 1926); diidroergotamina = livello A.","adr":"emetigena importante (soprattutto parenterale); vasocostrizione intensa generalizzata (parestesie, intorpidimenti, sensazioni caldo/freddo, fino a gangrena =…","_s":"derivati dell'ergot (ergotamina, diidroergotamina) a7 antiemicranici + antiemetici ergotamina diidroergotamina agonista di recettori serotoninergici, noradrenergici/adrenergici e dopaminergici → vasocostrizione (↓ calibro vascolare), ↓ componente infiammatoria. crisi acute di emicrania (dal 1926); diidroergotamina = livello a. emetigena importante (soprattutto parenterale); vasocostrizione intensa generalizzata (parestesie, intorpidimenti, sensazioni caldo/freddo, fino a gangrena = ergotismo); vasospasmo coronarico (dolore/pesantezza al petto); effetti centrali (5-ht2)."},{"id":"A7__triptani-sumatriptan-ii-generazione","deck":"A7","mod":"I","name":"Triptani (sumatriptan + II generazione)","drugs":["sumatriptan"],"o":3,"mecc":"analoghi della serotonina; agonisti selettivi 5-HT1 (B/D; eletriptan anche F centrale) → ↓ infiammazione neurogena periferica, ↓ eccitabilità dei nuclei…","ind":"crisi acute moderate-severe; efficaci anche su sintomi associati (fotofobia, fonofobia, nausea, vomito); no tolleranza.","adr":"parestesie periferiche; spasmo coronarie (4%), respiro corto, pesantezza, ansia, palpitazioni, dolore toracico. NON effetti centrali (no 5-HT2 → no allucinazioni);…","_s":"triptani (sumatriptan + ii generazione) a7 antiemicranici + antiemetici sumatriptan analoghi della serotonina; agonisti selettivi 5-ht1 (b/d; eletriptan anche f centrale) → ↓ infiammazione neurogena periferica, ↓ eccitabilità dei nuclei trigeminali (5-ht1f). crisi acute moderate-severe; efficaci anche su sintomi associati (fotofobia, fonofobia, nausea, vomito); no tolleranza. parestesie periferiche; spasmo coronarie (4%), respiro corto, pesantezza, ansia, palpitazioni, dolore toracico. non effetti centrali (no 5-ht2 → no allucinazioni); basso rischio di sindrome serotoninergica."},{"id":"A7__nuove-classi-anti-emicrania-ditani-gepan","deck":"A7","mod":"I","name":"Nuove classi anti-emicrania (ditani, gepanti, anti-CGRP mAb)","drugs":[],"o":3,"mecc":"","ind":"","adr":"","_s":"nuove classi anti-emicrania (ditani, gepanti, anti-cgrp mab) a7 antiemicranici + antiemetici    "},{"id":"A7__emicrania-terapia-profilattica","deck":"A7","mod":"I","name":"Emicrania — terapia profilattica","drugs":[],"o":3,"mecc":"","ind":"≥3 attacchi gravi/mese o mancata risposta alla terapia sintomatica. Riduce la ricorrenza ~50% (non risolutiva). · Beta-bloccanti (propranololo, il più lipofilo;…","adr":"guadagno ponderale (tutti tranne il topiramato; reversibile alla sospensione).","_s":"emicrania — terapia profilattica a7 antiemicranici + antiemetici   ≥3 attacchi gravi/mese o mancata risposta alla terapia sintomatica. riduce la ricorrenza ~50% (non risolutiva). · beta-bloccanti (propranololo, il più lipofilo; non selettivo β1/β2 — la componente β2 serve per la vasocostrizione): unici antipertensivi usabili in gravidanza. · antiepilettici stabilizzanti di membrana: acido valproico, topiramato (ii gen, migliore) → ↓ eccitabilità del trigemino. · antidepressivi triciclici (amitriptilina): potenziano le vie inibitorie discendenti del dolore + stabilizzazione dei canali del na. · verapamil (calcio-antagonista) → cefalea a grappolo. guadagno ponderale (tutti tranne il topiramato; reversibile alla sospensione)."},{"id":"A7__antiemetici-centro-del-vomito-e-classi","deck":"A7","mod":"I","name":"Antiemetici (centro del vomito e classi)","drugs":[],"o":3,"mecc":"","ind":"","adr":"","_s":"antiemetici (centro del vomito e classi) a7 antiemicranici + antiemetici    "},{"id":"A7__domperidone-e-metoclopramide","deck":"A7","mod":"I","name":"Domperidone e Metoclopramide","drugs":["domperidone","metoclopramide"],"o":3,"mecc":"(1) antagonismo D2 nella CTZ → ↓ sensazione di vomito; (2) contrastano l'inibizione dopaminergica nel plesso mioenterico → ↑ peristalsi (procinetico).…","ind":"metoclopramide → gastroparesi, dispepsie funzionali, vomito da chemioterapici, reflusso gastroesofageo.","adr":"(da blocco D2 centrale) parkinsonismo iatrogeno, disfunzione limbica/mesocorticale (cognitiva), tuberoinfundibolare → iperprolattinemia, xerostomia, cefalea;…","_s":"domperidone e metoclopramide a7 antiemicranici + antiemetici domperidone metoclopramide (1) antagonismo d2 nella ctz → ↓ sensazione di vomito; (2) contrastano l'inibizione dopaminergica nel plesso mioenterico → ↑ peristalsi (procinetico). metoclopramide in più: antagonista 5-ht3 + agonista 5-ht4 (procinetico). metoclopramide → gastroparesi, dispepsie funzionali, vomito da chemioterapici osi post-menopausale; raloxifene → ↓ turnover osseo (livelli premenopausa), ↓ ldl e colesterolo totale. raloxifene → vampate di calore, crampi agli arti inferiori, ⚠️ ↑ rischio tromboembolico."},{"id":"A12__calcitonina","deck":"A12","mod":"I","name":"Calcitonina","drugs":["calcitonina"],"o":8,"mecc":"ormone peptidico (ponte disolfuro) → inibisce gli osteoclasti, stimola gli osteoblasti → deposizione ossea; analgesica (modula la sensibilità dolorifica).","ind":"osteoporosi post-menopausale quando gli estrogeni sono controindicati; ipercalcemia, iperparatiroidismo, Paget, tumori; dolore da osteopenia. Riduce le fratture…","adr":"ipersensibilità (rash, sudorazione, vomito, nausea, arrossamento del volto, crampi addominali, orticaria).","_s":"calcitonina a12 osso / osteoporosi calcitonina ormone peptidico (ponte disolfuro) → inibisce gli osteoclasti, stimola gli osteoblasti → deposizione ossea; analgesica (modula la sensibilità dolorifica). osteoporosi post-menopausale quando gli estrogeni sono controindicati; ipercalcemia, iperparatiroidismo, paget, tumori; dolore da osteopenia. riduce le fratture vertebrali. ipersensibilità (rash, sudorazione, vomito, nausea, arrossamento del volto, crampi addominali, orticaria)."},{"id":"A12__bifosfonati-i-iii-generazione","deck":"A12","mod":"I","name":"Bifosfonati (I-III generazione)","drugs":[],"o":8,"mecc":"analoghi stabili del pirofosfato (2 gruppi fosforici + catena carboniosa); alta affinità per il Ca → si concentrano nell'osso (emivita lunga); resistenti agli…","ind":"osteoporosi (menopausale/da glucocorticoidi), Paget; metastasi ossee/calcificazioni (clodronato/pamidronato/zoledronico → carcinoma mammella/prostata, mieloma…","adr":"GI (crampi, dolori, vomito, erosione della mucosa esofagea); ⚠️ a lungo termine (>5 anni) inibizione permanente del rimodellamento → microdanni → fratture…","_s":"bifosfonati (i-iii generazione) a12 osso / osteoporosi  analoghi stabili del pirofosfato (2 gruppi fosforici + catena carboniosa); alta affinità per il ca → si concentrano nell'osso (emivita lunga); resistenti agli osteoclasti → prevengono la dissoluzione dell'idrossiapatite. inibitori del riassorbimento più efficaci. · i gen (clodronato, etidronato): inglobati dall'osteoclasta → apoptosi (analogo poco solubile dell'atp). · ii gen (amminobifosfonati: alendronato, pamidronato, ibandronato; 10-100× più potenti): inibiscono la farnesil-pirofosfato sintetasi (via del mevalonato) → ↓ geranil-geranil-pirofosfato → ↓ orletto a spazzola (no apoptosi). · iii gen (azoto + anello eterociclico: acido zoledronico, risedronato): molto potenti, più effetti collaterali. osteoporosi (menopausale/da glucocorticoidi), paget; metastasi ossee/calcificazioni (clodronato/pamidronato/zoledronico → carcinoma mammella/prostata, mieloma multiplo). alendronato → ↓ fratture vertebrali/non vertebrali/ossa lunghe. gi (crampi, dolori, vomito, erosione della mucosa esofagea); ⚠️ a lungo termine (>5 anni) inibizione permanente del rimodellamento → microdanni → fratture spontanee; ⚠️ osteonecrosi del mascellare (zoledronato/pamidronato — screening del cavo orale prima di interventi dentari)."},{"id":"A12__denosumab","deck":"A12","mod":"I","name":"Denosumab","drugs":["denosumab"],"o":8,"mecc":"anticorpo monoclonale umanizzato ad alta affinità → lega RANKL → interrompe il pathway → ↓ attività degli osteoclasti → ↑ massa ossea, ↓ turnover.","ind":"osteoporosi.","adr":"⚠️ osteonecrosi del mascellare (incidenza simile ai bifosfonati).","_s":"denosumab a12 osso / osteoporosi denosumab anticorpo monoclonale umanizzato ad alta affinità → lega rankl → interrompe il pathway → ↓ attività degli osteoclasti → ↑ massa ossea, ↓ turnover. osteoporosi. ⚠️ osteonecrosi del mascellare (incidenza simile ai bifosfonati)."},{"id":"A12__teriparatide-pth-intermittente-fluoruri","deck":"A12","mod":"I","name":"Teriparatide (PTH intermittente) + Fluoruri","drugs":["teriparatide"],"o":8,"mecc":"Teriparatide = analogo N-terminale del PTH; somministrazione intermittente (≠ continua) → ↑ attività degli osteoblasti (via Wnt), contrasta gli osteoclasti → ↓…","ind":"II scelta (gravità o inefficacia delle terapie precedenti). Fluoruri = altra strategia citata.","adr":"ipersensibilità.","_s":"teriparatide (pth intermittente) + fluoruri a12 osso / osteoporosi teriparatide teriparatide = analogo n-terminale del pth; somministrazione intermittente (≠ continua) → ↑ attività degli osteoblasti (via wnt), contrasta gli osteoclasti → ↓ fratture fino al 70%. ii scelta (gravità o inefficacia delle terapie precedenti). fluoruri = altra strategia citata. ipersensibilità."},{"id":"B1__benzodiazepine-bdz","deck":"B1","mod":"II","name":"Benzodiazepine (BDZ)","drugs":[],"o":9,"mecc":"modulatori allosterici positivi del recettore GABA-A; ↑ FREQUENZA di apertura del canale del Cl⁻ (solo in presenza di GABA). Sito di legame extracellulare (ECD),…","ind":"ansia, insonnia, astinenza da alcol, stato di male epilettico, premedicazione/anestesia bilanciata, sedazione per manovre, spasticità centrale. NON analgesici…","adr":"dosi terapeutiche (sedazione, astenia, ↓ performance psicomotoria, hangover, amnesia anterograda — \"droga dello stupro\"); dosi tossiche (ipotensione ortostatica,…","_s":"benzodiazepine (bdz) b1 sedativo-ipnotici e ansiolitici  modulatori allosterici positivi del recettore gaba-a; ↑ frequenza di apertura del canale del cl⁻ (solo in presenza di gaba). sito di legame extracellulare (ecd), tra subunità α e γ (γ2 la più abbondante). ansia, insonnia, astinenza da alcol, stato di male epilettico, premedicazione/anestesia bilanciata, sedazione per manovre, spasticità centrale. non analgesici (solo adiuvanti nel dolore). dosi terapeutiche (sedazione, astenia, ↓ performance psicomotoria, hangover, amnesia anterograda — \"droga dello stupro\"); dosi tossiche (ipotensione ortostatica, ipotermia, confusione; ⚠️ letale con altri depressori snc); anziani (confusione, atassia, effetti paradossi); ⚠️ gravidanza (teratogene, astinenza neonatale)."}, azione di 5-HT3/4/7 (disturbi sessuali), 5-HT2A/2C (agitazione).","_s":"buspirone e serotoninergici (ansia cronica) b1 sedativo-ipnotici e ansiolitici buspirone buspirone = agonista parziale del recettore 5-ht1a post-sinaptico (agisce in presenza di serotonina). ssri → ↑ serotonina nella cleft → down-regulation 5-ht1a → ↓ ansia; ↑ allopregnanolone (modulatore allosterico positivo del gaba). *(distinzione: ansia acuta → gaba/bdz; ansia cronica → serotonina.)* ansia cronica; ssri nei disturbi d'ansia associati a depressione. ssri → stimolazione di 5-ht3/4/7 (disturbi sessuali), 5-ht2a/2c (agitazione)."},{"id":"B1__neurosteroidi-steroidi-neuroattivi","deck":"B1","mod":"II","name":"Neurosteroidi (steroidi neuroattivi)","drugs":[],"o":9,"mecc":"prodotti nel SNC a partire dal progesterone (allopregnanolone, deidroepiandrosterone, pregnenolone); modulatori allosterici positivi del GABA-A.","ind":"effetto ansiolitico, anticonvulsivante, sedativo; bersaglio di farmaci che ne modulano la sintesi (etifoxina, SSRI).","adr":"carenza → ↑ stato ansioso.","_s":"neurosteroidi (steroidi neuroattivi) b1 sedativo-ipnotici e ansiolitici  prodotti nel snc a partire dal progesterone (allopregnanolone, deidroepiandrosterone, pregnenolone); modulatori allosterici positivi del gaba-a. effetto ansiolitico, anticonvulsivante, sedativo; bersaglio di farmaci che ne modulano la sintesi (etifoxina, ssri). carenza → ↑ stato ansioso."},{"id":"B2__anestetici-generali-principi","deck":"B2","mod":"II","name":"Anestetici generali — principi","drugs":[],"o":10,"mecc":"potenziamento della trasmissione GABAergica + ↓ trasmissione glutammatergica (e nicotinici ACh). Siti centrali: talamo, formazione reticolare, corteccia, ippocampo.","ind":"","adr":"cuore (⚠️ sensibilizzazione alle catecolamine → aritmie, specie alogenati), ipotermia, nausea/vomito (CTZ), epatotossicità. ⚠️ Cesareo: no diazepam. Risveglio =…","_s":"anestetici generali — principi b2 anestetici generali e locali  potenziamento della trasmissione gabaergica + ↓ trasmissione glutammatergica (e nicotinici ach). siti centrali: talamo, formazione reticolare, corteccia, ippocampo.  cuore (⚠️ sensibilizzazione alle catecolamine → aritmie, specie alogenati), ipotermia, nausea/vomito (ctz), epatotossicità. ⚠️ cesareo: no diazepam. risveglio = ridistribuzione dal sito d'azione (anestetici lipofili)."},{"id":"B2__anestetici-inalatori-volatili-alotano-is","deck":"B2","mod":"II","name":"Anestetici inalatori / volatili (alotano, isoflurano, desflurano, sevoflurano, protossido d'azoto, enflurano)","drugs":["alotano","isoflurano","desflurano","sevoflurano","protossido d'azoto","enflurano"],"o":10,"mecc":"potenziamento GABA-A, ↓ glutammato; canali K⁺ sensibili all'alotano (TREK, doppio poro).","ind":"mantenimento dell'anestesia. Desflurano/sevoflurano = più evoluti (no irritazione respiratoria, rapido onset/recovery; desflurano richiede vaporizzatore);…","adr":"alotano (⚠️ aritmogeno, sensibilizza il cuore alle catecolamine; epatotossico); enflurano (⚠️ convulsioni simil-epilettiche); isoflurano (⚠️ ischemia miocardica…","_s":"anestetici inalatori / volatili (alotano, isoflurano, desflurano, sevoflurano, protossido d'azoto, enflurano) b2 anestetici generali e locali alotano isoflurano desflurano sevoflurano protossido d'azoto enflurano potenziamento gaba-a, ↓ glutammato; canali k⁺ sensibili all'alotano (trek, doppio poro). mantenimento dell'anestesia. desflurano/sevoflurano = più evoluti (no irritazione respiratoria, rapido onset/recovery; desflurano richiede vaporizzatore); protossido d'azoto = rapido ma anestesia incompleta (no rilassamento → + miorilassante). alotano (⚠️ aritmogeno, sensibilizza il cuore alle catecolamine; epatotossico); enflurano (⚠️ convulsioni simil-epilettiche); isoflurano (⚠️ ischemia miocardica nei coronaropatici, irritazione respiratoria)."},{"id":"B2__anestetici-endovenosi-tiopentale-propofo","deck":"B2","mod":"II","name":"Anestetici endovenosi (tiopentale, propofol, etomidato, ketamina, fent essione del centro del respiro → morte. · cardiovascolare (dosi più alte): tachicardia iniziale (vasodilatazione → riflesso) → blocco di conduzione → asistolia. causa più frequente: iniezione intravascolare accidentale. · ematologici: metaemoglobinemia (prilocaina, lidocaina, benzocaina → o-toluidina). · idiosincrasia (1ª esposizione), ipersensibilità (anafilassi, rilascio di istamina); danno tissutale locale ad alte dosi. · associazione con vasocostrittore (adrenalina, α1): ↓ assorbimento sistemico, ↓ adr, ↑ durata, ↓ sanguinamento. ⚠️ adrenalina → effetti sistemici (ipertensione, tachicardia, fibrillazione); rallenta la cicatrizzazione (no in regioni con scarsa circolazione collaterale); ⚠️ pz con β-bloccanti non selettivi (propranololo) → rialzo pressorio/arresto cardiaco (no problema con metoprololo cardioselettivo)."},{"id":"B3__antidepressivi-basi-fisiopatologiche","deck":"B3","mod":"II","name":"Antidepressivi — basi fisiopatologiche","drugs":[],"o":11,"mecc":"","ind":"","adr":"","_s":"antidepressivi — basi fisiopatologiche b3 antidepressivi    "},{"id":"B3__antidepressivi-triciclici-tca","deck":"B3","mod":"II","name":"Antidepressivi triciclici (TCA)","drugs":[],"o":11,"mecc":"inibizione dei carrier di reuptake di NA e 5-HT. Amine terziarie (amitriptilina, imipramina, doxepina, clomipramina → NA+5-HT, ampie); amine secondarie…","ind":"depressione (efficaci ma non di prima linea); adiuvanti nel dolore (potenziano le vie discendenti inibitorie NA/5-HT) — NON analgesici.","adr":"anti-M1 (visione offuscata, ↓ digestione, costipazione), anti-α1 (ipotensione ortostatica), vertigini, disturbi sessuali, aumento ponderale (anti-H1);…","_s":"antidepressivi triciclici (tca) b3 antidepressivi  inibizione dei carrier di reuptake di na e 5-ht. amine terziarie (amitriptilina, imipramina, doxepina, clomipramina → na+5-ht, ampie); amine secondarie (nortriptilina, desipramina, amoxapina → prevalentemente na). depressione (efficaci ma non di prima linea); adiuvanti nel dolore (potenziano le vie discendenti inibitorie na/5-ht) — non analgesici. anti-m1 (visione offuscata, ↓ digestione, costipazione), anti-α1 (ipotensione ortostatica), vertigini, disturbi sessuali, aumento ponderale (anti-h1); up-regulation 5-ht2 → allucinazioni; ⚠️ blocco canali na/ca → cardiotossicità (aritmie, blocco av); adr durano 6-7 settimane."},{"id":"B3__imao-inibitori-delle-monoamino-ossidasi","deck":"B3","mod":"II","name":"IMAO (inibitori delle monoamino-ossidasi)","drugs":[],"o":11,"mecc":"inibizione delle MAO-A (le MAO-B → dopamina/Parkinson). 1ª generazione = inibitori irreversibili; moclobemide = reversibile (sospendibile).","ind":"depressione (1ª generazione oggi non più usata).","adr":"⚠️ effetti atropino-simili; ⚠️ effetto formaggio (la tiramina dei formaggi non viene degradata → severe crisi ipertensive).","_s":"imao (inibitori delle monoamino-ossidasi) b3 antidepressivi  inibizione delle mao-a (le mao-b → dopamina/parkinson). 1ª generazione = inibitori irreversibili; moclobemide = reversibile (sospendibile). depressione (1ª generazione oggi non più usata). ⚠️ effetti atropino-simili; ⚠️ effetto formaggio (la tiramina dei formaggi non viene degradata → severe crisi ipertensive)."},{"id":"B3__sindrome-serotoninergica","deck":"B3","mod":"II","name":"Sindrome serotoninergica","drugs":[],"o":11,"mecc":"","ind":"","adr":"agitazione, tremore, sudorazione, contrazioni muscolari, disturbi GI; ⚠️ coma e morte.","_s":"sindrome serotoninergica b3 antidepressivi    agitazione, tremore, sudorazione, contrazioni muscolari, disturbi gi; ⚠️ coma e morte."},{"id":"B3__ssri-citalopram-escitalopram-fluoxetina-","deck":"B3","mod":"II","name":"SSRI (citalopram, escitalopram, fluoxetina, fluvoxamina, sertralina, paroxetina)","drugs":["citalopram","escitalopram","fluoxetina","fluvoxamina","sertralina","paroxetina"],"o":11,"mecc":"inibizione potente e selettiva del reuptake della serotonina (SERT). Sequenza: ↓ reuptake somato-dendritico → ↑ 5-HT → stimola autorecettori 5-HT1A →…","ind":"depressione (PRIMA LINEA, maneggevoli), ansia, DOC, disturbi del comportamento alimentare (anoressia, binge eating). Peculiarità: paroxetina/fluoxetina (anche ↓…","adr":"acatisia (5-HT2 via nigrostriatale → ↓ dopamina), DOC, ansia, ↑ appetito/bulimia, nausea/vomito (5-HT3), diarrea/crampi (5-HT4), ↓ libido. NO aumento…","_s":"ssri (citalopram, escitalopram, fluoxetina, fluvoxamina, sertralina, paroxetina) b3 antidepressivi citalopram escitalopram fluoxetina fluvoxamina sertralina paroxetina inibizione potente e selettiva del reuptake della serotonina (sert). sequenza: ↓ reuptake somato-dendritico → ↑ 5-ht → stimola autorecettori 5-ht1a → down-regulation autorecettori → ↑ firing → ↑ rilascio assonale; dopo down-regulation di 5-ht2a, il 5-ht1a post-sinaptico (corteccia prefrontale) segnala → miglioramento. depressione (prima linea, maneggevoli), ansia, doc, disturbi del comportamento alimentare (anoressia, binge eating). peculiarità: paroxetina/fluoxetina (anche ↓ reuptake na → astenici); sertralina (↓ dat → ↓ anedonia); fluvoxamina (antagonista adenosina); citalopram (il più selettivo → scelta nell'ansia cronica). acatisia (5-ht2 via nigrostriatale → ↓ dopamina), doc, ansia, ↑ appetito/bulimia, nausea/vomito (5-ht3), diarrea/crampi (5-ht4), ↓ libido. no aumento ponderale/effetti anti-m1/anti-α1 (≠ tca)."},{"id":"B3__reboxetina-nri-inibitore-reuptake-noradr","deck":"B3","mod":"II","name":"Reboxetina (NRI — inibitore reuptake noradrenalina)","drugs":["reboxetina"],"o":11,"mecc":"inibitore selettivo del reuptake della noradrenalina.","ind":"depressione a sintomatologia noradrenergica (fatica, apatia, rallentamento psicomotorio/cognitivo, deficit di attenzione).","adr":"⚠️ non indicata in ipertesi/turbe del ritmo/rischio cardiocircolatorio.","_s":"reboxetina (nri — inibitore reuptake noradrenalina) b3 antidepressivi reboxetina inibitore selettivo del reuptake della noradrenalina. depressione a sintomatologia noradrenergica (fatica, apatia, rallentamento psicomotorio/cognitivo, deficit di attenzione). ⚠️ non indicata in ipertesi/turbe del ritmo/rischio cardiocircolatorio."},{"id":"B3__bupropione-dri-inibitore-reuptake-dopami","deck":"B3","mod":"II","name":"Bupropione (DRI — inibitore reuptake dopamina)","drugs":["bupropione"],"o":11,"mecc":"inibitore selettivo del reuptake della dopamina (+ ↑ NA).","ind":"dipendenza da nicotina (↑ dopamina mesolimbica → ↓ craving); cocainomani; effetto antidepressivo non potente.","adr":"⚠️ ↑ NA → rischio cardiovascolare nei fumatori.","_s":"bupropione (dri — inibitore reuptake dopamina) b3 antidepressivi bupropione inibitore selettivo del reuptake della dopamina (+ ↑ na). dipendenza da nicotina (↑ dopamina mesolimbica → ↓ craving); cocainomani; effetto antidepressivo non potente. ⚠️ ↑ na → rischio cardiovascolare nei fumatori."},{"id":"B3__venlafaxina-snri","deck":"B3","mod":"II","name":"Venlafaxina (SNRI)","drugs":["venlafaxina"],"o":11,"mecc":"inibitore del reuptake di serotonina e noradrenalina (prima 5-HT, poi NA). \"Sintesi tra citalopram e reboxetina\"; come amina secondaria senza effetti anti-α1/M1/H1.","ind":"depressione di SECONDA LINEA (resistenza agli SSRI).","adr":"profilo migliore dei TCA (N/D specifiche nei documenti).","_s":"venlafaxina (snri) b3 antidepressivi venlafaxina inibitore del reuptake di serotonina e noradrenalina (prima 5-ht, poi na). \"sintesi tra citalopram e reboxetina\"; come amina secondaria senza effetti anti-α1/m1/h1. depressione di seconda linea (resistenza agli ssri). profilo migliore dei tca (n/d specifiche nei documenti)."},{"id":"B3__nassa-mirtazapina","deck":"B3","mod":"II","name":"NaSSA (mirtazapina)","drugs":["mirtazapina"],"o":11,"mecc":"antagonista α2 (auto- ed etero-recettori) → ↑ rilascio di NA e 5-HT (↑ firing serotoninergico via α1); antagonista 5-HT3 (antiemetico), 5-HT2A, 5-HT2C, H1. La 5-HT…","ind":"depressione; utile nei maschi depressi con disturbo sessuale (blocco 5-HT2A).","adr":"⚠️ ↑ NA nocivo nei cardiopatici (angina, vasospasmo); anti-H1 → aumento ponderale + sedazione.","_s":"nassa (mirtazapina) b3 antidepressivi mirtazapina antagonista α2 (auto- ed etero-recettori) → ↑ rilascio di na e 5-ht (↑ firing serotoninergico via α1); antagonista 5-ht3 (antiemetico), 5-ht2a, 5-ht2c, h1. la 5-ht rilasciata si lega prevalentemente al 5-ht1. depressione; utile nei maschi depressi con disturbo sessuale (blocco 5-ht2a). ⚠️ ↑ na nocivo nei cardiopatici (angina, vasospasmo); anti-h1 → aumento ponderale + sedazione."},{"id":"B3__sari-trazodone-nefazodone","deck":"B3","mod":"II","name":"SARI (trazodone, nefazodone)","drugs":["trazodone","nefazodone"],"o":11,"mecc":"forte inibizione 5-HT2A (> mirtazapina) → potenziano i 5-HT1; + inibizione del reuptake della serotonina. Azione più rapida (bloccano direttamente il 5-HT2A).","ind":"depressione.","adr":"N/D specifiche nei documenti.","_s":"sari (trazodone, nefazodone) b3 antidepressivi trazodone nefazodone forte inibizione 5-ht2a (> mirtazapina) → potenziano i 5-ht1; + inibizione del reuptake della serotonina. azione più rapida (bloccano direttamente il 5-ht2a). depressione. n/d specifiche nei documenti."},{"id":"B4__disturbo-bipolare-basi","deck":"B4","mod":"II","name":"Disturbo bipolare — basi","drugs":[],"o":12,"mecc":"","ind":"","adr":"alternanza di episodi maniacali/ipomaniacali e depressivi (anche episodio misto); ciclicità stagionale; ↓ funzioni esecutive/decision making, disturbi del sonno;…","_s":"disturbo bipolare — basi b4 disturbo bipolare / stabilizzanti dell'umore    alternanza di episodi maniacali/ipomaniacali e depressivi (anche episodio misto); ciclicità stagionale; ↓ funzioni esecutive/decision making, disturbi del sonno; ⚠️ ~¼ dei pazienti tenta il suicidio."},{"id":"B4__litio-sali-di-litio","deck":"B4","mod":"II","name":"Litio (sali di litio)","drugs":["litio"],"o":12,"mecc":"GOLD STANDARD del disturbo bipolare; \"stabilizzante dell'umore/di membrana\" (competizione col Na⁺). Meccanismo non del tutto noto: altera le proteine G e…","ind":"disturbo bipolare — prevenzione di ricadute e cycling; efficace nella mania/ipomania acuta (≠ antidepressivi).","adr":"tossicità (competizione col Na⁺) renale, tiroidea (ipo-/iper-), cardiaca (conduzione), nervosa. Severi nel lungo termine (~10 anni): impairment cognitivo,…","_s":"litio (sali di litio) b4 disturbo bipolare / stabilizzanti dell'umore litio gold standard del disturbo bipolare; \"stabilizzante dell'umore/di membrana\" (competizione col na⁺). meccanismo non del tutto noto: altera le proteine g e l'accoppiamento del segnale con fosfolipidi di membrana/ip3 → deprime la trasduzione; blocca la gsk3β → ↑ neuroprotezione, ↓ neuroinfiammazione. disturbo bipolare — prevenzione di ricadute e cycling; efficace nella mania/ipomania acuta (≠ antidepressivi). tossicità (competizione col na⁺) renale, tiroidea (ipo-/iper-), cardiaca (conduzione), nervosa. severi nel lungo termine (~10 anni): impairment cognitivo, nefrotossicità, ipotiroidismo, iperparatiroidismo. ⚠️ gravidanza/puerperio possono peggiorare."},{"id":"B4__acido-valproico-valproato-sodico-come-st","deck":"B4","mod":"II","name":"Acido valproico (valproato sodico) — come stabilizzante dell'umore","drugs":["acido valproico","valproato sodico"],"o":12,"mecc":"blocco canali Na⁺ (stabilizzante di membrana) + blocco canali Ca²⁺ (↓ glutammato) + blocco NMDA (neuroprotezione) + ↑ GABA (↑ GAD, ↓ GABA-transaminasi, ↓ reuptake)…","ind":"disturbo bipolare (stabilizzante dell'umore indiscusso); epilessia (vedi B9).","adr":"⚠️ importante effetto TERATOGENO (gravi malformazioni, specie nel 1° trimestre).","_s":"acido valproico (valproato sodico) — come stabilizzante dell'umore b4 disturbo bipolare / stabilizzanti dell'umore acido valproico valproato sodico blocco canali na⁺ (stabilizzante di membrana) + blocco canali ca²⁺ (↓ glutammato) + blocco nmda (neuroprotezione) + ↑ gaba (↑ gad, ↓ gaba-transaminasi, ↓ reuptake) = gabamimetico. disturbo bipolare (stabilizzante dell'umore indiscusso); epilessia (vedi b9). ⚠️ importante effe operidolo antiemetico (vomito da ↑ dopamina).","adr":"come i TCA (anti-H1/α1/M1); ⚠️ sintomi extrapiramidali/simil-Parkinson (blocco D2 nigrostriatale: distonia, discinesia, acatisia); ⚠️ sindrome maligna da…","_s":"antipsicotici tipici (1ª generazione / neurolettici) b5 antipsicotici  blocco del recettore d2 → effetto antipsicotico (riducono i sintomi positivi, non curano); \"neurolessi\" (silenzio psichico e motorio). fenotiazine (clorpromazina — la prima, perfenazina, flufenazina): forte blocco h1, moderato blocco d2, sedative. butirrofenoni (aloperidolo — gold standard sintomi positivi, alta potenza, forte blocco d2, scarso anti-h1 → poca sedazione; droperidolo — antiemetico): non sedativi. schizofrenia (sintomi positivi); droperidolo antiemetico (vomito da ↑ dopamina). come i tca (anti-h1/α1/m1); ⚠️ sintomi extrapiramidali/simil-parkinson (blocco d2 nigrostriatale: distonia, discinesia, acatisia); ⚠️ sindrome maligna da neurolettici (più con butirrofenoni); iperprolattinemia. ⚠️ peggiorano i sintomi negativi (↓ da mesocorticale)."},{"id":"B5__antipsicotici-atipici-2-generazione","deck":"B5","mod":"II","name":"Antipsicotici atipici (2ª generazione)","drugs":[],"o":13,"mecc":"antagonismo 5-HT2A + DEBOLE blocco D2 (\"atipia\"). Il blocco 5-HT2A modula la dopamina: mesolimbica (↓ sintomi positivi), nigrostriatale (↓ extrapiramidali),…","ind":"schizofrenia (1ª scelta per linee guida — meno extrapiramidali/deficit cognitivo); migliorano i sintomi negativi. Risperidone = il più usato nei giovani (disturba…","adr":"⚠️ sindrome dismetabolica/metabolica + aumento ponderale (specie 2ª gen); sedazione (clozapina, quetiapina); ⚠️ agranulocitosi (clozapina 0,5-1%); ⚠️ allungamento…","_s":"antipsicotici atipici (2ª generazione) b5 antipsicotici  antagonismo 5-ht2a + debole blocco d2 (\"atipia\"). il blocco 5-ht2a modula la dopamina: mesolimbica (↓ sintomi positivi), nigrostriatale (↓ extrapiramidali), mesocorticale (↑ da → migliora i sintomi negativi). interagiscono anche con tutti i recettori da/5-ht e α1/α2. schizofrenia (1ª scelta per linee guida — meno extrapiramidali/deficit cognitivo); migliorano i sintomi negativi. risperidone = il più usato nei giovani (disturba meno le altre neurotrasmissioni; blocco 5-ht2a/2c/7 + d2). clozapina = ultimo farmaco nei pazienti resistenti (il più efficace; agisce anche su nicotinico e nmda). *(altri: olanzapina, quetiapina, ziprasidone, sertindolo, paliperidone, iloperidone, asenapina, lurasidone.)* ⚠️ sindrome dismetabolica/metabolica + aumento ponderale (specie 2ª gen); sedazione (clozapina, quetiapina); ⚠️ agranulocitosi (clozapina 0,5-1%); ⚠️ allungamento qt."},{"id":"B5__aripiprazolo-3-generazione","deck":"B5","mod":"II","name":"Aripiprazolo (3ª generazione)","drugs":["aripiprazolo"],"o":13,"mecc":"blocco 5-HT2 + agonista PARZIALE D2 (antagonista in presenza di alte concentrazioni dell'agonista puro, agonista in sua assenza).","ind":"schizofrenia; 2ª scelta nei soggetti con Parkinson.","adr":"riduce la prolattina (a differenza dei tipici).","_s":"aripiprazolo (3ª generazione) b5 antipsicotici aripiprazolo blocco 5-ht2 + agonista parziale d2 (antagonista in presenza di alte concentrazioni dell'agonista puro, agonista in sua assenza). schizofrenia; 2ª scelta nei soggetti con parkinson. riduce la prolattina (a differenza dei tipici)."},{"id":"B5__antipsicotici-effetti-indesiderati-e-for","deck":"B5","mod":"II","name":"Antipsicotici — effetti indesiderati e formulazioni LAI","drugs":[],"o":13,"mecc":"","ind":"","adr":"reazioni distoniche (macroglossia, torcicollo → anticolinergici); ⚠️ SINDROME MALIGNA DA NEUROLETTICI (rigidità \"a tubo di piombo\"/ruota dentata, ipertermia,…","_s":"antipsicotici — effetti indesiderati e formulazioni lai b5 antipsicotici    reazioni distoniche (macroglossia, torcicollo → anticolinergici); ⚠️ sindrome maligna da neurolettici (rigidità \"a tubo di piombo\"/ruota dentata, ipertermia, ipotensione, tachicardia, ↑ creatinina/leucociti → sospendere la terapia); sedazione (clozapina, clorpromazina, quetiapina); aumento peso/sindrome metabolica (2ª gen); iperprolattinemia (1ª gen; aripiprazolo la riduce); agranulocitosi (clozapina); convulsioni (clozapina); ⚠️ allungamento del qt (la maggior parte)."},{"id":"B6__parkinson-strategia-terapeutica","deck":"B6","mod":"II","name":"Parkinson — strategia terapeutica","drugs":[],"o":14,"mecc":"","ind":"","adr":"","_s":"parkinson — strategia terapeutica b6 antiparkinson    "},{"id":"B6__levodopa-l-dopa-carbidopa-benserazide","deck":"B6","mod":"II","name":"Levodopa (L-DOPA + carbidopa/benserazide)","drugs":["levodopa","L-DOPA","carbidopa","benserazide"],"o":14,"mecc":"precursore/pro-farmaco della dopamina (la dopamina non attraversa la BEE); convertita dalla DOPA-decarbossilasi. ⚠️ L-DOPA non lipofila → passa la BEE solo 1-3% →…","ind":"Parkinson (gold standard; grande miglioramento motorio).","adr":"⚠️ discinesia tardiva (80% a lungo termine, dose-dipendente, coreiforme; più nei giovani; via D1/dinorfina); ⚠️ fenomeno on/off (OFF = acinesia; ON = mobilità con…","_s":"levodopa (l-dopa + carbidopa/benserazide) b6 antiparkinson levodopa l-dopa carbidopa benserazide precursore/pro-farmaco della dopamina (la dopamina non attraversa la bee); convertita dalla dopa-decarbossilasi. ⚠️ l-dopa non lipofila → passa la bee solo 1-3% → sempre associata a un inibitore della dopa-decarbossilasi periferica (↑ penetrazione centrale + ↓ effetti periferici, dopamina = β1-agonista sul cuore): carbidopa (it, *sinemet*) o benserazide (uk), che non superano la bee. parkinson (gold standard; grande miglioramento motorio). ⚠️ discinesia tardiva (80% a lungo termine, dose-dipendente, coreiforme; più nei giovani; via d1/dinorfina); ⚠️ fenomeno on/off (off = acinesia; on = mobilità con discinesia); periodo \"honeymoon\" iniziale (~1 anno); nausea/vomito, anoressia, ipotensione, confusione, insonnia, incubi; effetti comportamentali (well-being, \"dirty old man\"), allucinazioni/psicosi (da → neuroni serotoninergici → 5-ht); cardiovascolare (β1 periferico); ulcera peptica."},{"id":"B6__dopamino-agonisti","deck":"B6","mod":"II","name":"Dopamino-agonisti","drugs":[],"o":14,"mecc":"stimolano direttamente i recettori dopaminergici postsinaptici (bypassano il neurone). Ergot (segale cornuta): bromocriptina (D1-selettivo — efficace come L-DOPA…","ind":"Parkinson (iniziale: ropinirolo; avanzato: pramipexolo; off: apomorfina).","adr":"discinesia, nausea, sudorazione, ipotensione; ⚠️ pramipexolo → discontrollo degli impulsi/gambling; bromocriptina/pergolide (D1) → discinesia tardiva.","_s":"dopamino-agonisti b6 antiparkinson  stimolano direttamente i recettori dopaminergici postsinaptici (bypassano il neurone). ergot (segale cornuta): bromocriptina (d1-selettivo — efficace come l-dopa ma fluttuazioni motorie rapide), pergolide. non-ergot: pramipexolo (d2/d3/d4 — parkinson avanzato, levo-protettivo vs stress ossidativo), ropinirolo (d2/d1 — fasi iniziali, ritarda le discinesie conservando il d1), rotigotina (cerotto transdermico), apomorfina (tutti i recettori da, sc con penna — per i fenomeni off). parkinson (iniziale: ropinirolo; avanzato: pramipexolo; off: apomorfina). discinesia, nausea, sudorazione, ipotensione; ⚠️ pramipexolo → discontrollo degli impulsi/gambling; bromocriptina/pergolide (d1) → discinesia tardiva."},{"id":"B6__imao-b-selegilina-rasagilina-safinamide","deck":"B6","mod":"II","name":"IMAO-B (selegilina, rasagilina, safinamide)","drugs":["selegilina","rasagilina","safinamide"],"o":14,"mecc":"inibizione delle MAO-B → ↓ catabolismo della dopamina → ↑ disponibilità sinaptica. Disease-modifying (rallentano l'andamento). Selegilina/rasagilina = effetto…","ind":"Parkinson (rasagilina rallenta la progressione, bassa incidenza di effetti; safinamide + dopamino-mimetici).","adr":"⚠️ il blocco delle MAO-A → accumulo di noradrenalina (rilevante nel paziente cardiocircolatorio). Effetto formaggio: vedi file B3.","_s":"imao-b (selegilina, rasagilina, safinamide) b6 antiparkinson selegilina rasagilina safinamide inibizione delle mao-b → ↓ catabolismo della dopamina → ↑ disponibilità sinaptica. disease-modifying (rallentano l'andamento). selegilina/rasagilina = effetto antiossidante/neuroprotettivo/scavenger dei radicali liberi (fasi iniziali; mantengono bassa la l-dopa evitando la desensibilizzazione). parkinson (rasagilina rallenta la progressione, bassa incidenza di effetti; safinamide + dopamino-mimetici). ⚠️ il blocco delle mao-a → accumulo di noradrenalina (rilevante nel paziente cardiocircolatorio). effetto formaggio: vedi file b3."},{"id":"B6__comt-inibitori-entacapone-opicapone-tolc","deck":"B6","mod":"II","name":"COMT-inibitori (entacapone, opicapone, tolcapone)","drugs":["entacapone","opicapone","tolcapone"],"o":14,"mecc":"inibizione delle catecol-O-metiltransferasi → ↑ disponibilità di L-DOPA e penetrazione attraverso la BEE (fondamentali per il fenomeno on/off).","ind":"Parkinson (fenomeno on/off, add-on alla L-DOPA).","adr":"⚠️ tolcapone = altamente epatotossico (entacapone/opicapone maneggevoli).","_s":"comt-inibitori (entacapone, opicapone, tolcapone) b6 antiparkinson entacapone opicapone tolcapone inibizione delle catecol-o-metiltransferasi → ↑ disponibilità di l-dopa e penetrazione attraverso la bee (fondamentali per il fenomeno on/off). parkinson (fenomeno on/off, add-on alla l-dopa). ⚠️ tolcapone = altamente epatotossico (entacapone/opicapone maneggevoli)."},{"id":"B6__amantadina-antimuscarinici-e-farmaci-acc","deck":"B6","mod":"II","name":"Amantadina, antimuscarinici e farmaci accessori","drugs":["amantadina"],"o":14,"mecc":"","ind":"","adr":"","_s":"amantadina, antimuscarinici e farmaci accessori b6 antiparkinson amantadina   "},{"id":"B7__alzheimer-strategia-terapeutica","deck":"B7","mod":"II","name":"Alzheimer — strategia terapeutica","drugs":[],"o":15,"mecc":"","ind":"","adr":"","_s":"alzheimer — strategia terapeutica b7 alzheimer e sclerosi multipla    "},{"id":"B7__inibitori-dell-acetilcolinesterasi-donep","deck":"B7","mod" isti (diidropiridine, verapamil, diltiazem)","drugs":["verapamil","diltiazem"],"o":19,"mecc":"bloccano i canali del Ca²⁺ voltaggio-dipendenti di tipo L (subunità α1C; siti di legame diversi). Diidropiridine (nifedipina, amlodipina, felodipina, nisoldipina):…","ind":"ipertensione (solo diidropiridine, tranne alterazioni elettriche), angina pectoris (tutte e 3 le classi → vasodilatazione coronarica), aritmie (verapamil/diltiazem…","adr":"diidropiridine → edema, cefalea, tachicardia riflessa (nifedipina; amlodipina no); verapamil/diltiazem → ⚠️ bradicardia/blocco AV, ↓ inotropismo.","_s":"calcio-antagonisti (diidropiridine, verapamil, diltiazem) b11 raas verapamil diltiazem bloccano i canali del ca²⁺ voltaggio-dipendenti di tipo l (subunità α1c; siti di legame diversi). diidropiridine (nifedipina, amlodipina, felodipina, nisoldipina): selettive per i vasi (tessuto-selettività vaso:cuore — amlodipina 10:1, nisoldipina 1000:1); blocco voltaggio-dipendente; vasodilatazione; non cronotrope negative. verapamil (fenilalchilamina): prevalente attività cardiaca; blocco frequenza-dipendente → nodale → cronotropo negativo; ↓ mobilizzazione del ca intracellulare. diltiazem (benzotiazepina): cuore + vasi, cronotropo negativo. ipertensione (solo diidropiridine, tranne alterazioni elettriche), angina pectoris (tutte e 3 le classi → vasodilatazione coronarica), aritmie (verapamil/diltiazem = antiaritmici classe iv). diidropiridine → edema, cefalea, tachicardia riflessa (nifedipina; amlodipina no); verapamil/diltiazem → ⚠️ bradicardia/blocco av, ↓ inotropismo."},{"id":"B11b__insufficienza-cardiaca-basi-fisiopatolog","deck":"B11b","mod":"II","name":"Insufficienza cardiaca — basi fisiopatologiche","drugs":[],"o":20,"mecc":"","ind":"","adr":"","_s":"insufficienza cardiaca — basi fisiopatologiche b11b scompenso/digitale, xantine e diuretici    "},{"id":"B11b__digitale-digossina","deck":"B11b","mod":"II","name":"Digitale / digossina","drugs":["digossina"],"o":20,"mecc":"lega la pompa Na⁺/K⁺-ATPasi (stato E2-P) competendo col K⁺ → ↑ Na⁺ intracellulare → lo scambiatore Na/Ca inverte → ↑ Ca²⁺ → inotropo positivo. ⚠️ ipokaliemia ↑…","ind":"scompenso cardiaco cronico; antiaritmico (↑ frequenza atriale → converte flutter→FA + blocco al nodo AV).","adr":"⚠️ tossicità SNC = primo segno (confusione/disorientamento → drug holiday); aritmie da rientro (potenziali più brevi), blocco AV/asistolia. Mai tachicardia…","_s":"digitale / digossina b11b scompenso/digitale, xantine e diuretici digossina lega la pompa na⁺/k⁺-atpasi (stato e2-p) competendo col k⁺ → ↑ na⁺ intracellulare → lo scambiatore na/ca inverte → ↑ ca²⁺ → inotropo positivo. ⚠️ ipokaliemia ↑ effetto (più siti liberi), iperkaliemia ↓ effetto. scompenso cardiaco cronico; antiaritmico (↑ frequenza atriale → converte flutter→fa + blocco al nodo av). ⚠️ tossicità snc = primo segno (confusione/disorientamento → drug holiday); aritmie da rientro (potenziali più brevi), blocco av/asistolia. mai tachicardia ventricolare."},{"id":"B11b__teofillina-e-xantine","deck":"B11b","mod":"II","name":"Teofillina e xantine","drugs":["teofillina"],"o":20,"mecc":"1) inibizione delle PDE (simpaticomimetico, ↑ effetto delle catecolamine); 2) antagonismo dell'adenosina (→ ↑ tutte le proprietà cardiache, frequenza inclusa); 3)…","ind":"","adr":"⚠️ cardiotossiche (inotrope/cronotrope positive) → the/caffè sconsigliati ai cardiopatici.","_s":"teofillina e xantine b11b scompenso/digitale, xantine e diuretici teofillina 1) inibizione delle pde (simpaticomimetico, ↑ effetto delle catecolamine); 2) antagonismo dell'adenosina (→ ↑ tutte le proprietà cardiache, frequenza inclusa); 3) broncodilatazione (↑ camp); 4) effetti sul trasporto del ca²⁺.  ⚠️ cardiotossiche (inotrope/cronotrope positive) → the/caffè sconsigliati ai cardiopatici."},{"id":"B11b__diuretici-overview-siti-e-classi","deck":"B11b","mod":"II","name":"Diuretici — overview (siti e classi)","drugs":[],"o":20,"mecc":"","ind":"","adr":"","_s":"diuretici — overview (siti e classi) b11b scompenso/digitale, xantine e diuretici    "},{"id":"B11b__inibitori-dell-anidrasi-carbonica-acetaz","deck":"B11b","mod":"II","name":"Inibitori dell'anidrasi carbonica (acetazolamide, metazolamide)","drugs":["acetazolamide","metazolamide"],"o":20,"mecc":"inibizione dell'anidrasi carbonica nel tubulo prossimale → ↓ riassorbimento di Na⁺ (accoppiato al bicarbonato) → ↑ escrezione di bicarbonato, alcalinizzazione…","ind":"glaucoma (↓ umor acqueo), epilessia (anticonvulsivante diretto + acidosi), profilassi del mal di montagna, edema, correzione dell'alcalosi metabolica da diuretici,…","adr":"⚠️ calcolosi renale (precipitazione di fosfato di Ca in urina alcalina), mielodepressione, tossicità cutanea, reazioni allergiche, sonnolenza, acidosi metabolica.","_s":"inibitori dell'anidrasi carbonica (acetazolamide, metazolamide) b11b scompenso/digitale, xantine e diuretici acetazolamide metazolamide inibizione dell'anidrasi carbonica nel tubulo prossimale → ↓ riassorbimento di na⁺ (accoppiato al bicarbonato) → ↑ escrezione di bicarbonato, alcalinizzazione delle urine, acidosi metabolica ipokaliemica. glaucoma (↓ umor acqueo), epilessia (anticonvulsivante diretto + acidosi), profilassi del mal di montagna, edema, correzione dell'alcalosi metabolica da diuretici, in associazione (resistenza alla monoterapia). ⚠️ calcolosi renale (precipitazione di fosfato di ca in urina alcalina), mielodepressione, tossicità cutanea, reazioni allergiche, sonnolenza, acidosi metabolica."},{"id":"B11b__diuretici-osmotici-mannitolo","deck":"B11b","mod":"II","name":"Diuretici osmotici (mannitolo)","drugs":["mannitolo"],"o":20,"mecc":"forza osmotica nel lume → ↓ riassorbimento dell'ultrafiltrato → ↑ eliminazione di Na⁺/acqua; agisce sul tratto discendente dell'ansa; estrae acqua da…","ind":"glaucoma, edema cerebrale, sindrome da squilibrio da dialisi, bambini (anche lassativo).","adr":"⚠️ insufficienza cardiaca congestizia (richiamano acqua → edema polmonare), anuria, emorragia cranica, ipofunzionalità epatica. *(Argomento da slide — non trattato…","_s":"diuretici osmotici (mannitolo) b11b scompenso/digitale, xantine e diuretici mannitolo forza osmotica nel lume → ↓ riassorbimento dell'ultrafiltrato → ↑ eliminazione di na⁺/acqua; agisce sul tratto discendente dell'ansa; estrae acqua da occhio/cervello. glaucoma, edema cerebrale, sindrome da squilibrio da dialisi, bambini (anche lassativo). ⚠️ insufficienza cardiaca congestizia (richiamano acqua → edema polmonare), anuria, emorragia cranica, ipofunzionalità epatica. *(argomento da slide — non trattato a lezione.)*"},{"id":"B11b__diuretici-dell-ansa-drastici-furosemide-","deck":"B11b","mod":"II","name":"Diuretici dell'ansa / drastici (furosemide, bumetanide, ac. etacrinico, torasemide)","drugs":["furosemide","bumetanide","acido etacrinico","torasemide"],"o":20,"mecc":"inibizione del simporto Na⁺/K⁺/2Cl⁻ (tratto spesso ascendente dell'ansa) → escrezione globale di ioni (Na⁺, K⁺, Cl⁻, Ca²⁺, Mg²⁺); ↑ flusso renale (prostaglandine),…","ind":"edema polmonare acuto (\"salasso bianco\"), scompenso cronico, ipertensione, edema (sindrome nefrosica/cirrosi/ascite), ipercalcemia, diuresi forzata.","adr":"⚠️ ipokaliemia/ipocalcemia/ipomagnesemia → aritmie, alcalosi ipocloremica, ototossicità reversibile/tinnito (acido etacrinico > altri), iperuricemia, iperglicemia,…","_s":"diuretici dell'ansa / drastici (furosemide, bumetanide, ac. etacrinico, torasemide) b11b scompenso/digitale, xantine e diuretici furosemide bumetanide acido etacrinico torasemide inibizione del simporto na⁺/k⁺/2cl⁻ (tratto spesso ascendente dell'ansa) → escrezione globale di ioni (na⁺, k⁺, cl⁻, ca²⁺, mg²⁺); ↑ flusso renale (prostaglandine), ↑ renina/sraa. edema polmonare acuto (\"salasso bianco\"), scompenso cronico, ipertensione, edema (sindrome nefrosica/cirrosi/ascite), ipercalcemia, diuresi forzata. ⚠️ ipokaliemia/ipocalcemia/ipomagnesemia → aritmie, alcalosi ipocloremica, ototossicità reversibile/tinnito (acido etacrinico > altri), iperuricemia, iperglicemia, ↑ ldl-trigliceridi/↓ hdl (sindrome metabolica), iponatriemia/ipovolemia."},{"id":"B11b__diuretici-tiazidici-e-risparmiatori-di-k","deck":"B11b","mod":"II","name":"Diuretici tiazidici e risparmiatori di K⁺","drugs":[],"o":20,"mecc":"↓ volemia/precarico → poi compenso (SNS/SRAA) ma mantenimento della gittata; effetto vasodilatatorio diretto (HCTZ apre canali KCa; indapamide…","ind":"","adr":"","_s":"diuretici tiazidici e risparmiatori di k⁺ b11b scompenso/digitale, xantine e diuretici  ↓ volemia/precarico → poi compenso (sns/sraa) ma mantenimento della gittata; effetto vasodilatatorio diretto (hctz apre canali kca; indapamide simil-ca-antagonista). attività antipertensiva > diuretici drastici; effetto profibrinico (≠ furosemide fibrinolitica).  "},{"id":"B12__emostasi-e-bersagli-della-terapia","deck":"B12","mod":"II","name":"Emostasi e bersagli della terapia","drugs":[],"o":21,"mecc":"","ind":"","adr":"","_s":"emostasi e bersagli della terapia b12 antitrombotici    "},{"id":"B12__aspirina-e-inibitori-reversibili-della-c","deck":"B12","mod":"II","name":"Aspirina e inibitori reversibili della COX1","drugs":["Aspirina"],"o":21,"mecc":"aspirina = inibitore IRREVERSIBILE della COX1 (acetilazione Ser529) → ↓ trombossano (via PGH2) → ↓ aggregazione piastrinica.","ind":"","adr":"respiratorie da ↑ leucotrieni (angioedema, asma/broncospasmo, orticaria).","_s":"aspirina e inibitori reversibili della cox1 b12 antitrombotici aspirina aspirina = inibitore irreversibile della cox1 (acetilazione ser529) → ↓ trombossano (via pgh2) → ↓ aggregazione piastrinica.  respiratorie da ↑ leucotrieni (angioedema, asma/broncospasmo, orticaria)."},{"id":"B12__antagonisti-del-recettore-p2y12-ticlopid","deck":"B12","mod":"II","name":"Antagonisti del recettore P2Y12 (ticlopidina, clopidogrel, prasugrel, ticagrelor)","drugs":["ticlopidina","clopidogrel","prasugrel","ticagrelor"],"o":21,"mecc":"antagonisti del recettore purinergico P2Y12 (lega l'ADP → perpetua l'aggregazione).","ind":"","adr":"","_s":"antagonisti del recettore p2y12 (ticlopidina, clopidogrel, prasugrel, ticagrelor) b12 antitrombotici ticlopidina clopidogrel prasugrel ticagrelor antagonisti del recettore purinergico p2y12 (lega l'adp → perpetua l'aggregazione).  "},{"id":"B12__antagonisti-della-gp-iib-iiia-e-altri-an","deck":"B12","mod":"II","name":"Antagonisti della GP IIb/IIIa e altri antiaggreganti","drugs":[],"o":21,"mecc":"la GP IIb/IIIa è il punto finale comune dell'aggregazione (attivata da TXA2/ADP → aggancio del fibrinogeno → rete).","ind":"angina instabile, ischemia miocardica; in combinazione con eparina/aspirina prima/durante interventi cardiaci.","adr":"","_s":"antagonisti della gp iib/iiia e altri antiaggreganti b12 antitrombotici  la gp iib/iiia è il punto finale comune dell'aggregazione (attivata da txa2/adp → aggancio del fibrinogeno → rete). angina instabile, ischemia miocardica; in combinazione con eparina/aspirina prima/durante interventi cardiaci. "},{"id":"B12__eparina-eparine-a-basso-peso-molecolare-","deck":"B12","mod":"II","name":"Eparina, eparine a basso peso molecolare e derivati sintetici","drugs":["eparina"],"o":21,"mecc":"eparina = lega l'antitrombina potenziandone l'effetto (inibizione della trombina). Alto peso molecolare → ⚠️ risposta immune (shock anafilattico).","ind":"TVP, embolia polmonare, angina instabile, angioplastica, bypass cardio-polmonare.","adr":"⚠️ trombocitopenia (HIT, 1-2% dopo 4-5 gg, IgG anti-eparina/PF4), ↑ transaminasi, osteoporosi/ipercalcemia (>6 mesi). ANTIDOTO = protamina. · LMWH (enoxaparina,…","_s":"eparina, eparine a basso peso molecolare e derivati sintetici b12 antitrombotici eparina eparina = lega l'antitrombina potenziandone l'effetto (inibizione della trombina). alto peso molecolare → ⚠️ risposta immune (shock anafilattico). tvp, embolia polmonare, angina instabile, angioplastica, bypass cardio-polmonare. ⚠️ trombocitopenia (hit, 1-2% dopo 4-5 gg, igg anti-eparina/pf4), ↑ transaminasi, osteoporosi/ipercalcemia (>6 mesi). antidoto = protamina. · lmwh (enoxaparina, dalteparina, nadroparina, reviparina): catene corte → prevale l'azione anti-xa, minore attività anti-iia (antitrombina); tromboembolismo venoso/sca; sc ogni 12-24h; ⚠️ protamina poco efficace. · derivati sintetici (pentasaccaridi: fondaparinux, idraparinux, idrabiotaparinux): forte azione su xa; emivita lunga (fondaparinux 17-20h; idrabiotaparinux 120h, antidoto avidina via biotina); ⚠️ fondaparinux attraversa la placenta (no in gravidanza)."},{"id":"B12__anticoagulanti-orali-vka-inibitori-diret","deck":"B12","mod":"II","name":"Anticoagulanti orali (VKA, inibitori diretti del fattore Xa e della trombina)","drugs":[],"o":21,"mecc":"","ind":"","adr":"","_s":"anticoagulanti orali (vka, inibitori diretti del fattore xa e della trombina) b12 antitrombotici    "},{"id":"B12__fibrinolitici-e-antitrombotico-ideale","deck":"B12","mod":"II","name":"Fibrinolitici e antitrombotico ideale","drugs":[],"o":21,"mecc":"","ind":"","adr":"","_s":"fibrinolitici e antitrombotico ideale b12 antitrombotici    "},{"id":"B12b__vasodilatatori-overview-e-antagonisti-de","deck":"B12b","mod":"II","name":"Vasodilatatori — overview e antagonisti dell'endotelina (bosentan)","drugs":["bosentan"],"o":22,"mecc":"","ind":"","adr":"","_s":"vasodilatatori — overview e antagonisti dell'endotelina (bosentan) b12b vasodilatatori bosentan   "},{"id":"B12b__nitrati-nitrossidi-nitroglicerina-isosor","deck":"B12b","mod":"II","name":"Nitrati / nitrossidi (nitroglicerina, isosorbide, nitroprussiato)","drugs":["nitroglicerina","isosorbide","nitroprussiato"],"o":22,"mecc":"donatori di NO (EDRF), sintetizzato dalle NOS (endoteliale, SNC, piastrine) da arginina + O₂. NOS inducibile (⚠️ inibita dai glucocorticoidi, rilascio…","ind":"antianginosi/antiischemici; via sublinguale (angina emozionale/sporadica), transdermica (angina di Prinzmetal, controllo più accurato).","adr":"⚠️ tachifilassi, cefalea, ipotensione, tachicardia riflessa (compenso → locus coeruleus → cate
