<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tabella Farmaci · FarmacoFlash</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fff8ec; --paper-2:#fffdf7; --grid:rgba(140,110,60,.09);
  --ink:#3a322b; --ink-soft:#6f6253; --muted:#a3937e;
  --red:#ff6b6b; --yellow:#ffce3a; --blue:#4ea8de; --green:#5bc873; --purple:#b07cd6; --orange:#ff9f5a; --pink:#ff8fb1;
  --font-display:'Shantell Sans','Comic Sans MS',cursive; --font-body:'Nunito',system-ui,-apple-system,sans-serif;
  --shadow:3px 3px 0 rgba(58,50,43,.16); --spring:cubic-bezier(.34,1.52,.64,1);
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--font-body);font-weight:700;color:var(--ink);
  background:var(--paper);
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:26px 26px;
  -webkit-text-size-adjust:100%;padding-bottom:40px}
header{position:sticky;top:0;z-index:30;background:rgba(255,248,236,.97);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:2.5px dashed var(--ink);padding:14px max(16px,env(safe-area-inset-left)) 12px}
.hwrap{max-width:1180px;margin:0 auto}
.brand{display:flex;align-items:center;gap:12px}
.mk{width:40px;height:40px;flex:0 0 auto}
h1{font-family:var(--font-display);font-weight:800;font-size:1.5rem;margin:0;line-height:1}
.sub{font-family:var(--font-body);font-weight:800;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px}
main{max-width:1180px;margin:0 auto;padding:18px max(16px,env(safe-area-inset-left)) 0}
.search{width:100%;background:var(--paper-2);border:2.5px solid var(--ink);border-radius:16px 11px 15px 11px/11px 15px 11px 16px;padding:13px 16px;color:var(--ink);font-size:1.02rem;font-family:var(--font-body);font-weight:700;box-shadow:var(--shadow)}
.search::placeholder{color:var(--faint,#c2b39a)}
.row{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin:14px 0 6px}
.lab{font-family:var(--font-display);font-weight:700;font-size:.82rem;color:var(--ink-soft);margin-right:2px}
.chip{background:var(--paper-2);border:2.5px solid var(--ink);color:var(--ink);padding:5px 12px;border-radius:12px;font-size:.82rem;font-weight:800;cursor:pointer;transition:transform .15s var(--spring);box-shadow:2px 2px 0 rgba(58,50,43,.14);white-space:nowrap}
.chip:hover{transform:translateY(-1px)}
.chip.on{background:var(--yellow)}
.chip.dk{font-size:.78rem;padding:4px 10px}
.deckchips{max-height:104px;overflow:auto;padding:2px;gap:6px}
.count{font-family:var(--font-display);font-weight:700;color:var(--ink-soft);margin-left:auto;font-size:.9rem}
.tbl-wrap{margin-top:12px;border:2.5px solid var(--ink);border-radius:18px;overflow:auto;background:var(--paper-2);box-shadow:var(--shadow);max-height:calc(100vh - 250px)}
table{border-collapse:collapse;width:100%;min-width:880px}
thead th{position:sticky;top:0;z-index:2;background:#f3e7cd;border-bottom:2.5px solid var(--ink);text-align:left;font-family:var(--font-display);font-weight:800;font-size:.84rem;padding:11px 13px;color:var(--ink);cursor:pointer;user-select:none;white-space:nowrap}
thead th .ar{opacity:.4;font-size:.75rem}
thead th.s .ar{opacity:1;color:var(--red)}
tbody td{border-bottom:1.5px dotted #d9c9aa;padding:10px 13px;font-size:.9rem;vertical-align:top;line-height:1.32}
tbody tr:hover{background:#fffaf0}
.c-cls{white-space:nowrap}
.dchip{display:inline-block;font-family:var(--font-display);font-weight:800;font-size:.72rem;padding:2px 8px;border-radius:9px;border:2px solid var(--ink);color:var(--ink);margin-right:6px}
.c-cls small{color:var(--muted);font-weight:800;font-size:.74rem;display:block;margin-top:3px;max-width:160px;white-space:normal}
.c-name{font-family:var(--font-display);font-weight:700;font-size:.98rem;color:var(--ink);min-width:180px;max-width:250px}
.c-mecc,.c-ind,.c-adr{color:var(--ink-soft);font-weight:600;max-width:235px}
.mod-pill{display:inline-block;font-size:.66rem;font-weight:800;padding:1px 6px;border-radius:7px;border:1.5px solid var(--ink);margin-left:6px;color:var(--ink)}
.mod-I{background:#e7f0ff}.mod-II{background:#ffe9f1}
.empty{padding:40px;text-align:center;color:var(--muted);font-family:var(--font-display);font-weight:700;font-size:1.05rem}
mark{background:var(--yellow);color:var(--ink);border-radius:3px;padding:0 1px}
/* modalità compatta: nasconde le colonne di dettaglio */
body.compatta .col-d{display:none}
body.compatta table{min-width:0}
body.compatta .c-name{max-width:none}
.foot{max-width:1180px;margin:14px auto 0;padding:0 16px;color:var(--muted);font-weight:700;font-size:.78rem;text-align:center}
@media(max-width:560px){
  h1{font-size:1.25rem} .tbl-wrap{max-height:calc(100vh - 290px)}
  thead th,tbody td{padding:9px 10px}
}
</style>
</head>
<body>
<header><div class="hwrap">
  <div class="brand">
    <svg class="mk" viewBox="0 0 44 44" fill="none"><rect x="7" y="16" width="30" height="14" rx="7" transform="rotate(-30 22 22)" fill="#ff6b6b" stroke="#3a322b" stroke-width="2.6"/><line x1="15" y1="26" x2="29" y2="18" stroke="#3a322b" stroke-width="2.6"/></svg>
    <div><h1>Tabella Farmaci</h1><div class="sub">FarmacoFlash · da imparare a memoria</div></div>
  </div>
</div></header>
<main>
  <input class="search" id="q" type="search" autocomplete="off" placeholder="🔎 cerca un farmaco, una classe, un meccanismo…">
  <div class="row" id="modRow"><span class="lab">Modulo:</span></div>
  <div class="row"><span class="lab">Vista:</span>
    <button class="chip" id="compBtn">🧠 Compatta (solo nomi)</button>
    <button class="chip" id="clrBtn">↺ Azzera filtri</button>
    <span class="count" id="count"></span>
  </div>
  <div class="row deckchips" id="deckRow"><span class="lab">Classe:</span></div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th data-k="o" id="thCls">Classe <span class="ar">▾</span></th>
        <th data-k="name">Farmaco <span class="ar">▾</span></th>
        <th class="col-d" data-k="mecc">Meccanismo <span class="ar">▾</span></th>
        <th class="col-d" data-k="ind">Indicazioni <span class="ar">▾</span></th>
        <th class="col-d" data-k="adr">Reazioni avverse <span class="ar">▾</span></th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
  <div class="foot" id="foot"></div>
</main>
<script>
const DATA = [{"deck":"A4","mod":"I","name":"Glucocorticoidi (classe — meccanismo, effetti sistemici, ADR, interazioni)","o":0,"mecc":"lipofili (struttura sterolica, come il colesterolo). Legano recettori intracellulari: GR (glucocorticoid receptor, attivato ad alte concentrazioni) e MR…","ind":"terapia sostitutiva (insufficienza surrenalica → idrocortisone); risposta immunitaria anormale (immunosoppressione nel trapianto; autoimmuni: asma, artrite…","adr":"riflettono gli effetti sistemici fisiologici. Metabolismo: iperglicemia (↑ gluconeogenesi/glucosio-6-fosfatasi; insulino-resistenza), catabolismo proteico →…","_s":"glucocorticoidi (classe — meccanismo, effetti sistemici, adr, interazioni) a4 glucocorticoidi lipofili (struttura sterolica, come il colesterolo). legano recettori intracellulari: gr (glucocorticoid receptor, attivato ad alte concentrazioni) e mr (mineralcorticoide, alta affinità, attivato a basse conc). recettore complessato a hsp nel citosol → al legame si libera, dimerizza, va nel nucleo, lega i gre (glucocorticoid responsive element) → modula la trascrizione genica. azione antinfiammatoria: inibizione del nf-κb (↑ inibitori, ↓ espressione; meccanismo genomico e non-genomico) → ↓ cox-2, inos, citochine; ↑ annessina-1 → inibizione fosfolipasi a2 → ↓ acido arachidonico → ↓ prostaglandine e leucotrieni. terapia sostitutiva (insufficienza surrenalica → idrocortisone); risposta immunitaria anormale (immunosoppressione nel trapianto; autoimmuni: asma, artrite reumatoide, lupus, bpco; ipersensibilità/allergie); oncologia (leucemie, linfomi — azione selettiva sui linfociti t, + chemioterapici); edema (cerebrale, traumi). effetti su elementi figurati: ↓ eosinofili/linfociti t/macrofagi/dendritiche/mastociti; ↑ pmn in circolo (demarginazione + blocco migrazione tissutale); scarsi su linfociti b (immunità cellulare > umorale). riflettono gli effetti sistemici fisiologici. metabolismo: iperglicemia (↑ gluconeogenesi/glucosio-6-fosfatasi; insulino-resistenza), catabolismo proteico → miopatia steroidea, ridistribuzione adipe → facies lunare/cushingoide. idro-salino (mr): ipertensione, edema; ↑ escrezione ca → osteoporosi. cv: ↑ sensibilità alle catecolamine (↑ β1/α1) + sraa. gastrico: ↓ prostaglandine → ulcera peptica. snc: disturbi del comportamento/umore, alterazione ritmo sonno-veglia. alterazioni endocrine; ↓ gh nei bambini; cataratta/disturbi vista; immunosoppressione → infezioni. ⚠️ da sospensione brusca → insufficienza surrenalica acuta (asse soppresso) → sospensione graduale a scalare (preferire breve emivita e/o giorni alterni)."},{"deck":"A4","mod":"I","name":"Idrocortisone (= cortisolo) / Cortisone","o":0,"mecc":"glucocorticoide di riferimento (endogeno); attività glucocorticoide : mineralcorticoide = 1:1.","ind":"terapia sostitutiva dell'insufficienza surrenalica (acuta e cronica) — d'elezione perché mantiene entrambe le attività (GC + MC); emergenze (shock, anafilassi) per…","adr":"come classe.","_s":"idrocortisone (= cortisolo) / cortisone a4 glucocorticoidi glucocorticoide di riferimento (endogeno); attività glucocorticoide : mineralcorticoide = 1:1. terapia sostitutiva dell'insufficienza surrenalica (acuta e cronica) — d'elezione perché mantiene entrambe le attività (gc + mc); emergenze (shock, anafilassi) per via ev (estere succinico). come classe."},{"deck":"A4","mod":"I","name":"Prednisone / Prednisolone","o":0,"mecc":"analoghi del cortisolo con doppio legame in 1-2 → ↑ attività glucocorticoide antinfiammatoria, ↓ mineralcorticoide (MC ~0.3-0.5).","ind":"patologie infiammatorie croniche e autoimmuni, terapia antirigetto, ipersensibilità/allergie; reumatologia (II scelta dopo i FANS); uso locoregionale…","adr":"come classe.","_s":"prednisone / prednisolone a4 glucocorticoidi analoghi del cortisolo con doppio legame in 1-2 → ↑ attività glucocorticoide antinfiammatoria, ↓ mineralcorticoide (mc ~0.3-0.5). patologie infiammatorie croniche e autoimmuni, terapia antirigetto, ipersensibilità/allergie; reumatologia (ii scelta dopo i fans); uso locoregionale intrarticolare (solo molecole non bioattivate dal fegato). come classe."},{"deck":"A4","mod":"I","name":"Metilprednisolone","o":0,"mecc":"derivato con doppio legame ed estere metilico → ↑ attività glucocorticoide vs mineralcorticoide.","ind":"patologie allergiche (febbre/reazioni da siero, orticarie); attacco d'asma severo (uso puntiforme/risolutivo, + broncodilatatori — mai cronico per via sistemica);…","adr":"come classe.","_s":"metilprednisolone a4 glucocorticoidi derivato con doppio legame ed estere metilico → ↑ attività glucocorticoide vs mineralcorticoide. patologie allergiche (febbre/reazioni da siero, orticarie); attacco d'asma severo (uso puntiforme/risolutivo, + broncodilatatori — mai cronico per via sistemica); profilassi del distress respiratorio nel parto pretermine. come classe."},{"deck":"A4","mod":"I","name":"Triamcinolone","o":0,"mecc":"↑ lipofilia → ↑ attività glucocorticoide, attività mineralcorticoide azzerata (~0).","ind":"patologie allergiche e infiammatorie.","adr":"come classe.","_s":"triamcinolone a4 glucocorticoidi ↑ lipofilia → ↑ attività glucocorticoide, attività mineralcorticoide azzerata (~0). patologie allergiche e infiammatorie. come classe."},{"deck":"A4","mod":"I","name":"Betametasone e Desametasone (fluorurati)","o":0,"mecc":"introduzione del fluoro → glucocorticoidi più potenti e lipofili, attività antinfiammatoria molto elevata, mineralcorticoide trascurabile.","ind":"Betametasone (derivato metilico del triamcinolone): condizioni critiche/severe per brevi periodi; os (fosfato effervescente), EV/IM (fosfato idrofilo), esteri…","adr":"profilo di effetti indesiderati proporzionale alla potenza (come classe).","_s":"betametasone e desametasone (fluorurati) a4 glucocorticoidi introduzione del fluoro → glucocorticoidi più potenti e lipofili, attività antinfiammatoria molto elevata, mineralcorticoide trascurabile. betametasone (derivato metilico del triamcinolone): condizioni critiche/severe per brevi periodi; os (fosfato effervescente), ev/im (fosfato idrofilo), esteri idrofobi (valerati/benzoati) per uso dermatologico; utile anche per dolore associato a edemi post-operatori e in somministrazioni intrarticolari. desametasone (fosfato sodico, idrofilo, parenterale): edemi cerebrali. profilo di effetti indesiderati proporzionale alla potenza (come classe)."},{"deck":"A4","mod":"I","name":"Fludrocortisone","o":0,"mecc":"variazioni strutturali con effetto opposto: perde l'attività glucocorticoide e acquista quella mineralcorticoide.","ind":"NON usato come antinfiammatorio → indicazione mineralcorticoide (diversa).","adr":"N/D specifici nei documenti.","_s":"fludrocortisone a4 glucocorticoidi variazioni strutturali con effetto opposto: perde l'attività glucocorticoide e acquista quella mineralcorticoide. non usato come antinfiammatorio → indicazione mineralcorticoide (diversa). n/d specifici nei documenti."},{"deck":"A4","mod":"I","name":"Glucocorticoidi topici e inalatori (beclometasone, ciclesonide, budesonide, fluticasone; cutanei)","o":0,"mecc":"","ind":"","adr":"cutanei → atrofia cutanea, follicoliti, ipertricosi (azione androgeno-simile), ipersensibilità (rara, non crociata; spesso da eccipienti/conservanti), tolleranza…","_s":"glucocorticoidi topici e inalatori (beclometasone, ciclesonide, budesonide, fluticasone; cutanei) a4 glucocorticoidi   cutanei → atrofia cutanea, follicoliti, ipertricosi (azione androgeno-simile), ipersensibilità (rara, non crociata; spesso da eccipienti/conservanti), tolleranza rapida. nei bambini ↑ assorbimento sistemico (rapporto superficie/peso) → effetti sistemici (iperglicemia, ↓ gh, soppressione dell'asse)."},{"deck":"A5","mod":"I","name":"FANS (classe — meccanismo, azioni, effetti collaterali)","o":1,"mecc":"acidi deboli; inibiscono la ciclossigenasi (COX). COX-1 (costitutiva) → trombossano A2 (aggregazione piastrinica), citoprotezione gastrica (↑ muco/bicarbonato,…","ind":"3 azioni — antinfiammatoria (↓ PG da COX-2), analgesica (↓ sensibilizzazione nocicettori: le PG ↑ conduzione via PKA → ingresso Ca/Na; ruolo dei canali TRPV1),…","adr":"GI/gastrolesività (ulcera, emorragia; favorita dall'ion trapping — acido non dissociato attraversa e si accumula nella cellula gastrica); piastrine (↓ aggregazione…","_s":"fans (classe — meccanismo, azioni, effetti collaterali) a5 fans + paracetamolo acidi deboli; inibiscono la ciclossigenasi (cox). cox-1 (costitutiva) → trombossano a2 (aggregazione piastrinica), citoprotezione gastrica (↑ muco/bicarbonato, inibizione pompa protonica via pge₂/recettore ep3), perfusione renale. cox-2 (inducibile) → mediatori dell'infiammazione. fans classici non selettivi: ingombro sterico nel sito catalitico → bloccano l'ingresso dell'acido arachidonico in entrambe. coxib: legano una tasca sulfonamidica accessoria solo della cox-2. 3 azioni — antinfiammatoria (↓ pg da cox-2), analgesica (↓ sensibilizzazione nocicettori: le pg ↑ conduzione via pka → ingresso ca/na; ruolo dei canali trpv1), antipiretica (↓ setpoint ipotalamico). gi/gastrolesività (ulcera, emorragia; favorita dall'ion trapping — acido non dissociato attraversa e si accumula nella cellula gastrica); piastrine (↓ aggregazione → rischio emorragico); renale (↓ prostacicline → ipoperfusione/ira — rischio in ipertesi/cv/irc/diuretici); cardiovascolare (vedi coxib); snc (emicrania, vertigini, iperventilazione — salicilati); utero (indicati nella dismenorrea primaria, controindicati in gravidanza → prolungamento gestazione, chiusura del dotto arterioso); ipersensibilità (rinite vasomotoria, edema angioneurotico, asma — leucotrieni liberi, orticaria, shock)."},{"deck":"A5","mod":"I","name":"Acido acetilsalicilico (ASA / Aspirina)","o":1,"mecc":"inibitore IRREVERSIBILE per acetilazione (Ser della COX-1 e COX-2) → previene il legame dell'acido arachidonico.","ind":"infiammazione, febbre, malattia reumatica; ANTIAGGREGANTE a basse dosi (75-325 mg) → prevenzione secondaria dell'infarto (Patrono). *Razionale cinetico:* a basse…","adr":"gastrolesività (accentuata dall'irreversibilità); ipersensibilità; IRA (anziani, IRC, bambini); sindrome di Reye nei bambini (encefalopatia + tossicità epatica →…","_s":"acido acetilsalicilico (asa / aspirina) a5 fans + paracetamolo inibitore irreversibile per acetilazione (ser della cox-1 e cox-2) → previene il legame dell'acido arachidonico. infiammazione, febbre, malattia reumatica; antiaggregante a basse dosi (75-325 mg) → prevenzione secondaria dell'infarto (patrono). *razionale cinetico:* a basse dosi agisce sulle piastrine nel circolo portale (alta concentrazione) prima della diluizione sistemica → blocco cumulativo delle piastrine (prive di nucleo → non risintetizzano l'enzima) senza esposizione sistemica. gastrolesività (accentuata dall'irreversibilità); ipersensibilità; ira (anziani, irc, bambini); sindrome di reye nei bambini (encefalopatia + tossicità epatica → controindicato < 12 anni); asma da aspirina (leucotrieni); intossicazione da salicilati (iperventilazione, alcalosi respiratoria, soppressione del centro del respiro)."},{"deck":"A5","mod":"I","name":"Derivati dell'acido propionico (ibuprofene, ketoprofene, naprossene, flurbiprofene, fenoprofene)","o":1,"mecc":"inibitori REVERSIBILI della COX; generalmente non selettivi (alcuni più COX-1: flurbiprofene, ketoprofene).","ind":"infiammazioni comuni; trattamento cronico di artrite reumatoide e osteoartrite.","adr":"migliore tollerabilità GI (vs altri FANS).","_s":"derivati dell'acido propionico (ibuprofene, ketoprofene, naprossene, flurbiprofene, fenoprofene) a5 fans + paracetamolo inibitori reversibili della cox; generalmente non selettivi (alcuni più cox-1: flurbiprofene, ketoprofene). infiammazioni comuni; trattamento cronico di artrite reumatoide e osteoartrite. migliore tollerabilità gi (vs altri fans)."},{"deck":"A5","mod":"I","name":"Diclofenac (derivato dell'acido acetico)","o":1,"mecc":"selettività superiore per la COX-2 → maggiore attività antinfiammatoria, minori a, ↓ attività psicomotoria, ↑ appetito/peso — H1 ipotalamico + antagonismo serotoninergico); antimuscarinici (secchezza fauci, ritenzione…","_s":"anti-h1 di i generazione (clorfeniramina, difenidramina, idrossizina, prometazina) a6 antistaminici agonisti inversi del recettore h1 (non agiscono su h2); elevata lipofilia → attraversano la barriera ematoencefalica. trattamento sintomatico delle reazioni allergiche (riniti, orticarie, dermatiti); antiemetici (cinetosi/origine vestibolare); sedativi-ipnotici (prometazina); parkinson (attività anticolinergica per controbilanciare il deficit dopaminergico). poco usati come antiallergici per la sedazione. snc (sedazione, ↓ vigilanza, ↓ attività psicomotoria, ↑ appetito/peso — h1 ipotalamico + antagonismo serotoninergico); antimuscarinici (secchezza fauci, ritenzione urinaria, tachicardia sinusale da antagonismo m2); anti-α-adrenergici (ipotensione ortostatica, vertigini, tachicardia riflessa); teratogeni (sospendere in gravidanza). sovradosaggio: allucinazioni, eccitazione, coma, atassia, convulsioni."},{"deck":"A6","mod":"I","name":"Anti-H1 di II generazione (loratadina, cetirizina) — *ritirati: terfenadina, astemizolo*","o":2,"mecc":"bloccano l'H1 con minore attraversamento della BEE → effetti solo periferici; migliore selettività (no antimuscarinici/anti-α).","ind":"solo reazioni allergiche (no sedazione, no effetti vestibolari/sull'appetito).","adr":"⚠️ Terfenadina/Astemizolo (ritirati) → torsione di punta, allungamento QT (interazione con i canali del K⁺) + inibizione dei citocromi. Loratadina/cetirizina →…","_s":"anti-h1 di ii generazione (loratadina, cetirizina) — *ritirati: terfenadina, astemizolo* a6 antistaminici bloccano l'h1 con minore attraversamento della bee → effetti solo periferici; migliore selettività (no antimuscarinici/anti-α). solo reazioni allergiche (no sedazione, no effetti vestibolari/sull'appetito). ⚠️ terfenadina/astemizolo (ritirati) → torsione di punta, allungamento qt (interazione con i canali del k⁺) + inibizione dei citocromi. loratadina/cetirizina → criticità cardiaca in uso prolungato (monitorare)."},{"deck":"A6","mod":"I","name":"Anti-H1 di III generazione (desloratadina, levocetirizina, fexofenadina; topici: azelastina, levocabastina, ketotifene)","o":2,"mecc":"stereoisomeri/metaboliti attivi purificati della II generazione (levocetirizina = levogiro della cetirizina; desloratadina = metabolita attivo della loratadina) →…","ind":"reazioni allergiche in sicurezza (anche durante l'attività lavorativa). Topici (azelastina, levocabastina, ketotifene): preparati dermatologici/orticaria,…","adr":"privi di cardiotossicità (dosi ridotte).","_s":"anti-h1 di iii generazione (desloratadina, levocetirizina, fexofenadina; topici: azelastina, levocabastina, ketotifene) a6 antistaminici stereoisomeri/metaboliti attivi purificati della ii generazione (levocetirizina = levogiro della cetirizina; desloratadina = metabolita attivo della loratadina) → dosi inferiori, ↓ effetti collaterali. fexofenadina = metabolita attivo della terfenadina (è la terfenadina a essere il profarmaco). reazioni allergiche in sicurezza (anche durante l'attività lavorativa). topici (azelastina, levocabastina, ketotifene): preparati dermatologici/orticaria, profilassi dell'attacco d'asma. ketotifene: stabilizzazione della membrana mastocitaria (simile ai cromoni). privi di cardiotossicità (dosi ridotte)."},{"deck":"A6","mod":"I","name":"Anti-H2 (cimetidina, ranitidina, famotidina, nizatidina, roxatidina)","o":2,"mecc":"antagonisti competitivi selettivi del recettore H2 sulla cellula parietale → ↓ stimolazione PKA-mediata della pompa protonica → ↓ secrezione acida (basale,…","ind":"sindrome di Zollinger-Ellison, ulcera gastrica/duodenale, ulcera da *H. pylori* (terapia multipla), reflusso gastroesofageo, ulcera da stress.","adr":"scarsa attività antimuscarinica/antidopaminergica/antiserotoninergica/anti-α/antiallergica. Aspecifici: cefalea, vertigini, nausea, eritemi, prurito, effetti…","_s":"anti-h2 (cimetidina, ranitidina, famotidina, nizatidina, roxatidina) a6 antistaminici antagonisti competitivi selettivi del recettore h2 sulla cellula parietale → ↓ stimolazione pka-mediata della pompa protonica → ↓ secrezione acida (basale, notturna, stimolata dal cibo; in minor misura quella indotta da gastrina e ach). è una modulazione, non un blocco definitivo → non compromette l'assorbimento di vitamina b12. sindrome di zollinger-ellison, ulcera gastrica/duodenale, ulcera da *h. pylori* (terapia multipla), reflusso gastroesofageo, ulcera da stress. scarsa attività antimuscarinica/antidopaminergica/antiserotoninergica/anti-α/antiallergica. aspecifici: cefalea, vertigini, nausea, eritemi, prurito, effetti ematologici (↓ attività midollare). ⚠️ cimetidina: lega il recettore degli androgeni, interferisce con estradiolo/prolattina → perdita di libido, impotenza, ginecomastia (uomo), alterazioni del ciclo mestruale."},{"deck":"A7","mod":"I","name":"Emicrania — terapia dell'attacco acuto (FANS / paracetamolo; principi)","o":3,"mecc":"FANS → ↓ infiammazione, ↓ sensibilizzazione centrale e dei terminali nocicettivi (↓ prostaglandine). (Dettagli FANS/paracetamolo → file A5.)","ind":"livello A (max efficacia): analgesici e alcuni FANS (paracetamolo, ASA, diclofenac, ibuprofene, naprossene), triptani (os/spray nasale/sc), derivati dell'ergot…","adr":"FANS → gastrolesività e nefrotossicità; oppioidi/barbiturici → tolleranza/dipendenza.","_s":"emicrania — terapia dell'attacco acuto (fans / paracetamolo; principi) a7 antiemicranici + antiemetici fans → ↓ infiammazione, ↓ sensibilizzazione centrale e dei terminali nocicettivi (↓ prostaglandine). (dettagli fans/paracetamolo → file a5.) livello a (max efficacia): analgesici e alcuni fans (paracetamolo, asa, diclofenac, ibuprofene, naprossene), triptani (os/spray nasale/sc), derivati dell'ergot (diidroergotamina). ketorolac → evidenza non massima. indometacina (potente, nefrotossica), ketorolac (nefrotossico/gastrolesivo). in scheda tecnica per emicrania: solo naprossene e ibuprofene; paracetamolo/asa → \"cefalea\" (altri = off-label). asa mantiene efficacia negli attacchi ripetuti (no tolleranza). fans → gastrolesività e nefrotossicità; oppioidi/barbiturici → tolleranza/dipendenza."},{"deck":"A7","mod":"I","name":"Derivati dell'ergot (ergotamina, diidroergotamina)","o":3,"mecc":"agonista di recettori serotoninergici, noradrenergici/adrenergici e dopaminergici → vasocostrizione (↓ calibro vascolare), ↓ componente infiammatoria.","ind":"crisi acute di emicrania (dal 1926); diidroergotamina = livello A.","adr":"emetigena importante (soprattutto parenterale); vasocostrizione intensa generalizzata (parestesie, intorpidimenti, sensazioni caldo/freddo, fino a gangrena =…","_s":"derivati dell'ergot (ergotamina, diidroergotamina) a7 antiemicranici + antiemetici agonista di recettori serotoninergici, noradrenergici/adrenergici e dopaminergici → vasocostrizione (↓ calibro vascolare), ↓ componente infiammatoria. crisi acute di emicrania (dal 1926); diidroergotamina = livello a. emetigena importante (soprattutto parenterale); vasocostrizione intensa generalizzata (parestesie, intorpidimenti, sensazioni caldo/freddo, fino a gangrena = ergotismo); vasospasmo coronarico (dolore/pesantezza al petto); effetti centrali (5-ht2)."},{"deck":"A7","mod":"I","name":"Triptani (sumatriptan + II generazione)","o":3,"mecc":"analoghi della serotonina; agonisti selettivi 5-HT1 (B/D; eletriptan anche F centrale) → ↓ infiammazione neurogena periferica, ↓ eccitabilità dei nuclei…","ind":"crisi acute moderate-severe; efficaci anche su sintomi associati (fotofobia, fonofobia, nausea, vomito); no tolleranza.","adr":"parestesie periferiche; spasmo coronarie (4%), respiro corto, pesantezza, ansia, palpitazioni, dolore toracico. NON effetti centrali (no 5-HT2 → no allucinazioni);…","_s":"triptani (sumatriptan + ii generazione) a7 antiemicranici + antiemetici analoghi della serotonina; agonisti selettivi 5-ht1 (b/d; eletriptan anche f centrale) → ↓ infiammazione neurogena periferica, ↓ eccitabilità dei nuclei trigeminali (5-ht1f). crisi acute moderate-severe; efficaci anche su sintomi associati (fotofobia, fonofobia, nausea, vomito); no tolleranza. parestesie periferiche; spasmo coronarie (4%), respiro corto, pesantezza, ansia, palpitazioni, dolore toracico. non effetti centrali (no 5-ht2 → no allucinazioni); basso rischio di sindrome serotoninergica."},{"deck":"A7","mod":"I","name":"Nuove classi anti-emicrania (ditani, gepanti, anti-CGRP mAb)","o":3,"mecc":"","ind":"","adr":"","_s":"nuove classi anti-emicrania (ditani, gepanti, anti-cgrp mab) a7 antiemicranici + antiemetici   "},{"deck":"A7","mod":"I","name":"Emicrania — terapia profilattica","o":3,"mecc":"","ind":"≥3 attacchi gravi/mese o mancata risposta alla terapia sintomatica. Riduce la ricorrenza ~50% (non risolutiva). · Beta-bloccanti (propranololo, il più lipofilo;…","adr":"guadagno ponderale (tutti tranne il topiramato; reversibile alla sospensione).","_s":"emicrania — terapia profilattica a7 antiemicranici + antiemetici  ≥3 attacchi gravi/mese o mancata risposta alla terapia sintomatica. riduce la ricorrenza ~50% (non risolutiva). · beta-bloccanti (propranololo, il più lipofilo; non selettivo β1/β2 — la componente β2 serve per la vasocostrizione): unici antipertensivi usabili in gravidanza. · antiepilettici stabilizzanti di membrana: acido valproico, topiramato (ii gen, migliore) → ↓ eccitabilità del trigemino. · antidepressivi triciclici (amitriptilina): potenziano le vie inibitorie discendenti del dolore + stabilizzazione dei canali del na. · verapamil (calcio-antagonista) → cefalea a grappolo. guadagno ponderale (tutti tranne il topiramato; reversibile alla sospensione)."},{"deck":"A7","mod":"I","name":"Antiemetici (centro del vomito e classi)","o":3,"mecc":"","ind":"","adr":"","_s":"antiemetici (centro del vomito e classi) a7 antiemicranici + antiemetici   "},{"deck":"A7","mod":"I","name":"Domperidone e Metoclopramide","o":3, grada — \"droga dello stupro\"); dosi tossiche (ipotensione ortostatica,…","_s":"benzodiazepine (bdz) b1 sedativo-ipnotici e ansiolitici modulatori allosterici positivi del recettore gaba-a; ↑ frequenza di apertura del canale del cl⁻ (solo in presenza di gaba). sito di legame extracellulare (ecd), tra subunità α e γ (γ2 la più abbondante). ansia, insonnia, astinenza da alcol, stato di male epilettico, premedicazione/anestesia bilanciata, sedazione per manovre, spasticità centrale. non analgesici (solo adiuvanti nel dolore). dosi terapeutiche (sedazione, astenia, ↓ performance psicomotoria, hangover, amnesia anterograda — \"droga dello stupro\"); dosi tossiche (ipotensione ortostatica, ipotermia, confusione; ⚠️ letale con altri depressori snc); anziani (confusione, atassia, effetti paradossi); ⚠️ gravidanza (teratogene, astinenza neonatale)."},{"deck":"B1","mod":"II","name":"Flumazenil","o":9,"mecc":"antagonista competitivo del recettore BDZ.","ind":"antidoto da sovradosaggio di BDZ.","adr":"nausea/vomito, agitazione, convulsioni, ipotensione/aritmia, attacchi di panico.","_s":"flumazenil b1 sedativo-ipnotici e ansiolitici antagonista competitivo del recettore bdz. antidoto da sovradosaggio di bdz. nausea/vomito, agitazione, convulsioni, ipotensione/aritmia, attacchi di panico."},{"deck":"B1","mod":"II","name":"Barbiturici (fenobarbital, secobarbital, pentobarbital)","o":9,"mecc":"modulatori del GABA-A; ↑ DURATA di apertura del canale Cl⁻ (≠ frequenza delle BDZ); bastano le subunità α e β (non γ). Potenziano il legame del GABA e delle BDZ.…","ind":"antiepilettici, coma farmacologico (trauma cranico → mette a riposo l'attività elettrica), anestesia.","adr":"⚠️ basso indice terapeutico (rischio lineare dose-coma); ⚠️ aumentano la percezione del dolore (NON analgesici → controindicati nel dolore); sinergia letale con…","_s":"barbiturici (fenobarbital, secobarbital, pentobarbital) b1 sedativo-ipnotici e ansiolitici modulatori del gaba-a; ↑ durata di apertura del canale c terapia del dolore. nessuna dipendenza/astinenza/ansia rebound alla sospensione."},{"deck":"B1","mod":"II","name":"Buspirone e serotoninergici (ansia cronica)","o":9,"mecc":"Buspirone = agonista parziale del recettore 5-HT1A post-sinaptico (agisce in presenza di serotonina). SSRI → ↑ serotonina nella cleft → down-regulation 5-HT1A → ↓…","ind":"ansia cronica; SSRI nei disturbi d'ansia associati a depressione.","adr":"SSRI → stimolazione di 5-HT3/4/7 (disturbi sessuali), 5-HT2A/2C (agitazione).","_s":"buspirone e serotoninergici (ansia cronica) b1 sedativo-ipnotici e ansiolitici buspirone = agonista parziale del recettore 5-ht1a post-sinaptico (agisce in presenza di serotonina). ssri → ↑ serotonina nella cleft → down-regulation 5-ht1a → ↓ ansia; ↑ allopregnanolone (modulatore allosterico positivo del gaba). *(distinzione: ansia acuta → gaba/bdz; ansia cronica → serotonina.)* ansia cronica; ssri nei disturbi d'ansia associati a depressione. ssri → stimolazione di 5-ht3/4/7 (disturbi sessuali), 5-ht2a/2c (agitazione)."},{"deck":"B1","mod":"II","name":"Neurosteroidi (steroidi neuroattivi)","o":9,"mecc":"prodotti nel SNC a partire dal progesterone (allopregnanolone, deidroepiandrosterone, pregnenolone); modulatori allosterici positivi del GABA-A.","ind":"effetto ansiolitico, anticonvulsivante, sedativo; bersaglio di farmaci che ne modulano la sintesi (etifoxina, SSRI).","adr":"carenza → ↑ stato ansioso.","_s":"neurosteroidi (steroidi neuroattivi) b1 sedativo-ipnotici e ansiolitici prodotti nel snc a partire dal progesterone (allopregnanolone, deidroepiandrosterone, pregnenolone); modulatori allosterici positivi del gaba-a. effetto ansiolitico, anticonvulsivante, sedativo; bersaglio di farmaci che ne modulano la sintesi (etifoxina, ssri). carenza → ↑ stato ansioso."},{"deck":"B2","mod":"II","name":"Anestetici generali — principi","o":10,"mecc":"potenziamento della trasmissione GABAergica + ↓ trasmissione glutammatergica (e nicotinici ACh). Siti centrali: talamo, formazione reticolare, corteccia, ippocampo.","ind":"","adr":"cuore (⚠️ sensibilizzazione alle catecolamine → aritmie, specie alogenati), ipotermia, nausea/vomito (CTZ), epatotossicità. ⚠️ Cesareo: no diazepam. Risveglio =…","_s":"anestetici generali — principi b2 anestetici generali e locali potenziamento della trasmissione gabaergica + ↓ trasmissione glutammatergica (e nicotinici ach). siti centrali: talamo, formazione reticolare, corteccia, ippocampo.  cuore (⚠️ sensibilizzazione alle catecolamine → aritmie, specie alogenati), ipotermia, nausea/vomito (ctz), epatotossicità. ⚠️ cesareo: no diazepam. risveglio = ridistribuzione dal sito d'azione (anestetici lipofili)."},{"deck":"B2","mod":"II","name":"Anestetici inalatori / volatili (alotano, isoflurano, desflurano, sevoflurano, protossido d'azoto, enflurano)","o":10,"mecc":"potenziamento GABA-A, ↓ glutammato; canali K⁺ sensibili all'alotano (TREK, doppio poro).","ind":"mantenimento dell'anestesia. Desflurano/sevoflurano = più evoluti (no irritazione respiratoria, rapido onset/recovery; desflurano richiede vaporizzatore);…","adr":"alotano (⚠️ aritmogeno, sensibilizza il cuore alle catecolamine; epatotossico); enflurano (⚠️ convulsioni simil-epilettiche); isoflurano (⚠️ ischemia miocardica…","_s":"anestetici inalatori / volatili (alotano, isoflurano, desflurano, sevoflurano, protossido d'azoto, enflurano) b2 anestetici generali e locali potenziamento gaba-a, ↓ glutammato; canali k⁺ sensibili all'alotano (trek, doppio poro). mantenimento dell'anestesia. desflurano/sevoflurano = più evoluti (no irritazione respiratoria, rapido onset/recovery; desflurano richiede vaporizzatore); protossido d'azoto = rapido ma anestesia incompleta (no rilassamento → + miorilassante). alotano (⚠️ aritmogeno, sensibilizza il cuore alle catecolamine; epatotossico); enflurano (⚠️ convulsioni simil-epilettiche); isoflurano (⚠️ ischemia miocardica nei coronaropatici, irritazione respiratoria)."},{"deck":"B2","mod":"II","name":"Anestetici endovenosi (tiopentale, propofol, etomidato, ketamina, fentanil)","o":10,"mecc":"","ind":"","adr":"","_s":"anestetici endovenosi (tiopentale, propofol, etomidato, ketamina, fentanil) b2 anestetici generali e locali   "},{"deck":"B2","mod":"II","name":"Anestetici locali — meccanismo e farmacocinetica","o":10,"mecc":"bloccano i canali Na⁺ voltaggio-dipendenti (segmento 6 dei domini I, III, IV) → stabilizzano lo stato inattivato → ↓ genesi/propagazione dell'impulso. ⚠️…","ind":"","adr":"","_s":"anestetici locali — meccanismo e farmacocinetica b2 anestetici generali e locali bloccano i canali na⁺ voltaggio-dipendenti (segmento 6 dei domini i, iii, iv) → stabilizzano lo stato inattivato → ↓ genesi/propagazione dell'impulso. ⚠️ uso-dipendenza (raggiungono il sito col canale aperto). non analgesici.  "},{"deck":"B2","mod":"II","name":"Anestetici locali — singole molecole","o":10,"mecc":"","ind":"","adr":"","_s":"anestetici locali — singole molecole b2 anestetici generali e locali   "},{"deck":"B2","mod":"II","name":"Anestetici locali — ADR e associazione con vasocostrittore","o":10,"mecc":"","ind":"assoluta = gravidanza; relative = disionie/alterazioni elettrolitiche, controindicazioni ai vasocostrittori.","adr":"· SNC (dosi più basse, insorgono prima): basse dosi → tinniti, alterazioni di gusto/visione; dosi maggiori → euforia (↓ interneuroni inibitori) → sonnolenza →…","_s":"anestetici locali — adr e associazione con vasocostrittore b2 anestetici generali e locali  assoluta = gravidanza; relative = disionie/alterazioni elettrolitiche, controindicazioni ai vasocostrittori. · snc (dosi più basse, insorgono prima): basse dosi → tinniti, alterazioni di gusto/visione; dosi maggiori → euforia (↓ interneuroni inibitori) → sonnolenza → depressione del centro del respiro → morte. · cardiovascolare (dosi più alte): tachicardia iniziale (vasodilatazione → riflesso) → blocco di conduzione → asistolia. causa più frequente: iniezione intravascolare accidentale. · ematologici: metaemoglobinemia (prilocaina, lidocaina, benzocaina → o-toluidina). · idiosincrasia (1ª esposizione), ipersensibilità (anafilassi, rilascio di istamina); danno tissutale locale ad alte dosi. · associazione con vasocostrittore (adrenalina, α1): ↓ assorbimento sistemico, ↓ adr, ↑ durata, ↓ sanguinamento. ⚠️ adrenalina → effetti sistemici (ipertensione, tachicardia, fibrillazione); rallenta la cicatrizzazione (no in regioni con scarsa circolazione collaterale); ⚠️ pz con β-bloccanti non selettivi (propranololo) → rialzo pressorio/arresto cardiaco (no problema con metoprololo cardioselettivo)."},{"deck":"B3","mod":"II","name":"Antidepressivi — basi fisiopatologiche","o":11,"mecc":"","ind":"","adr":"","_s":"antidepressivi — basi fisiopatologiche b3 antidepressivi   "},{"deck":"B3","mod":"II","name":"Antidepressivi triciclici (TCA)","o":11,"mecc":"inibizione dei carrier di reuptake di NA e 5-HT. Amine terziarie (amitriptilina, imipramina, doxepina, clomipramina → NA+5-HT, ampie); amine secondarie…","ind":"depressione (efficaci ma non di prima linea); adiuvanti nel dolore (potenziano le vie discendenti inibitorie NA/5-HT) — NON analgesici.","adr":"anti-M1 (visione offuscata, ↓ digestione, costipazione), anti-α1 (ipotensione ortostatica), vertigini, disturbi sessuali, aumento ponderale (anti-H1);…","_s":"antidepressivi triciclici (tca) b3 antidepressivi inibizione dei carrier di reuptake di na e 5-ht. amine terziarie (amitriptilina, imipramina, doxepina, clomipramina → na+5-ht, ampie); amine secondarie (nortriptilina, desipramina, amoxapina → prevalentemente na). depressione (efficaci ma non di prima linea); adiuvanti nel dolore (potenziano le vie discendenti inibitorie na/5-ht) — non analgesici. anti-m1 (visione offuscata, ↓ digestione, costipazione), anti-α1 (ipotensione ortostatica), vertigini, disturbi sessuali, aumento ponderale (anti-h1); up-regulation 5-ht2 → allucinazioni; ⚠️ blocco canali na/ca → cardiotossicità (aritmie, blocco av); adr durano 6-7 settimane."},{"deck":"B3","mod":"II","name":"IMAO (inibitori delle monoamino-ossidasi)","o":11,"mecc":"inibizione delle MAO-A (le MAO-B → dopamina/Parkinson). 1ª generazione = inibitori irreversibili; moclobemide = reversibile (sospendibile).","ind":"depressione (1ª generazione oggi non più usata).","adr":"⚠️ effetti atropino-simili; ⚠️ effetto formaggio (la tiramina dei formaggi non viene degradata → severe crisi ipertensive).","_s":"imao (inibitori delle monoamino-ossidasi) b3 antidepressivi inibizione delle mao-a (le mao-b → dopamina/parkinson). 1ª generazione = inibitori irreversibili; moclobemide = reversibile (sospendibile). depressione (1ª generazione oggi non più usata). ⚠️ effetti atropino-simili; ⚠️ effetto formaggio (la tiramina dei formaggi non viene degradata → severe crisi ipertensive)."},{"deck":"B3","mod":"II","name":"Sindrome serotoninergica","o":11,"mecc":"","ind":"","adr":"agitazione, tremore, sudorazione, contrazioni muscolari, disturbi GI; ⚠️ coma e morte.","_s":"sindrome serotoninergica b3 antidepressivi   agitazione, tremore, sudorazione, contrazioni muscolari, disturbi gi; ⚠️ coma e morte."},{"deck":"B3","mod":"II","name":"SSRI (citalopram, escitalopram, fluoxetina, fluvoxamina, sertralina, paroxetina)","o":11,"mecc":"inibizione potente e selettiva del reuptake della serotonina (SERT). Sequenza: ↓ reuptake somato-dendritico → ↑ 5-HT → stimola autorecettori 5-HT1A →…","ind":"depressione (PRIMA LINEA, maneggevoli), ansia, DOC, disturbi del comportamento alimentare (anoressia, binge eating). Peculiarità: paroxetina/fluoxetina (anche ↓…","adr":"acatisia (5-HT2 via nigrostriatale → ↓ dopamina), DOC, ansia, ↑ appetito/bulimia, nausea/vomito (5-HT3), diarrea/crampi (5-HT4), ↓ libido. NO aumento…","_s":"ssri (citalopram, escitalopram, fluoxetina, fluvoxamina, sertralina, paroxetina) b3 antidepressivi inibizione potente e selettiva del reuptake della serotonina (sert). sequenza: ↓ reuptake somato-dendritico → ↑ 5-ht → stimola autorecettori 5-ht1a → down-regulation autorecettori → ↑ firing → ↑ rilascio assonale; dopo down-regulation di 5-ht2a, il 5-ht1a post-sinaptico (corteccia prefrontale) segnala → miglioramento. depressione (prima linea, maneggevoli), ansia, doc, disturbi del comportamento alimentare (anoressia, binge eating). peculiarità: paroxetina/fluoxetina (anche ↓ reuptake na → astenici); sertralina (↓ dat → ↓ anedonia); fluvoxamina (antagonista adenosina); citalopram (il più selettivo → scelta nell'ansia cronica). acatisia (5-ht2 via nigrostriatale → ↓ dopamina), doc, ansia, ↑ appetito/bulimia, nausea/vomito (5-ht3), diarrea/crampi (5-ht4), ↓ libido. no aumento ponderale/effetti anti-m1/anti-α1 (≠ tca)."},{"deck":"B3","mod":"II","name":"Reboxetina (NRI — inibitore reuptake noradrenalina)","o":11,"mecc":"inibitore selettivo del reuptake della noradrenalina.","ind":"depressione a sintomatologia noradrenergica (fatica, apatia, rallentamento psicomotorio/cognitivo, deficit di attenzione).","adr":"⚠️ non indicata in ipertesi/turbe del ritmo/rischio cardiocircolatorio.","_s":"reboxetina (nri — inibitore reuptake noradrenalina) b3 antidepressivi inibitore selettivo del reuptake della noradrenalina. depressione a sintomatologia noradrenergica (fatica, apatia, rallentamento psicomotorio/cognitivo, deficit di attenzione). ⚠️ non indicata in ipertesi/turbe del ritmo/rischio cardiocircolatorio."},{"deck":"B3","mod":"II","name":"Bupropione (DRI — inibitore reuptake dopamina)","o":11,"mecc":"inibitore selettivo del reuptake della dopamina (+ ↑ NA).","ind":"dipendenza da nicotina (↑ dopamina mesolimbica → ↓ craving); cocainomani; effetto antidepressivo non potente.","adr":"⚠️ ↑ NA → rischio cardiovascolare nei fumatori.","_s":"bupropione (dri — inibitore reuptake dopamina) b3 antidepressivi inibitore selettivo del reuptake della dopamina (+ ↑ na). dipendenza da nicotina (↑ dopamina mesolimbica → ↓ craving); cocainomani; effetto antidepressivo non potente. ⚠️ ↑ na → rischio cardiovascolare nei fumatori."},{"deck":"B3","mod":"II","name":"Venlafaxina (SNRI)","o":11,"mecc":"inibitore del reuptake di serotonina e noradrenalina (prima 5-HT, poi NA). \"Sintesi tra citalopram e reboxetina\"; come amina secondaria senza effetti anti-α1/M1/H1.","ind":"depressione di SECONDA LINEA (resistenza agli SSRI).","adr":"profilo migliore dei TCA (N/D specifiche nei documenti).","_s":"venlafaxina (snri) b3 antidepressivi inibitore del reuptake di serotonina e noradrenalina (prima 5-ht, poi na). \"sintesi tra citalopram e reboxetina\"; come amina secondaria senza effetti anti-α1/m1/h1. depressione di seconda linea (resistenza agli ssri). profilo migliore dei tca (n/d specifiche nei documenti)."},{"deck":"B3","mod":"II","name":"NaSSA (mirtazapina)","o":11,"mecc":"antagonista α2 (auto- ed etero-recettori) → ↑ rilascio di NA e 5-HT (↑ firing serotoninergico via α1); antagonista 5-HT3 (antiemetico), 5-HT2A, 5-HT2C, H1. La 5-HT…","ind":"depressione; utile nei maschi depressi con disturbo sessuale (blocco 5-HT2A).","adr":"⚠️ ↑ NA nocivo nei cardiopatici (angina, vasospasmo); anti-H1 → aumento ponderale + sedazione.","_s":"nassa (mirtazapina) b3 antidepressivi antagonista α2 (auto- ed etero-recettori) → ↑ rilascio di na e 5-ht (↑ firing serotoninergico via α1); antagonista 5-ht3 (antiemetico), 5-ht2a, 5-ht2c, h1. la 5-ht rilasciata si lega prevalentemente al 5-ht1. depressione; utile nei maschi depressi con disturbo sessuale (blocco 5-ht2a). ⚠️ ↑ na nocivo nei cardiopatici (angina, vasospasmo); anti-h1 → aumento ponderale + sedazione."},{"deck":"B3","mod":"II","name":"SARI (trazodone, nefazodone)","o":11,"mecc":"forte inibizione 5-HT2A (> mirtazapina) → potenziano i 5-HT1; + inibizione del reuptake della serotonina. Azione più rapida (bloccano direttamente il 5-HT2A).","ind":"depressione.","adr":"N/D specifiche nei documenti.","_s":"sari (trazodone, nefazodone) b3 antidepressivi forte inibizione 5-ht2a (> mirtazapina) → potenziano i 5-ht1; + inibizione del reuptake della serotonina. azione più rapida (bloccano direttamente il 5-ht2a). depressione. n/d specifiche nei documenti."},{"deck":"B4","mod":"II","name":"Disturbo bipolare — basi","o":12,"mecc":"","ind":"","adr":"alternanza di episodi maniacali/ipomaniacali e depressivi (anche episodio misto); ciclicità stagionale; ↓ funzioni esecutive/decision making, disturbi del sonno;…","_s":"disturbo bipolare — basi b4 disturbo bipolare / stabilizzanti dell'umore   alternanza di episodi maniacali/ipomaniacali e depressivi (anche episodio misto); ciclicità stagionale; ↓ funzioni esecutive/decision making, disturbi del sonno; ⚠️ ~¼ dei pazienti tenta il suicidio."},{"deck":"B4","mod":"II","name":"Litio (sali di litio)","o":12,"mecc":"GOLD STANDARD del disturbo bipolare; \"stabilizzante dell'umore/di membrana\" (competizione col Na⁺). Meccanismo non del tutto noto: altera le proteine G e…","ind":"disturbo bipolare — prevenzione di ricadute e cycling; efficace nella mania/ipomania acuta (≠ antidepressivi).","adr":"tossicità (competizione col Na⁺) renale, tiroidea (ipo-/iper-), cardiaca (conduzione), nervosa. Severi nel lungo termine (~10 anni): impairment cognitivo,…","_s":"litio (sali di litio) b4 disturbo bipolare / stabilizzanti dell'umore gold standard del disturbo bipolare; \"stabilizzante dell'umore/di membrana\" (competizione col na⁺). meccanismo non del tutto noto: altera le proteine g e l'accoppiamento del segnale con fosfolipidi di membrana/ip3 → deprime la trasduzione; blocca la gsk3β → ↑ neuroprotezione, ↓ neuroinfiammazione. disturbo bipolare — prevenzione di ricadute e cycling; efficace nella mania/ipomania acuta (≠ antidepressivi). tossicità (competizione col na⁺) renale, tiroidea (ipo-/iper-), cardiaca (conduzione), nervosa. severi nel lungo termine (~10 anni): impairment cognitivo, nefrotossicità, ipotiroidismo, iperparatiroidismo. ⚠️ gravidanza/puerperio possono peggiorare."},{"deck":"B4","mod":"II","name":"Acido valproico (valproato sodico) — come stabilizzante dell'umore","o":12,"mecc":"blocco canali Na⁺ (stabilizzante di membrana) + blocco canali Ca²⁺ (↓ glutammato) + blocco NMDA (neuroprotezione) + ↑ GABA (↑ GAD, ↓ GABA-transaminasi, ↓ reuptake)…","ind":"disturbo bipolare (stabilizzante dell'umore indiscusso); epilessia (vedi B9).","adr":"⚠️ importante effetto TERATOGENO (gravi malformazioni, specie nel 1° trimestre).","_s":"acido valproico (valproato sodico) — come stabilizzante dell'umore b4 disturbo bipolare / stabilizzanti dell'umore blocco canali na⁺ (stabilizzante di membrana) + blocco canali ca²⁺ (↓ glutammato) + blocco nmda (neuroprotezione) + ↑ gaba (↑ gad, ↓ gaba-transaminasi, ↓ reuptake) = gabamimetico. disturbo bipolare (stabilizzante dell'umore indiscusso); epilessia (vedi b9). ⚠️ importante effetto teratogeno (gravi malformazioni, specie nel 1° trimestre)."},{"deck":"B4","mod":"II","name":"Carbamazepina — come stabilizzante dell'umore","o":12,"mecc":"blocco canali Na⁺ (stabilizzante di membrana/umore) + ↑ attività GABAergica.","ind":"disturbo bipolare; epilessia (vedi B9); nevralgia del trigemino (antidolorifico).","adr":"N/D specifiche nei documenti (vedi B9).","_s":"carbamazepina — come stabilizzante dell'umore b4 disturbo bipolare / stabilizzanti dell'umore blocco canali na⁺ (stabilizzante di membrana/umore) + ↑ attività gabaergica. disturbo bipolare; epilessia (vedi b9); nevralgia del trigemino (antidolorifico). n/d specifiche nei documenti (vedi b9)."},{"deck":"B4","mod":"II","name":"Lamotrigina","o":12,"mecc":"rivisitazione della carbamazepina senza i suoi effetti farmacocinetici (induzione); blocco importante dei canali Na⁺.","ind":"disturbo bipolare; epilessia (vedi B9).","adr":"N/D specifiche nei documenti (vedi B9).","_s":"lamotrigina b4 disturbo bipolare / stabilizzanti dell'umore rivisitazione della carbamazepina senza i suoi effetti farmacocinetici (induzione); blocco importante dei canali na⁺. disturbo bipolare; epilessia (vedi b9). n/d specifiche nei documenti (vedi b9)."},{"deck":"B5","mod":"II","name":"Psicosi/schizofrenia — basi e vie dopaminergiche","o":13,"mecc":"","ind":"","adr":"","_s":"psicosi/schizofrenia — basi e vie dopaminergiche b5 antipsicotici   "},{"deck":"B5","mod":"II","name":"Antipsicotici tipici (1ª generazione / neurolettici)","o":13,"mecc":"blocco del recettore D2 → effetto antipsicotico (riducono i sintomi positivi, non curano); \"neurolessi\" (silenzio psichico e motorio). Fenotiazine (clorpromazina —…","ind":"schizofrenia (sintomi positivi); droperidolo antiemetico (vomito da ↑ dopamina).","adr":"come i TCA (anti-H1/α1/M1); ⚠️ sintomi extrapiramidali/simil-Parkinson (blocco D2 nigrostriatale: distonia, discinesia, acatisia); ⚠️ sindrome maligna da…","_s":"antipsicotici tipici (1ª generazione / neurolettici) b5 antipsicotici blocco del recettore d2 → effetto antipsicotico (riducono i sintomi positivi, non curano); \"neurolessi\" (silenzio psichico e motorio). fenotiazine (clorpromazina — la prima, perfenazina, flufenazina): forte blocco h1, moderato blocco d2, sedative. butirrofenoni (aloperidolo — gold standard sintomi positivi, alta potenza, forte blocco d2, scarso anti-h1 → poca sedazione; droperidolo — antiemetico): non sedativi. schizofrenia (sintomi positivi); droperidolo antiemetico (vomito da ↑ dopamina). come i tca (anti-h1/α1/m1); ⚠️ sintomi extrapiramidali/simil-parkinson (blocco d2 nigrostriatale: distonia, discinesia, acatisia); ⚠️ sindrome maligna da neurolettici (più con butirrofenoni); iperprolattinemia. ⚠️ peggiorano i sintomi negativi (↓ da mesocorticale)."},{"deck":"B5","mod":"II","name":"Antipsicotici atipici (2ª generazione)","o":13,"mecc":"antagonismo 5-HT2A + DEBOLE blocco D2 (\"atipia\"). Il blocco 5-HT2A modula la dopamina: mesolimbica (↓ sintomi positivi), nigrostriatale (↓ extrapiramidali),…","ind":"schizofrenia (1ª scelta per linee guida — meno extrapiramidali/deficit cognitivo); migliorano i sintomi negativi. Risperidone = il più usato nei giovani (disturba…","adr":"⚠️ sindrome dismetabolica/metabolica + aumento ponderale (specie 2ª gen); sedazione (clozapina, quetiapina); ⚠️ agranulocitosi (clozapina 0,5-1%); ⚠️ allungamento…","_s":"antipsicotici atipici (2ª generazione) b5 antipsicotici antagonismo 5-ht2a + debole blocco d2 (\"atipia\"). il blocco 5-ht2a modula la dopamina: mesolimbica (↓ sintomi positivi), nigrostriatale (↓ extrapiramidali), mesocorticale (↑ da → migliora i sintomi negativi). interagiscono anche con tutti i recettori da/5-ht e α1/α2. schizofrenia (1ª scelta per linee guida — meno extrapiramidali/deficit cognitivo); migliorano i sintomi negativi. risperidone = il più usato nei giovani (disturba meno le altre neurotrasmissioni; blocco 5-ht2a/2c/7 + d2). clozapina = ultimo farmaco nei pazienti resistenti (il più efficace; agisce anche su nicotinico e nmda). *(altri: olanzapina, quetiapina, ziprasidone, sertindolo, paliperidone, iloperidone, asenapina, lurasidone.)* ⚠️ sindrome dismetabolica/metabolica + aumento ponderale (specie 2ª gen); sedazione (clozapina, quetiapina); ⚠️ agranulocitosi (clozapina 0,5-1%); ⚠️ allungamento qt."},{"deck":"B5","mod":"II","name":"Aripiprazolo (3ª generazione)","o":13,"mecc":"blocco 5-HT2 + agonista PARZIALE D2 (antagonista in presenza di alte concentrazioni dell'agonista puro, agonista in sua assenza).","ind":"schizofrenia; 2ª scelta nei soggetti con Parkinson.","adr":"riduce la prolattina (a differenza dei tipici).","_s":"aripiprazolo (3ª generazione) b5 antipsicotici blocco 5-ht2 + agonista parziale d2 (antagonista in presenza di alte concentrazioni dell'agonista puro, agonista in sua assenza). schizofrenia; 2ª scelta nei soggetti con parkinson. riduce la prolattina (a differenza dei tipici)."},{"deck":"B5","mod":"II","name":"Antipsicotici — effetti indesiderati e formulazioni LAI","o":13,"mecc":"","ind":"","adr":"reazioni distoniche (macroglossia, torcicollo → anticolinergici); ⚠️ SINDROME MALIGNA DA NEUROLETTICI (rigidità \"a tubo di piombo\"/ruota dentata, ipertermia,…","_s":"antipsicotici — effetti indesiderati e formulazioni lai b5 antipsicotici   reazioni distoniche (macroglossia, torcicollo → anticolinergici); ⚠️ sindrome maligna da neurolettici (rigidità \"a tubo di piombo\"/ruota dentata, ipertermia, ipotensione, tachicardia, ↑ creatinina/leucociti → sospendere la terapia); sedazione (clozapina, clorpromazina, quetiapina); aumento peso/sindrome metabolica (2ª gen); iperprolattinemia (1ª gen; aripiprazolo la riduce); agranulocitosi (clozapina); convulsioni (clozapina); ⚠️ allungamento del qt (la maggior parte)."},{"deck":"B6","mod":"II","name":"Parkinson — strategia terapeutica","o":14,"mecc":"","ind":"","adr":"","_s":"parkinson — strategia terapeutica b6 antiparkinson   "},{"deck":"B6","mod":"II","name":"Levodopa (L-DOPA + carbidopa/benserazide)","o":14,"mecc":"precursore/pro-farmaco della dopamina (la dopamina non attraversa la BEE); convertita dalla DOPA-decarbossilasi. ⚠️ L-DOPA non lipofila → passa la BEE solo 1-3% →…","ind":"Parkinson (gold standard; grande miglioramento motorio).","adr":"⚠️ discinesia tardiva (80% a lungo termine, dose-dipendente, coreiforme; più nei giovani; via D1/dinorfina); ⚠️ fenomeno on/off (OFF = acinesia; ON = mobilità con…","_s":"levodopa (l-dopa + carbidopa/benserazide) b6 antiparkinson precursore/pro-farmaco della dopamina (la dopamina non attraversa la bee); convertita dalla dopa-decarbossilasi. ⚠️ l-dopa non lipofila → passa la bee solo 1-3% → sempre associata a un inibitore della dopa-decarbossilasi periferica (↑ penetrazione centrale + ↓ effetti periferici, dopamina = β1-agonista sul cuore): carbidopa (it, *sinemet*) o benserazide (uk), che non superano la bee. parkinson (gold standard; grande miglioramento motorio). ⚠️ discinesia tardiva (80% a lungo termine, dose-dipendente, coreiforme; più nei giovani; via d1/dinorfina); ⚠️ fenomeno on/off (off = acinesia; on = mobilità con discinesia); periodo \"honeymoon\" iniziale (~1 anno); nausea/vomito, anoressia, ipotensione, confusione, insonnia, incubi; effetti comportamentali (well-being, \"dirty old man\"), allucinazioni/psicosi (da → neuroni serotoninergici → 5-ht); cardiovascolare (β1 periferico); ulcera peptica."},{"deck":"B6","mod":"II","name":"Dopamino-agonisti","o":14,"mecc":"stimolano direttamente i recettori dopaminergici postsinaptici (bypassano il neurone). Ergot (segale cornuta): bromocriptina (D1-selettivo — efficace come L-DOPA…","ind":"Parkinson (iniziale: ropinirolo; avanzato: pramipexolo; off: apomorfina).","adr":"discinesia, nausea, sudorazione, ipotensione; ⚠️ pramipexolo → discontrollo degli impulsi/gambling; bromocriptina/pergolide (D1) → discinesia tardiva.","_s":"dopamino-agonisti b6 antiparkinson stimolano direttamente i recettori dopaminergici postsinaptici (bypassano il neurone). ergot (segale cornuta): bromocriptina (d1-selettivo — efficace come l-dopa ma fluttuazioni motorie rapide), pergolide. non-ergot: pramipexolo (d2/d3/d4 — parkinson avanzato, levo-protettivo vs stress ossidativo), ropinirolo (d2/d1 — fasi iniziali, ritarda le discinesie conservando il d1), rotigotina (cerotto transdermico), apomorfina (tutti i recettori da, sc con penna — per i fenomeni off). parkinson (iniziale: ropinirolo; avanzato: pramipexolo; off: apomorfina). discinesia, nausea, sudorazione, ipotensione; ⚠️ pramipexolo → discontrollo degli impulsi/gambling; bromocriptina/pergolide (d1) → discinesia tardiva."},{"deck":"B6","mod":"II","name":"IMAO-B (selegilina, rasagilina, safinamide)","o":14,"mecc":"inibizione delle MAO-B → ↓ catabolismo della dopamina → ↑ disponibilità sinaptica. Disease-modifying (rallentano l'andamento). Selegilina/rasagilina = effetto…","ind":"Parkinson (rasagilina rallenta la progressione, bassa incidenza di effetti; safinamide + dopamino-mimetici).","adr":"⚠️ il blocco delle MAO-A → accumulo di noradrenalina (rilevante nel paziente cardiocircolatorio). Effetto formaggio: vedi file B3.","_s":"imao-b (selegilina, rasagilina, safinamide) b6 antiparkinson inibizione delle mao-b → ↓ catabolismo della dopamina → ↑ disponibilità sinaptica. disease-modifying (rallentano l'andamento). selegilina/rasagilina = effetto antiossidante/neuroprotettivo/scavenger dei radicali liberi (fasi iniziali; mantengono bassa la l-dopa evitando la desensibilizzazione). parkinson (rasagilina rallenta la progressione, bassa incidenza di effetti; safinamide + dopamino-mimetici). ⚠️ il blocco delle mao-a → accumulo di noradrenalina (rilevante nel paziente cardiocircolatorio). effetto formaggio: vedi file b3."},{"deck":"B6","mod":"II","name":"COMT-inibitori (entacapone, opicapone, tolcapone)","o":14,"mecc":"inibizione delle catecol-O-metiltransferasi → ↑ disponibilità di L-DOPA e penetrazione attraverso la BEE (fondamentali per il fenomeno on/off).","ind":"Parkinson (fenomeno on/off, add-on alla L-DOPA).","adr":"⚠️ tolcapone = altamente epatotossico (entacapone/opicapone maneggevoli).","_s":"comt-inibitori (entacapone, opicapone, tolcapone) b6 antiparkinson inibizione delle catecol-o-metiltransferasi → ↑ disponibilità di l-dopa e penetrazione attraverso la bee (fondamentali per il fenomeno on/off). parkinson (fenomeno on/off, add-on alla l-dopa). ⚠️ tolcapone = altamente epatotossico (entacapone/opicapone maneggevoli)."},{"deck":"B6","mod":"II","name":"Amantadina, antimuscarinici e farmaci accessori","o":14,"mecc":"","ind":"","adr":"","_s":"amantadina, antimuscarinici e farmaci accessori b6 antiparkinson   "},{"deck":"B7","mod":"II","name":"Alzheimer — strategia terapeutica","o":15,"mecc":"","ind":"","adr":"","_s":"alzheimer — strategia terapeutica b7 alzheimer e sclerosi multipla   "},{"deck":"B7","mod":"II","name":"Inibitori dell'acetilcolinesterasi (donepezil, rivastigmina, galantamina)","o":15,"mecc":"inibizione (reversibile/pseudoirreversibile) dell'AChE → ↑ persistenza dell'ACh nella cleft → recupero cognitivo. PRIMA LINEA (grado lieve-moderato). Donepezil…","ind":"Alzheimer lieve-moderato (prima linea, piano terapeutico).","adr":"da ↑ ACh periferica → GI (↑ peristalsi, nausea, vomito, ↑ secrezione acida); ⚠️ cardiaco (M2 → bradicardia/blocco AV → controindicato in alterazioni dell si), discomfort gi, possibile ↑ diabete."},{"deck":"B9","mod":"II","name":"Altri ipolipemizzanti (fibrati, acido nicotinico, colestiramina, ezetimibe)","o":17,"mecc":"","ind":"","adr":"","_s":"altri ipolipemizzanti (fibrati, acido nicotinico, colestiramina, ezetimibe) b9 antiepilettici + statine/ipolipemizzanti   "},{"deck":"B10","mod":"II","name":"Ipertensione — strategia terapeutica","o":18,"mecc":"","ind":"","adr":"","_s":"ipertensione — strategia terapeutica b10 antiipertensivi: simpaticolitici, α- e β-bloccanti   "},{"deck":"B10","mod":"II","name":"Simpaticolitici centrali — α2-agonisti (clonidina, moxonidina, rilmenidina)","o":18,"mecc":"agonisti α2 (autorecettore presinaptico) → ↓ rilascio di catecolamine → ↓ centro vasomotore/scarica catecolaminergica → ↓ resistenze/gittata/pressione; ↓ renina…","ind":"ipertensione (condizioni particolari); clonidina nell'astinenza da alcol/oppiacei. Moxonidina/rilmenidina (I2) → ↑ flusso renale/natriuresi, ↑ risposta insulinica…","adr":"clonidina → ⚠️ ipertensione da rimbalzo alla sospensione brusca (up-regulation α2); astenia, depressione, incubi vividi (⚠️ controindicata in depressi/anziani).…","_s":"simpaticolitici centrali — α2-agonisti (clonidina, moxonidina, rilmenidina) b10 antiipertensivi: simpaticolitici, α- e β-bloccanti agonisti α2 (autorecettore presinaptico) → ↓ rilascio di catecolamine → ↓ centro vasomotore/scarica catecolaminergica → ↓ resistenze/gittata/pressione; ↓ renina (β1 iuxtaglomerulare). clonidina/guanfacina/guanabenz (+ agonismo imidazolinico); moxonidina/rilmenidina (ii gen, agonisti imidazolinici i1/i2). ipertensione (condizioni particolari); clonidina nell'astinenza da alcol/oppiacei. moxonidina/rilmenidina (i2) → ↑ flusso renale/natriuresi, ↑ risposta insulinica (utile nel diabetico — ≠ clonidina), ↓ ipertrofia ventricolare sx. clonidina → ⚠️ ipertensione da rimbalzo alla sospensione brusca (up-regulation α2); astenia, depressione, incubi vividi (⚠️ controindicata in depressi/anziani). moxonidina = ottimo profilo (no depressione)."},{"deck":"B10","mod":"II","name":"α-metildopa","o":18,"mecc":"falso neurotrasmettitore → convertito in α-metil-noradrenalina → stimola gli α2 presinaptici (come clonidina) + ↓ tono simpatico; ↓ dopamina.","ind":"ipertensione, ⚠️ usata in GRAVIDANZA.","adr":"sonnolenza, depressione, parkinsonismo, ipotensione ortostatica, ginecomastia/galattorrea/impotenza; ⚠️ epatotossicità, anemia emolitica (Coombs+); depressione…","_s":"α-metildopa b10 antiipertensivi: simpaticolitici, α- e β-bloccanti falso neurotrasmettitore → convertito in α-metil-noradrenalina → stimola gli α2 presinaptici (come clonidina) + ↓ tono simpatico; ↓ dopamina. ipertensione, ⚠️ usata in gravidanza. sonnolenza, depressione, parkinsonismo, ipotensione ortostatica, ginecomastia/galattorrea/impotenza; ⚠️ epatotossicità, anemia emolitica (coombs+); depressione post-partum (↑ vegf citotossico, stress ossidativo, ipoperfusione cerebrale)."},{"deck":"B10","mod":"II","name":"α1-bloccanti (prazosina, doxazosina, tamsulosina)","o":18,"mecc":"antagonisti competitivi reversibili dei recettori α1 (Gq → IP3/DAG → Ca²⁺/vasocostrizione) → vasodilatazione arteriosa/venosa.","ind":"ipertensione (raramente 1ª linea, in combinazione); IPB/LUTS. Doxazosina → ↑ tolleranza al glucosio (utile nel diabetico).","adr":"ipotensione ortostatica (sincope), tachicardia riflessa.","_s":"α1-bloccanti (prazosina, doxazosina, tamsulosina) b10 antiipertensivi: simpaticolitici, α- e β-bloccanti antagonisti competitivi reversibili dei recettori α1 (gq → ip3/dag → ca²⁺/vasocostrizione) → vasodilatazione arteriosa/venosa. ipertensione (raramente 1ª linea, in combinazione); ipb/luts. doxazosina → ↑ tolleranza al glucosio (utile nel diabetico). ipotensione ortostatica (sincope), tachicardia riflessa."},{"deck":"B10","mod":"II","name":"β-bloccanti — generazioni e proprietà ancillari","o":18,"mecc":"antagonisti dei recettori β. ⚠️ il blocco β2 compromette vasodilatazione/broncodilatazione/rilascio di insulina/glicogenolisi.","ind":"vedi scheda successiva.","adr":"vedi scheda successiva. ⚠️ rimaneggiati dai citocromi → interazioni.","_s":"β-bloccanti — generazioni e proprietà ancillari b10 antiipertensivi: simpaticolitici, α- e β-bloccanti antagonisti dei recettori β. ⚠️ il blocco β2 compromette vasodilatazione/broncodilatazione/rilascio di insulina/glicogenolisi. vedi scheda successiva. vedi scheda successiva. ⚠️ rimaneggiati dai citocromi → interazioni."},{"deck":"B10","mod":"II","name":"β-bloccanti — meccanismi avanzati, indicazioni e ADR","o":18,"mecc":"","ind":"ipertensione (3ª linea — NICE/USA; eccezione: intolleranti ad ACE-I/sartani, donne in età fertile, ↑ tono simpatico); aritmie (antiaritmici classe II); angina…","adr":"crisi ipotensive, ⚠️ blocco AV/asistolia (sede = nodo AV), ↓ inotropismo, ⚠️ asma (non selettivi), ↑ trigliceridi/↓ HDL (β3), ↓ sintomi dell'ipoglicemia, effetti…","_s":"β-bloccanti — meccanismi avanzati, indicazioni e adr b10 antiipertensivi: simpaticolitici, α- e β-bloccanti  ipertensione (3ª linea — nice/usa; eccezione: intolleranti ad ace-i/sartani, donne in età fertile, ↑ tono simpatico); aritmie (antiaritmici classe ii); angina pectoris (↓ frequenza → ↓ fabbisogno o₂ + ↑ diastole/perfusione); prevenzione 2ª dell'ima; cardiomiopatia ipertrofica; scompenso cardiaco; profilassi dell'emicrania (timololo/propranololo, effetto triptano-simile). crisi ipotensive, ⚠️ blocco av/asistolia (sede = nodo av), ↓ inotropismo, ⚠️ asma (non selettivi), ↑ trigliceridi/↓ hdl (β3), ↓ sintomi dell'ipoglicemia, effetti snc (lipofili: affaticamento, ↓ libido, depressione → no nei maschi giovani); ⚠️ sindrome da sospensione (up-regulation → interruzione graduale)."},{"deck":"B11","mod":"II","name":"SRAA — fisiologia e bersagli farmacologici","o":19,"mecc":"","ind":"","adr":"","_s":"sraa — fisiologia e bersagli farmacologici b11 raas   "},{"deck":"B11","mod":"II","name":"ACE-inibitori (captopril, enalapril, ramipril…)","o":19,"mecc":"inibizione dell'ACE → ↓ Ang II → ↓ aldosterone; ↑ bradichinine → vasodilatazione. ⚠️ A lungo andare ↓ risposta (chimasi + perdita del feedback negativo → ↑…","ind":"ipertensione (1ª linea), insufficienza cardiaca, post-IMA, ↓ proteinuria nel diabetico (nefroprotezione).","adr":"⚠️ tosse secca + angioedema (bradichinine); iperkaliemia; captopril → sindrome simil-LES, perdita del gusto, glicosuria.","_s":"ace-inibitori (captopril, enalapril, ramipril…) b11 raas inibizione dell'ace → ↓ ang ii → ↓ aldosterone; ↑ bradichinine → vasodilatazione. ⚠️ a lungo andare ↓ risposta (chimasi + perdita del feedback negativo → ↑ renina/ang i). ipertensione (1ª linea), insufficienza cardiaca, post-ima, ↓ proteinuria nel diabetico (nefroprotezione). ⚠️ tosse secca + angioedema (bradichinine); iperkaliemia; captopril → sindrome simil-les, perdita del gusto, glicosuria."},{"deck":"B11","mod":"II","name":"Sartani (losartan, valsartan, irbesartan, telmisartan, candesartan)","o":19,"mecc":"antagonisti competitivi del recettore AT1 → bloccano il segnale dell'Ang II su AT1; l'Ang II resta libera → feedback negativo sulla renina, legame ad AT2…","ind":"ipertensione, scompenso/insufficienza cardiaca, post-IMA; lieve effetto uricosurico. Sostituiscono gli ACE-I quando inefficaci o per i loro effetti collaterali.","adr":"dolori GI, cefalea; ⚠️ teratogeni (tossicità fetale). NO tosse/angioedema.","_s":"sartani (losartan, valsartan, irbesartan, telmisartan, candesartan) b11 raas antagonisti competitivi del recettore at1 → bloccano il segnale dell'ang ii su at1; l'ang ii resta libera → feedback negativo sulla renina, legame ad at2 (vasodilatazione), conversione in ang 1-7 (benefica). non coinvolgono le bradichinine → no tosse/angioedema. ipertensione, scompenso/insufficienza cardiaca, post-ima; lieve effetto uricosurico. sostituiscono gli ace-i quando inefficaci o per i loro effetti collaterali. dolori gi, cefalea; ⚠️ teratogeni (tossicità fetale). no tosse/angioedema."},{"deck":"B11","mod":"II","name":"Inibitori della renina (aliskiren)","o":19,"mecc":"falsi substrati modellati sull'angiotensinogeno → si legano competitivamente al sito attivo della renina senza essere clivati.","ind":"ipertensione (monoterapia o associazione).","adr":"N/D specifiche nei documenti.","_s":"inibitori della renina (aliskiren) b11 raas falsi substrati modellati sull'angiotensinogeno → si legano competitivamente al sito attivo della renina senza essere clivati. ipertensione (monoterapia o associazione). n/d specifiche nei documenti."},{"deck":"B11","mod":"II","name":"Calcio-antagonisti (diidropiridine, verapamil, diltiazem)","o":19,"mecc":"bloccano i canali del Ca²⁺ voltaggio-dipendenti di tipo L (subunità α1C; siti di legame diversi). Diidropiridine (nifedipina, amlodipina, felodipina, nisoldipina):…","ind":"ipertensione (solo diidropiridine, tranne alterazioni elettriche), angina pectoris (tutte e 3 le classi → vasodilatazione coronarica), aritmie (verapamil/diltiazem…","adr":"diidropiridine → edema, cefalea, tachicardia riflessa (nifedipina; amlodipina no); verapamil/diltiazem → ⚠️ bradicardia/blocco AV, ↓ inotropismo.","_s":"calcio-antagonisti (diidropiridine, verapamil, diltiazem) b11 raas bloccano i canali del ca²⁺ voltaggio-dipendenti di tipo l (subunità α1c; siti di legame diversi). diidropiridine (nifedipina, amlodipina, felodipina, nisoldipina): selettive per i vasi (tessuto-selettività vaso:cuore — amlodipina 10:1, nisoldipina 1000:1); blocco voltaggio-dipendente; vasodilatazione; non cronotrope negative. verapamil (fenilalchilamina): prevalente attività cardiaca; blocco frequenza-dipendente → nodale → cronotropo negativo; ↓ mobilizzazione del ca intracellulare. diltiazem (benzotiazepina): cuore + vasi, cronotropo negativo. ipertensione (solo diidropiridine, tranne alterazioni elettriche), angina pectoris (tutte e 3 le classi → vasodilatazione coronarica), aritmie (verapamil/diltiazem = antiaritmici classe iv). diidropiridine → edema, cefalea, tachicardia riflessa (nifedipina; amlodipina no); verapamil/diltiazem → ⚠️ bradicardia/blocco av, ↓ inotropismo."},{"deck":"B11b","mod":"II","name":"Insufficienza cardiaca — basi fisiopatologiche","o":20,"mecc":"","ind":"","adr":"","_s":"insufficienza cardiaca — basi fisiopatologiche b11b scompenso/digitale, xantine e diuretici   "},{"deck":"B11b","mod":"II","name":"Digitale / digossina","o":20,"mecc":"lega la pompa Na⁺/K⁺-ATPasi (stato E2-P) competendo col K⁺ → ↑ Na⁺ intracellulare → lo scambiatore Na/Ca inverte → ↑ Ca²⁺ → inotropo positivo. ⚠️ ipokaliemia ↑…","ind":"scompenso cardiaco cronico; antiaritmico (↑ frequenza atriale → converte flutter→FA + blocco al nodo AV).","adr":"⚠️ tossicità SNC = primo segno (confusione/disorientamento → drug holiday); aritmie da rientro (potenziali più brevi), blocco AV/asistolia. Mai tachicardia…","_s":"digitale / digossina b11b scompenso/digitale, xantine e diuretici lega la pompa na⁺/k⁺-atpasi (stato e2-p) competendo col k⁺ → ↑ na⁺ intracellulare → lo scambiatore na/ca inverte → ↑ ca²⁺ → inotropo positivo. ⚠️ ipokaliemia ↑ effetto (più siti liberi), iperkaliemia ↓ effetto. scompenso cardiaco cronico; antiaritmico (↑ frequenza atriale → converte flutter→fa + blocco al nodo av). ⚠️ tossicità snc = primo segno (confusione/disorientamento → drug holiday); aritmie da rientro (potenziali più brevi), blocco av/asistolia. mai tachicardia ventricolare."},{"deck":"B11b","mod":"II","name":"Teofillina e xantine","o":20,"mecc":"1) inibizione delle PDE (simpaticomimetico, ↑ effetto delle catecolamine); 2) antagonismo dell'adenosina (→ ↑ tutte le proprietà cardiache, frequenza inclusa); 3)…","ind":"","adr":"⚠️ cardiotossiche (inotrope/cronotrope positive) → the/caffè sconsigliati ai cardiopatici.","_s":"teofillina e xantine b11b scompenso/digitale, xantine e diuretici 1) inibizione delle pde (simpaticomimetico, ↑ effetto delle catecolamine); 2) antagonismo dell'adenosina (→ ↑ tutte le proprietà cardiache, frequenza inclusa); 3) broncodilatazione (↑ camp); 4) effetti sul trasporto del ca²⁺.  ⚠️ cardiotossiche (inotrope/cronotrope positive) → the/caffè sconsigliati ai cardiopatici."},{"deck":"B11b","mod":"II","name":"Diuretici — overview (siti e classi)","o":20,"mecc":"","ind":"","adr":"","_s":"diuretici — overview (siti e classi) b11b scompenso/digitale, xantine e diuretici   "},{"deck":"B11b","mod":"II","name":"Inibitori dell'anidrasi carbonica (acetazolamide, metazolamide)","o":20,"mecc":"inibizione dell'anidrasi carbonica nel tubulo prossimale → ↓ riassorbimento di Na⁺ (accoppiato al bicarbonato) → ↑ escrezione di bicarbonato, alcalinizzazione…","ind":"glaucoma (↓ umor acqueo), epilessia (anticonvulsivante diretto + acidosi), profilassi del mal di montagna, edema, correzione dell'alcalosi metabolica da diuretici,…","adr":"⚠️ calcolosi renale (precipitazione di fosfato di Ca in urina alcalina), mielodepressione, tossicità cutanea, reazioni allergiche, sonnolenza, acidosi metabolica.","_s":"inibitori dell'anidrasi carbonica (acetazolamide, metazolamide) b11b scompenso/digitale, xantine e diuretici inibizione dell'anidrasi carbonica nel tubulo prossimale → ↓ riassorbimento di na⁺ (accoppiato al bicarbonato) → ↑ escrezione di bicarbonato, alcalinizzazione delle urine, acidosi metabolica ipokaliemica. glaucoma (↓ umor acqueo), epilessia (anticonvulsivante diretto + acidosi), profilassi del mal di montagna, edema, correzione dell'alcalosi metabolica da diuretici, in associazione (resistenza alla monoterapia). ⚠️ calcolosi renale (precipitazione di fosfato di ca in urina alcalina), mielodepressione, tossicità cutanea, reazioni allergiche, sonnolenza, acidosi metabolica."},{"deck":"B11b","mod":"II","name":"Diuretici osmotici (mannitolo)","o":20,"mecc":"forza osmotica nel lume → ↓ riassorbimento dell'ultrafiltrato → ↑ eliminazione di Na⁺/acqua; agisce sul tratto discendente dell'ansa; estrae acqua da…","ind":"glaucoma, edema cerebrale, sindrome da squilibrio da dialisi, bambini (anche lassativo).","adr":"⚠️ insufficienza cardiaca congestizia (richiamano acqua → edema polmonare), anuria, emorragia cranica, ipofunzionalità epatica. *(Argomento da slide — non trattato…","_s":"diuretici osmotici (mannitolo) b11b scompenso/digitale, xantine e diuretici forza osmotica nel lume → ↓ riassorbimento dell'ultrafiltrato → ↑ eliminazione di na⁺/acqua; agisce sul tratto discendente dell'ansa; estrae acqua da occhio/cervello. glaucoma, edema cerebrale, sindrome da squilibrio da dialisi, bambini (anche lassativo). ⚠️ insufficienza cardiaca congestizia (richiamano acqua → edema polmonare), anuria, emorragia cranica, ipofunzionalità epatica. *(argomento da slide — non trattato a lezione.)*"},{"deck":"B11b","mod":"II","name":"Diuretici dell'ansa / drastici (furosemide, bumetanide, ac. etacrinico, torasemide)","o":20,"mecc":"inibizione del simporto Na⁺/K⁺/2Cl⁻ (tratto spesso ascendente dell'ansa) → escrezione globale di ioni (Na⁺, K⁺, Cl⁻, Ca²⁺, Mg²⁺); ↑ flusso renale (prostaglandine),…","ind":"edema polmonare acuto (\"salasso bianco\"), scompenso cronico, ipertensione, edema (sindrome nefrosica/cirrosi/ascite), ipercalcemia, diuresi forzata.","adr":"⚠️ ipokaliemia/ipocalcemia/ipomagnesemia → aritmie, alcalosi ipocloremica, ototossicità reversibile/tinnito (acido etacrinico > altri), iperuricemia, iperglicemia,…","_s":"diuretici dell'ansa / drastici (furosemide, bumetanide, ac. etacrinico, torasemide) b11b scompenso/digitale, xantine e diuretici inibizione del simporto na⁺/k⁺/2cl⁻ (tratto spesso ascendente dell'ansa) → escrezione globale di ioni (na⁺, k⁺, cl⁻, ca²⁺, mg²⁺); ↑ flusso renale (prostaglandine), ↑ renina/sraa. edema polmonare acuto (\"salasso bianco\"), scompenso cronico, ipertensione, edema (sindrome nefrosica/cirrosi/ascite), ipercalcemia, diuresi forzata. ⚠️ ipokaliemia/ipocalcemia/ipomagnesemia → aritmie, alcalosi ipocloremica, ototossicità reversibile/tinnito (acido etacrinico > altri), iperuricemia, iperglicemia, ↑ ldl-trigliceridi/↓ hdl (sindrome metabolica), iponatriemia/ipovolemia."},{"deck":"B11b","mod":"II","name":"Diuretici tiazidici e risparmiatori di K⁺","o":20,"mecc":"↓ volemia/precarico → poi compenso (SNS/SRAA) ma mantenimento della gittata; effetto vasodilatatorio diretto (HCTZ apre canali KCa; indapamide…","ind":"","adr":"","_s":"diuretici tiazidici e risparmiatori di k⁺ b11b scompenso/digitale, xantine e diuretici ↓ volemia/precarico → poi compenso (sns/sraa) ma mantenimento della gittata; effetto vasodilatatorio diretto (hctz apre canali kca; indapamide simil-ca-antagonista). attività antipertensiva > diuretici drastici; effetto profibrinico (≠ furosemide fibrinolitica).  "},{"deck":"B12","mod":"II","name":"Emostasi e bersagli della terapia","o":21,"mecc":"","ind":"","adr":"","_s":"emostasi e bersagli della terapia b12 antitrombotici   "},{"deck":"B12","mod":"II","name":"Aspirina e inibitori reversibili della COX1","o":21,"mecc":"aspirina = inibitore IRREVERSIBILE della COX1 (acetilazione Ser529) → ↓ trombossano (via PGH2) → ↓ aggregazione piastrinica.","ind":"","adr":"respiratorie da ↑ leucotrieni (angioedema, asma/broncospasmo, orticaria).","_s":"aspirina e inibitori reversibili della cox1 b12 antitrombotici aspirina = inibitore irreversibile della cox1 (acetilazione ser529) → ↓ trombossano (via pgh2) → ↓ aggregazione piastrinica.  respiratorie da ↑ leucotrieni (angioedema, asma/broncospasmo, orticaria)."},{"deck":"B12","mod":"II","name":"Antagonisti del recettore P2Y12 (ticlopidina, clopidogrel, prasugrel, ticagrelor)","o":21,"mecc":"antagonisti del recettore purinergico P2Y12 (lega l'ADP → perpetua l'aggregazione).","ind":"","adr":"","_s":"antagonisti del recettore p2y12 (ticlopidina, clopidogrel, prasugrel, ticagrelor) b12 antitrombotici antagonisti del recettore purinergico p2y12 (lega l'adp → perpetua l'aggregazione).  "},{"deck":"B12","mod":"II","name":"Antagonisti della GP IIb/IIIa e altri antiaggreganti","o":21,"mecc":"la GP IIb/IIIa è il punto finale comune dell'aggregazione (attivata da TXA2/ADP → aggancio del fibrinogeno → rete).","ind":"angina instabile, is
